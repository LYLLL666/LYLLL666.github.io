<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

h1{
    margin-top:25px;
}

.card{
    width:320px;
    margin:15px auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.word{
    font-size:32px;
    font-weight:bold;
}

.meaning{
    margin-top:8px;
    font-size:18px;
}

.btn{
    margin-top:10px;
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.delete{
    background:#ef4444;
    color:white;
}

.top-btn{
    margin:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
}

.empty{
    margin-top:40px;
}

</style>

</head>

<body>

<h1>⭐ 我的收藏</h1>

<button class="top-btn" onclick="back()">返回主页</button>

<div id="list"></div>

<script>

let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

// 渲染
function render(){

let box = document.getElementById("list");

box.innerHTML = "";

if(favorites.length === 0){
box.innerHTML = "<div class='empty'>暂无收藏</div>";
return;
}

favorites.forEach((w,i)=>{

let div = document.createElement("div");

div.className = "card";

div.innerHTML = `

<div class="word">${w.word}</div>
<div class="meaning">${w.meaning}</div>

<button class="btn delete" onclick="remove(${i})">取消收藏</button>

`;

box.appendChild(div);

});

}

// 删除收藏
function remove(i){

favorites.splice(i,1);

localStorage.setItem(
"favorites_list",
JSON.stringify(favorites)
);

render();

}

// 返回主页
function back(){
location.href = "index.html";
}

render();

</script>

</body>

</html>
