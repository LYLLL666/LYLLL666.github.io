<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

h1{
    margin-top:25px;
}

.card{
    width:320px;
    margin:15px auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.word{
    font-size:34px;
    font-weight:bold;
}

.meaning{
    margin-top:10px;
    font-size:18px;
}

.btn{
    margin-top:12px;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
}

.delete{
    background:#ef4444;
    color:white;
}

.top-btn{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.empty{
    margin-top:40px;
}

</style>
</head>

<body>

<h1>⭐ 我的收藏</h1>

<button class="top-btn" onclick="back()">返回主页</button>

<div id="list"></div>

<script>

let favorites =
JSON.parse(localStorage.getItem("favorites") || "[]");

// 渲染
function render(){

    let list =
    document.getElementById("list");

    list.innerHTML = "";

    if(favorites.length === 0){

        list.innerHTML = "<div class='empty'>暂无收藏</div>";
        return;
    }

    favorites.forEach((w, i) => {

        let div = document.createElement("div");

        div.className = "card";

        div.innerHTML = `

            <div class="word">${w.word}</div>
            <div class="meaning">${w.meaning}</div>

            <button class="btn delete"
            onclick="remove(${i})">取消收藏</button>

        `;

        list.appendChild(div);
    });
}

// 删除
function remove(i){

    favorites.splice(i, 1);

    localStorage.setItem(
        "favorites",
        JSON.stringify(favorites)
    );

    render();
}

// 返回
function back(){
    location.href = "index.html";
}

render();

</script>

</body>

</html>
