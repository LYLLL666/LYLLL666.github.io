<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top, #a8d8ff, #7cf0c8);
    min-height:100vh;
    overflow-x:hidden;
}

/* 顶部标题 */
.header{
    text-align:center;
    padding:20px 0;
    font-size:20px;
    font-weight:600;
    color:#1a1a1a;
}

/* 容器 */
.container{
    padding:10px 15px 120px;
}

/* 收藏卡片 */
.word-card{
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.35);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    position:relative;
    transition:0.2s;
}

.word-card:active{
    transform: scale(0.98);
}

/* 单词 */
.word{
    font-size:20px;
    font-weight:700;
    color:#111;
}

/* 音标 */
.phonetic{
    font-size:13px;
    color:#444;
    margin-top:2px;
}

/* 释义 */
.meaning{
    margin-top:8px;
    font-size:14px;
    color:#222;
    line-height:1.4;
}

/* 删除收藏 */
.remove-btn{
    position:absolute;
    right:12px;
    top:12px;
    width:28px;
    height:28px;
    border-radius:50%;
    background: rgba(255,80,80,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#ff3b3b;
    cursor:pointer;
}

/* 底部按钮栏 */
.bottom-bar{
    position:fixed;
    bottom:18px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:25px;
}

.btn{
    width:56px;
    height:56px;
    border-radius:50%;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 18px rgba(0,0,0,0.1);
    font-size:20px;
    cursor:pointer;
}

.btn:active{
    transform:scale(0.95);
}
</style>
</head>

<body>

<div class="header">我的收藏</div>

<div class="container" id="list"></div>

<!-- 底部按钮 -->
<div class="bottom-bar">
    <div class="btn" onclick="goBack()">←</div>
    <div class="btn" onclick="clearAll()">🗑</div>
    <div class="btn" onclick="refresh()">⟳</div>
</div>

<script>
// 模拟收藏数据（实际你要换成 localStorage）
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

// 渲染
function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    if(favorites.length === 0){
        list.innerHTML = "<div style='text-align:center;color:#555;margin-top:40px;'>暂无收藏单词</div>";
        return;
    }

    favorites.forEach((w, index)=>{
        const div = document.createElement("div");
        div.className = "word-card";

        div.innerHTML = `
            <div class="remove-btn" onclick="removeItem(${index})">✕</div>
            <div class="word">${w.word}</div>
            <div class="phonetic">${w.phonetic || ""}</div>
            <div class="meaning">${w.definition || ""}</div>
        `;

        list.appendChild(div);
    });
}

// 删除单个
function removeItem(i){
    favorites.splice(i,1);
    localStorage.setItem("favorites", JSON.stringify(favorites));
    render();
}

// 清空
function clearAll(){
    if(confirm("确定清空收藏？")){
        favorites = [];
        localStorage.removeItem("favorites");
        render();
    }
}

// 返回
function goBack(){
    history.back();
}

// 刷新
function refresh(){
    favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
    render();
}

render();
</script>

</body>
</html>
