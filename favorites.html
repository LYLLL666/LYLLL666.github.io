<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>收藏中心</title>

<style>
body{
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
}
.card{
    width:300px;
    margin:10px auto;
    background:white;
    padding:10px;
    border-radius:10px;
}
button{
    margin-top:5px;
    padding:5px 10px;
}
</style>
</head>

<body>

<h1>⭐ 收藏中心</h1>

<div id="list"></div>

<button onclick="location.href='index.html'">返回主页</button>

<script>

let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");

function render(){
    let box=document.getElementById("list");
    box.innerHTML="";

    favorites.forEach(w=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${w.word}</b><br>
            ${w.meaning}<br>
            <button onclick="removeFav('${w.word}')">❌ 取消收藏</button>
        `;

        box.appendChild(div);
    });
}

function removeFav(word){
    favorites=favorites.filter(i=>i.word!==word);
    localStorage.setItem("favorites",JSON.stringify(favorites));
    render();
}

render();

</script>

</body>
</html>
