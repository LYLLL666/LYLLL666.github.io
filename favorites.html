<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top, #a8d8ff, #7cf0c8);
    min-height:100vh;
    overflow-x:hidden;
}
    /* 👇 只在这里新增（关键） */
*{
    -webkit-tap-highlight-color: transparent;
}

/* 顶部栏 */
.top-bar{
    position:fixed;
    top:18px;
    left:0;
    right:0;
    z-index:10;
}

/* 顶部按钮 */
.top-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
    font-size:18px;
    position:absolute;
    cursor:pointer;
}

.title-card{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;

    padding:10px 18px;
    border-radius:14px;

    background: rgba(255,255,255,0.40);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 8px 20px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);

    font-size:15px;
    font-weight:600;
    color:#0f172a;
}
    
.top-btn.left{
    left:15px;
}

.top-btn.right{
    right:15px;
}

.top-btn:active{
    transform:scale(0.95);
}

/* 容器 */
.container{
    padding:70px 15px 120px;
}

/* 卡片 */
.word-card{
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.35);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    position:relative;
    transition:0.2s;
}

.word-card:active{
    transform: scale(0.98);
}

/* 单词 */
.word{
    font-size:20px;
    font-weight:700;
    color:#111;
}

/* 音标 */
.phonetic{
    font-size:13px;
    color:#444;
    margin-top:2px;
}

/* 释义 */
.meaning{
    margin-top:8px;
    font-size:14px;
    color:#222;
    line-height:1.4;
}

/* 删除按钮 */
.remove-btn{
    position:absolute;
    right:12px;
    top:12px;
    width:28px;
    height:28px;
    border-radius:50%;
    background: rgba(255,80,80,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#ff3b3b;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 顶部按钮（唯一控制区） -->
<div class="top-bar">
    <div class="top-btn left" onclick="goBack()">←</div>
    <div class="top-btn right" onclick="clearAll()">🗑</div>
</div>

<!-- 列表 -->
<div class="container" id="list"></div>

<script>
// 统一 key
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

// 渲染
function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    if(favorites.length === 0){
        list.innerHTML = "<div style='text-align:center;color:#555;margin-top:40px;'>暂无收藏单词</div>";
        return;
    }

    favorites.forEach((w, index)=>{
        const div = document.createElement("div");
        div.className = "word-card";

        div.innerHTML = `
            <div class="remove-btn" onclick="removeItem(${index})">✕</div>
            <div class="word">${w.word}</div>
            <div class="phonetic">${w.phonetic || ""}</div>
            <div class="meaning">${w.definition || ""}</div>
            <div class="title-card">收藏单词</div>
        `;

        list.appendChild(div);
    });
}

// 删除单个
function removeItem(i){
    favorites.splice(i,1);
    localStorage.setItem("favorites_list", JSON.stringify(favorites));
    render();
}

// 清空
function clearAll(){
    if(confirm("确定清空收藏？")){
        favorites = [];
        localStorage.setItem("favorites_list", JSON.stringify(favorites));
        render();
    }
}

// 返回
function goBack(){
    history.back();
}

render();
</script>

</body>
</html>
