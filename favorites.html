<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

h1{
    margin-top:25px;
}

/* ⭐ 卡片（对齐练习模式） */
.card{
    width:320px;
    margin:15px auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 单词 */
.word{
    font-size:40px;
    font-weight:bold;
}

.meaning{
    font-size:18px;
    margin-top:10px;
}

/* ⭐ 按钮统一风格 */
.btn{
    margin-top:12px;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

/* 复习按钮 */
.practice-btn{
    background:#10b981;
    color:white;
}

.practice-btn:hover{
    transform:scale(1.05);
}

/* 取消收藏按钮（更精致） */
.remove-btn{
    background:linear-gradient(135deg,#ef4444,#f87171);
    color:white;
}

.remove-btn:hover{
    transform:scale(1.05);
}

/* 空状态 */
.empty{
    margin-top:40px;
    font-size:18px;
}

.top-btn{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>⭐ 我的收藏</h1>

<button class="top-btn" onclick="startPractice()">📖 开始复习</button>
<button class="top-btn" onclick="back()">返回主页</button>

<div id="list"></div>

<script>

let favorites =
JSON.parse(localStorage.getItem("favorites") || "[]");

// 渲染列表
function render(){

    let list =
    document.getElementById("list");

    list.innerHTML = "";

    if(favorites.length === 0){

        list.innerHTML =
        `<div class="empty">暂无收藏单词</div>`;

        return;
    }

    favorites.forEach((w, index) => {

        let div = document.createElement("div");

        div.className = "card";

        div.innerHTML = `

            <div class="word">${w.word}</div>

            <div class="meaning">${w.meaning}</div>

            <button class="btn remove-btn"
            onclick="remove(${index})">
                ❌ 取消收藏
            </button>

        `;

        list.appendChild(div);
    });
}

// 删除收藏
function remove(index){

    favorites.splice(index, 1);

    localStorage.setItem(
        "favorites",
        JSON.stringify(favorites)
    );

    render();
}

// ⭐ 进入复习模式（重点）
function startPractice(){

    if(favorites.length === 0){
        alert("没有收藏单词");
        return;
    }

    // 存入会话（用于复习页）
    sessionStorage.setItem(
        "favPractice",
        JSON.stringify(favorites)
    );

    location.href = "favorite-quiz.html";
}

// 返回主页
function back(){
    location.href = "index.html";
}

render();

</script>

</body>
</html>
