<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>收藏练习</title>

<style>
body{
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

.card{
    width:300px;
    margin:10px auto;
    background:white;
    padding:15px;
    border-radius:15px;
}

button{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>⭐ 我的收藏</h1>

<div id="list"></div>

<button id="practiceBtn">开始练习</button>
<button onclick="back()">返回</button>

<script>

let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

function render(){

    const list = document.getElementById("list");

    if(favorites.length === 0){
        list.innerHTML = "<p>暂无收藏</p >";
        return;
    }

    list.innerHTML = "";

    favorites.forEach(w => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<b>${w.word}</b><br>${w.meaning}`;
        list.appendChild(div);
    });
}

render();

// ✅ 关键修复：用 addEventListener（避免onclick失效）
document.getElementById("practiceBtn").addEventListener("click", function(){

    if(favorites.length === 0){
        alert("没有收藏单词");
        return;
    }

    let i = 0;

    function show(){

        const w = favorites[i];

        alert(w.word + " - " + w.meaning);

        i++;

        if(i < favorites.length){
            setTimeout(show, 800);
        }
    }

    show();
});

function back(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
