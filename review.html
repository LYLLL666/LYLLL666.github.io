<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>错题复习</title>

<style>
body{
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
}
.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
}
.option{
    margin:10px auto;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    cursor:pointer;
}
.correct{background:#bbf7d0;}
.wrong{background:#fecaca;}
</style>
</head>

<body>

<h1>🔁 错题复习</h1>

<div class="card">
<div id="word"></div>
<div id="options"></div>
<div id="msg"></div>
</div>

<button onclick="next()">下一题</button>

<script>

let list =
JSON.parse(localStorage.getItem("wrong_list") || "[]");

let index=0;

function render(){

if(list.length===0){
document.body.innerHTML="<h2>没有错题</h2>";
return;
}

let w=list[index];

document.getElementById("word").innerText=w.word;

let options=[w.meaning];

while(options.length<4){
let r=list[Math.floor(Math.random()*list.length)].meaning;
if(!options.includes(r)) options.push(r);
}

options=options.sort(()=>Math.random()-0.5);

document.getElementById("options").innerHTML=
options.map(o=>
`<div class="option" onclick="check('${o}','${w.word}','${w.meaning}')">${o}</div>`
).join("");

}

function check(opt,word,correct){

if(opt===correct){

list=list.filter(i=>i.word!==word);
localStorage.setItem("wrong_list",JSON.stringify(list));

document.getElementById("msg").innerText="🎉 已掌握";

}else{
document.getElementById("msg").innerText="❌ 错误";
}

}

function next(){

index++;
if(index>=list.length) index=0;
render();

}

render();

</script>

</body>
</html>
