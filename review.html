<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST</title>
</head>

<body>

<h1>测试页面</h1>

<div id="word">加载中...</div>

<button onclick="next()">下一题</button>

<script>

let i = 0;

let data = [
    {word:"apple", meaning:"苹果"},
    {word:"book", meaning:"书"},
    {word:"cat", meaning:"猫"}
];

function show(){
    document.getElementById("word").innerText =
    data[i].word + " - " + data[i].meaning;
}

function next(){
    i++;
    if(i >= data.length) i = 0;
    show();
}

show();

</script>

</body>
</html>
