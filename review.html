<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>错题复习</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    min-height:100vh;
    text-align:center;
    overflow:hidden;
    color:#0f172a;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,rgba(255,255,255,.45),rgba(255,255,255,.1),rgba(0,0,0,.02));
    pointer-events:none;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(18px);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* 卡片 */
.card{
    margin-top:110px;
    width:300px;
    padding:22px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);
    margin-left:auto;
    margin-right:auto;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.word{
    font-size:36px;
    font-weight:700;
    margin-bottom:10px;
}

/* 选项 */
.option{
    margin:10px auto;
    width:300px;
    padding:14px;
    border-radius:16px;
    background:rgba(255,255,255,.45);
    backdrop-filter:blur(18px);
    cursor:pointer;
    transition:.2s;
}

.option:active{
    transform:scale(.97);
}

.correct{
    background:rgba(34,197,94,.25)!important;
}

.wrong{
    background:rgba(239,68,68,.25)!important;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>

<div class="card">
    <div class="word" id="word">加载中...</div>
</div>

<div id="options"></div>

<script>

let list = JSON.parse(localStorage.getItem("wrong_list") || "[]");

/* 🔥 每次进入自动刷新 */
list = list.sort(() => Math.random() - 0.5);

let index = 0;
let current = null;

/* =========================
   开始
========================= */
if(list.length === 0){
    document.getElementById("word").innerText = "暂无错题";
}else{
    render();
}

/* =========================
   渲染题目
========================= */
function render(){

    if(index >= list.length){
        finish();
        return;
    }

    current = list[index];

    document.getElementById("word").innerText = current.word;

    let options = generateOptions(current);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach((opt,i)=>{
        let div = document.createElement("div");
        div.className = "option";
        div.innerText = opt.text;

        div.onclick = () => check(opt.correct);

        box.appendChild(div);
    });
}

/* =========================
   生成中文选项
========================= */
function generateOptions(correct){

    let pool = JSON.parse(localStorage.getItem("words_order") || "[]");

    let wrong = pool
        .filter(w => w.word !== correct.word)
        .sort(() => Math.random() - 0.5)
        .slice(0,3)
        .map(w => ({
            text: w.definition,
            correct:false
        }));

    wrong.push({
        text: correct.definition,
        correct:true
    });

    return wrong.sort(() => Math.random() - 0.5);
}

/* =========================
   判断答案
========================= */
function check(isCorrect){

    let items = document.querySelectorAll(".option");

    if(isCorrect){

        items.forEach(i=>{
            if(i.innerText === current.definition){
                i.classList.add("correct");
            }
        });

        /* ✔ 从错题删除 */
        list = list.filter(w => w.word !== current.word);
        localStorage.setItem("wrong_list", JSON.stringify(list));

        setTimeout(next, 600);

    }else{

        items.forEach(i=>{
            if(i.innerText === current.definition){
                i.classList.add("correct");
            }
        });

        event.target.classList.add("wrong");

        setTimeout(next, 1000);
    }
}

/* =========================
   下一题
========================= */
function next(){
    index++;
    render();
}

/* =========================
   结束
========================= */
function finish(){
    alert("复习完成");

    /* 🔥 自动回错题本 */
    location.href = "wrong.html";
}

/* 返回 */
function back(){
    location.href = "wrong.html";
}

</script>

</body>
</html>
