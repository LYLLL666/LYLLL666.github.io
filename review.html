<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>错题复习</title>

<style>

/* =========================
   UI（完全不改）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    min-height:100vh;
    text-align:center;
    color:#0f172a;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,rgba(255,255,255,.45),rgba(255,255,255,.1),rgba(0,0,0,.02));
    pointer-events:none;
}

.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(18px);
}

.card{
    margin-top:110px;
    width:300px;
    padding:22px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);
    margin-left:auto;
    margin-right:auto;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.word{
    font-size:36px;
    font-weight:700;
    margin-bottom:10px;
}

.option{
    margin:10px auto;
    width:300px;
    padding:14px;
    border-radius:16px;
    background:rgba(255,255,255,.45);
    backdrop-filter:blur(18px);
    cursor:pointer;
    transition:.2s;
}

.option:active{
    transform:scale(.97);
}

.correct{
    background:rgba(34,197,94,.25)!important;
}

.wrong{
    background:rgba(239,68,68,.25)!important;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>

<div class="card">
    <div class="word" id="word">加载中...</div>
</div>

<div id="options"></div>

<script>

/* =========================
   数据源
========================= */
let words = JSON.parse(localStorage.getItem("wrong_list") || "[]");
words = words.sort(() => Math.random() - 0.5);

let index = 0;
let currentOptions = [];

/* =========================
   初始化
========================= */
if(words.length === 0){
    document.getElementById("word").innerText = "暂无错题";
}else{
    render();
}

/* =========================
   渲染
========================= */
function render(){

    if(index >= words.length){
        finish();
        return;
    }

    let w = words[index];

    document.getElementById("word").innerText = w.word;

    currentOptions = generate(w);

    let box = document.getElementById("options");
    box.innerHTML = "";

    currentOptions.forEach((opt,i)=>{
        let div = document.createElement("div");
        div.className = "option";
        div.innerText = opt.text;

        div.onclick = () => select(i);

        box.appendChild(div);
    });
}

/* =========================
   生成选项
========================= */
function generate(correct){

    let pool = JSON.parse(localStorage.getItem("words_order") || "[]");

    let wrong = pool
        .filter(w => w.word !== correct.word)
        .sort(() => Math.random() - 0.5)
        .slice(0,3)
        .map(w => ({
            text: w.definition,
            correct:false
        }));

    wrong.push({
        text: correct.definition,
        correct:true
    });

    return wrong.sort(() => Math.random() - 0.5);
}

/* =========================
   点击逻辑（练习模式）
========================= */
function select(i){

    let options = document.querySelectorAll(".option");
    let isCorrect = currentOptions[i].correct;
    let w = words[index];

    if(isCorrect){

        options[i].classList.add("correct");

        /* ✔ 删除错题 */
        let list = JSON.parse(localStorage.getItem("wrong_list") || "[]");
        list = list.filter(item => item.word !== w.word);
        localStorage.setItem("wrong_list", JSON.stringify(list));

        setTimeout(next, 400);

    }else{

        options[i].classList.add("wrong");

        currentOptions.forEach((o,idx)=>{
            if(o.correct){
                options[idx].classList.add("correct");
            }
        });

        setTimeout(next, 800);
    }
}

/* =========================
   下一题
========================= */
function next(){
    index++;
    render();
}

/* =========================
   结束（🔥 修复404）
========================= */
function finish(){
    location.href = "wrong.html"; // ✔ 修复点：回错题集
}

/* =========================
   返回（🔥 修复404）
========================= */
function back(){
    location.href = "wrong.html"; // ✔ 你要的错题集入口
}

</script>

</body>
</html>
