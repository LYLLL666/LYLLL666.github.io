<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收藏复习</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

h1{
    margin-top:25px;
}

.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#word{
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.option{
    width:85%;
    margin:10px auto;
    padding:14px;
    border-radius:12px;
    border:2px solid #d1d5db;
    background:white;
    cursor:pointer;
    font-size:18px;
}

.option:hover{
    transform:scale(1.03);
}

.correct{
    background:#bbf7d0;
    border-color:#22c55e;
}

.wrong{
    background:#fecaca;
    border-color:#ef4444;
}

#msg{
    margin-top:15px;
    height:30px;
    font-weight:bold;
}

button{
    margin:5px;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    background:#10b981;
    color:white;
}

</style>

</head>

<body>

<h1>📖 收藏复习</h1>

<div class="card">

    <div id="word">加载中...</div>

    <div id="options"></div>

    <div id="msg"></div>

</div>

<div>
    <button onclick="prev()">⬅</button>
    <button onclick="next()">➡</button>
</div>

<script>

let list = [];

let index = 0;

// =====================
// 初始化（防炸版）
// =====================
function init(){

try{

list = JSON.parse(localStorage.getItem("favorites") || "[]");

if(!Array.isArray(list) || list.length === 0){
    document.body.innerHTML = "<h2>暂无收藏单词</h2>";
    return;
}

render();

}catch(e){
    document.body.innerHTML = "<pre>"+e+"</pre>";
}

}

// =====================
// 渲染
// =====================
function render(){

let item = list[index];

if(!item){
    document.getElementById("word").innerText = "完成";
    document.getElementById("options").innerHTML = "";
    return;
}

document.getElementById("word").
