<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查词系统</title>

<style>

body{
    margin:0;
    font-family:-apple-system;
    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    height:100vh;
    overflow:hidden;
    text-align:center;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:20px;

    background:rgba(255,255,255,.4);

    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.6),
    0 8px 18px rgba(0,0,0,.10);
}

.back:active{
    transform:scale(.92);
}

/* 搜索区域 */
.search-box{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

/* 输入框 */
.search-box input{
    width:240px;
    padding:14px 16px;

    border-radius:999px;
    border:none;

    background:rgba(255,255,255,.55);

    outline:none;

    font-size:16px;

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.5),
    0 4px 12px rgba(0,0,0,.04);
}

/* 查询按钮 */
.search-box button{
    width:44px;
    height:44px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.6);

    cursor:pointer;

    background:rgba(255,255,255,.25);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;

    color:rgba(15,23,42,.75);

    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.6),
    0 8px 18px rgba(0,0,0,.10);
}

.search-box button:active{
    transform:scale(.92);
}

/* 卡片 */
.card{
    margin-top:40px;
    width:300px;

    margin-left:auto;
    margin-right:auto;

    padding:20px;

    border-radius:20px;

    background:rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.5),
    0 10px 25px rgba(0,0,0,.05);
}

#word{
    font-size:40px;
    font-weight:700;
}

#phonetic{
    opacity:.7;
}

#meaning{
    margin-top:10px;
}

#example{
    margin-top:10px;
    color:#333;
}

/* 发音+收藏 */
.action-row{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.circle-btn{
    width:45px;
    height:45px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:18px;

    color:rgba(15,23,42,.75);

    background:rgba(255,255,255,.25);

    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px) saturate(180%);
    -webkit-backdrop-filter:blur(18px) saturate(180%);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.6),
    0 8px 18px rgba(0,0,0,.10);
}

.circle-btn:active{
    transform:scale(.92);
}

</style>
</head>

<body>

<!-- 返回 -->
<div class="back" onclick="goBack()">←</div>

<!-- 搜索 -->
<div class="search-box">
    <input id="inputWord" placeholder="输入单词..." />
    <button onclick="searchWord()">查</button>
</div>

<!-- 显示 -->
<div class="card">

    <div id="word">请输入单词</div>
    <div id="phonetic"></div>

    <div id="meaning"></div>
    <div id="example"></div>

    <div class="action-row">
        <div class="circle-btn" onclick="playAudio()">🔊</div>
        <div class="circle-btn" onclick="saveWord()">⭐</div>
    </div>

</div>

<script>

let current = null;

// =====================
// 查词
// =====================
async function searchWord(){

    let word = document.getElementById("inputWord").value.trim();
    if(!word) return;

    let data = await fetchWord(word);
    current = data;

    document.getElementById("word").innerText = data.word;
    document.getElementById("phonetic").innerText = data.phonetic || "";
    document.getElementById("meaning").innerText = data.meaning || "";
    document.getElementById("example").innerText = data.example || "";
}

// =====================
// API
// =====================
async function fetchWord(word){

    try{
        let res = await fetch(
            "https://api.dictionaryapi.dev/api/v2/entries/en/" + word
        );

        let data = await res.json();
        let d = data[0];

        return {
            word: d.word,
            phonetic: d.phonetic || "",
            meaning: d.meanings?.[0]?.definitions?.[0]?.definition || "",
            example: d.meanings?.[0]?.definitions?.[0]?.example || ""
        };

    }catch(e){
        return {
            word,
            phonetic:"",
            meaning:"查询失败",
            example:""
        };
    }
}

// =====================
// 🔊 发音（修复叠音）
// =====================
function playAudio(){

    if(!current) return;

    window.speechSynthesis.cancel();

    let utter = new SpeechSynthesisUtterance(current.word);
    utter.lang = "en-US";
    utter.rate = 0.95;

    speechSynthesis.speak(utter);
}

// =====================
// ⭐ 收藏（去重修复）
// =====================
function saveWord(){

    if(!current) return;

    let list = JSON.parse(localStorage.getItem("favorites_list") || "[]");

    let exists = list.some(i => i.word === current.word);

    if(!exists){
        list.push(current);
        localStorage.setItem("favorites_list", JSON.stringify(list));
    }

    alert("已收藏");
}

// =====================
// 返回
// =====================
function goBack(){
    location.href = "index.html";
}

</script>

</body>
</html>
