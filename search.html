<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查词系统</title>

<style>

body{
    margin:0;
    font-family:-apple-system;
    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    height:100vh;
    overflow:hidden;
    text-align:center;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* 搜索 */
.search-box{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.search-box input{
    width:200px;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,.5);
}

.search-box button{
    padding:10px 14px;
    border:none;
    border-radius:12px;
}

/* 卡片 */
.card{
    margin-top:40px;
    width:300px;
    margin-left:auto;
    margin-right:auto;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.6);
}

#word{font-size:40px;font-weight:700;}
#phonetic{opacity:.7;}
#meaning{margin-top:10px;}
#cn{font-size:13px;color:#666;margin-top:6px;}
#example{margin-top:10px;color:#333;}

/* 收藏 */
.fav{
    margin-top:15px;
    width:45px;
    height:45px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    margin-left:auto;
    margin-right:auto;
}

</style>
</head>

<body>

<div class="back" onclick="goBack()">←</div>

<!-- 搜索 -->
<div class="search-box">
    <input id="inputWord" placeholder="输入单词..." />
    <button onclick="searchWord()">查词</button>
</div>

<!-- 显示 -->
<div class="card">

    <div id="word">请输入单词</div>
    <div id="phonetic"></div>

    <div id="meaning"></div>
    <div id="cn"></div>

    <div id="example"></div>
    <div id="exampleCN"></div>

    <div class="fav" onclick="saveWord()">⭐</div>

</div>

<script>

let current = null;

// =========================
// 查词
// =========================
async function searchWord(){

    let word = document.getElementById("inputWord").value.trim();
    if(!word) return;

    let data = await fetchWord(word);
    current = data;

    document.getElementById("word").innerText = data.word;
    document.getElementById("phonetic").innerText = data.phonetic || "";
    document.getElementById("meaning").innerText = data.meaning || "";
    document.getElementById("example").innerText = data.example || "";

    // 中文翻译（重点）
    document.getElementById("cn").innerText =
        "中文：" + await translate(data.meaning || data.word);

    document.getElementById("exampleCN").innerText =
        "例句：" + await translate(data.example || "");
}

// =========================
// 英文词典API
// =========================
async function fetchWord(word){

    try{
        let res = await fetch(
            "https://api.dictionaryapi.dev/api/v2/entries/en/" + word
        );

        let data = await res.json();
        let d = data[0];

        return {
            word: d.word,
            phonetic: d.phonetic || "",
            meaning: d.meanings?.[0]?.definitions?.[0]?.definition || "",
            example: d.meanings?.[0]?.definitions?.[0]?.example || ""
        };

    }catch(e){
        return {
            word,
            phonetic:"",
            meaning:"查询失败",
            example:""
        };
    }
}

// =========================
// 中文翻译API
// =========================
async function translate(text){

    if(!text) return "";

    try{
        let res = await fetch(
            "https://api.mymemory.translated.net/get?q=" +
            encodeURIComponent(text) +
            "&langpair=en|zh"
        );

        let data = await res.json();
        return data.responseData.translatedText;

    }catch(e){
        return "翻译失败";
    }
}

// =========================
// 收藏（关键修复）
// =========================
function saveWord(){

    if(!current) return;

    let list = JSON.parse(localStorage.getItem("favorites") || "[]");

    if(!list.find(i => i.word === current.word)){
        list.push(current);
        localStorage.setItem("favorites", JSON.stringify(list));
    }

    alert("已收藏");
}

// =========================
// 返回
// =========================
function goBack(){
    location.href = "index.html";
}

</script>

</body>
</html>
