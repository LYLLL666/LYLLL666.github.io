<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查词系统</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    height:100vh;
    overflow:hidden;
    text-align:center;
}

/* 返回按钮 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
}

/* 学习按钮 */
.learn{
    position:fixed;
    right:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
}

/* 搜索框 */
.search-box{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.search-box input{
    width:200px;
    padding:10px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,.5);
}

.search-box button{
    padding:10px 14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* 卡片 */
.card{
    margin-top:40px;
    width:300px;
    margin-left:auto;
    margin-right:auto;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(12px);
}

#word{
    font-size:40px;
    font-weight:700;
}

#phonetic{
    opacity:.7;
}

#meaning{
    margin-top:10px;
}

#example{
    margin-top:10px;
    color:#333;
    font-size:14px;
}

/* 收藏按钮 */
.fav{
    margin-top:15px;
    width:45px;
    height:45px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    margin-left:auto;
    margin-right:auto;
}

.trans{
    font-size:13px;
    color:#666;
}

</style>
</head>

<body>

<!-- 返回 -->
<div class="back" onclick="goBack()">←</div>

<!-- 学习入口 -->
<div class="learn" onclick="goLearn()">📚</div>

<!-- 搜索 -->
<div class="search-box">
    <input id="inputWord" placeholder="输入单词..." />
    <button onclick="searchWord()">查词</button>
</div>

<!-- 显示 -->
<div class="card">

    <div id="word">请输入单词</div>
    <div id="phonetic"></div>

    <div id="meaning"></div>
    <div id="meaningCN" class="trans"></div>

    <div id="example"></div>
    <div id="exampleCN" class="trans"></div>

    <div class="fav" onclick="saveWord()">⭐</div>

</div>

<script>

let currentWordData = null;
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

// ======================
// 查词
// ======================
async function searchWord(){

    let word = document.getElementById("inputWord").value.trim();
    if(!word) return;

    let data = await fetchWord(word);

    currentWordData = data;

    document.getElementById("word").innerText = data.word;
    document.getElementById("phonetic").innerText = data.phonetic || "";
    document.getElementById("meaning").innerText = data.meaning;
    document.getElementById("example").innerText = data.example;

    // 中文翻译
    document.getElementById("meaningCN").innerText = "翻译：" + (await translate(data.meaning));
    document.getElementById("exampleCN").innerText = "例句翻译：" + (await translate(data.example));
}

// ======================
// API查词
// ======================
async function fetchWord(word){

    let res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + word);
    let data = await res.json();
    let d = data[0];

    return {
        word: d.word,
        phonetic: d.phonetic || "",
        meaning: d.meanings?.[0]?.definitions?.[0]?.definition || "暂无释义",
        example: d.meanings?.[0]?.definitions?.[0]?.example || "暂无例句"
    };
}

// ======================
// 翻译（免费版浏览器接口）
// ======================
async function translate(text){

    if(!text) return "";

    try{
        let res = await fetch(
            "https://api.mymemory.translated.net/get?q=" +
            encodeURIComponent(text) +
            "&langpair=en|zh"
        );

        let data = await res.json();
        return data.responseData.translatedText;

    }catch(e){
        return "翻译失败";
    }
}

// ======================
// 收藏
// ======================
function saveWord(){

    if(!currentWordData) return;

    if(!favorites.find(i => i.word === currentWordData.word)){
        favorites.push(currentWordData);
        localStorage.setItem("favorites", JSON.stringify(favorites));
        alert("已收藏");
    }else{
        alert("已收藏过");
    }
}

// ======================
// 返回主界面
// ======================
function goBack(){
    location.href = "index.html";
}

// ======================
// 去学习页面
// ======================
function goLearn(){
    location.href = "word.html";
}

</script>

</body>
</html>
