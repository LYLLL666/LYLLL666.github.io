<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查词系统</title>

<style>

body{
    margin:0;
    font-family:-apple-system;
    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    height:100vh;
    overflow:hidden;
    text-align:center;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* 搜索区域 */
.search-box{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

/* 输入框（加大+更圆润） */
.search-box input{
    width:240px;
    padding:14px 16px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,.55);
    outline:none;
    font-size:14px;
}

/* 查询按钮（改成圆形） */
.search-box button{
    width:44px;
    height:44px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,.55); /* 不改颜色体系 */
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}

/* 卡片 */
.card{
    margin-top:40px;
    width:300px;
    margin-left:auto;
    margin-right:auto;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,.6);
}

#word{font-size:40px;font-weight:700;}
#phonetic{opacity:.7;}
#meaning{margin-top:10px;}
#example{margin-top:10px;color:#333;}

/* 发音+收藏同一排 */
.action-row{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

/* 按钮统一 */
.circle-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- 返回 -->
<div class="back" onclick="goBack()">←</div>

<!-- 搜索 -->
<div class="search-box">
    <input id="inputWord" placeholder="输入单词..." />
    <button onclick="searchWord()">查</button>
</div>

<!-- 显示 -->
<div class="card">

    <div id="word">请输入单词</div>
    <div id="phonetic"></div>

    <div id="meaning"></div>
    <div id="example"></div>

    <!-- ⭐ 发音 + 收藏（同一排） -->
    <div class="action-row">

        <div class="circle-btn" onclick="playAudio()">🔊</div>
        <div class="circle-btn" onclick="saveWord()">⭐</div>

    </div>

</div>

<script>

let current = null;

// 查词
async function searchWord(){

    let word = document.getElementById("inputWord").value.trim();
    if(!word) return;

    let data = await fetchWord(word);
    current = data;

    document.getElementById("word").innerText = data.word;
    document.getElementById("phonetic").innerText = data.phonetic || "";
    document.getElementById("meaning").innerText = data.meaning || "";
    document.getElementById("example").innerText = data.example || "";
}

// API
async function fetchWord(word){

    try{
        let res = await fetch(
            "https://api.dictionaryapi.dev/api/v2/entries/en/" + word
        );

        let data = await res.json();
        let d = data[0];

        return {
            word: d.word,
            phonetic: d.phonetic || "",
            meaning: d.meanings?.[0]?.definitions?.[0]?.definition || "",
            example: d.meanings?.[0]?.definitions?.[0]?.example || ""
        };

    }catch(e){
        return {
            word,
            phonetic:"",
            meaning:"查询失败",
            example:""
        };
    }
}

// 发音
function playAudio(){
    if(!current) return;
    let utter = new SpeechSynthesisUtterance(current.word);
    utter.lang = "en-US";
    speechSynthesis.speak(utter);
}

// 收藏
function saveWord(){

    if(!current) return;

    let list = JSON.parse(localStorage.getItem("favorites") || "[]");

    if(!list.find(i => i.word === current.word)){
        list.push(current);
        localStorage.setItem("favorites", JSON.stringify(list));
    }

    alert("已收藏");
}

// 返回
function goBack(){
    location.href = "index.html";
}

</script>

</body>
</html>
