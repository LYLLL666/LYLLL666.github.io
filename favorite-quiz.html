<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收藏复习</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

h1{
    margin-top:25px;
}

.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#word{
    font-size:42px;
    font-weight:bold;
    margin-bottom:20px;
}

.option{
    width:85%;
    margin:10px auto;
    padding:14px;
    border-radius:12px;
    border:2px solid #d1d5db;
    background:white;
    cursor:pointer;
    font-size:18px;
    transition:0.2s;
}

.option:hover{
    transform:scale(1.03);
}

.correct{
    background:#bbf7d0 !important;
    border-color:#22c55e !important;
}

.wrong{
    background:#fecaca !important;
    border-color:#ef4444 !important;
}

#msg{
    margin-top:15px;
    height:30px;
    font-size:18px;
    font-weight:bold;
}

.bottom button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:12px;
    background:#10b981;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.bottom button:disabled{
    opacity:0.5;
}

</style>
</head>

<body>

<h1>📖 收藏复习</h1>

<div class="card">

    <div id="word">加载中...</div>

    <div id="options"></div>

    <div id="msg"></div>

</div>

<div class="bottom">

    <button onclick="prev()">⬅ 上一题</button>
    <button onclick="next()">下一题 ➡</button>
    <button onclick="exit()">退出</button>

</div>

<script>

let list = JSON.parse(localStorage.getItem("favorites") || "[]");

let index = 0;

if(list.length === 0){
    alert("暂无收藏单词");
    location.href = "favorites.html";
}

// =========================
// 显示题目
// =========================
function render(){

    let item = list[index];

    document.getElementById("word").innerText = item.word;
    document.getElementById("msg").innerText = "";

    let options = buildOptions(item);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach(opt => {

        let div = document.createElement("div");

        div.className = "option";
        div.innerText = opt;

        div.onclick = () => check(div, opt, item);

        box.appendChild(div);
    });
}

// =========================
// 生成选项
// =========================
function buildOptions(item){

    let arr = [item.meaning];

    while(arr.length < 4){

        let r = list[Math.floor(Math.random()*list.length)].meaning;

        if(!arr.includes(r)){
            arr.push(r);
        }
    }

    return shuffle(arr);
}

// =========================
// 判断答案
// =========================
function check(dom, opt, item){

    let correct = item.meaning;

    let all = document.querySelectorAll(".option");

    all.forEach(b => b.onclick = null);

    // 正确标记
    all.forEach(b => {
        if(b.innerText === correct){
            b.classList.add("correct");
        }
    });

    if(opt === correct){

        document.getElementById("msg").innerText = "✅ 正确";

        // ⭐ 答对 → 从收藏删除
        list = list.filter(i => i.word !== item.word);

        localStorage.setItem("favorites", JSON.stringify(list));

    }else{

        document.getElementById("msg").innerText = "❌ 错误";

        dom.classList.add("wrong");
    }

    setTimeout(next, 800);
}

// =========================
// 下一题（安全版）
// =========================
function next(){

    if(list.length === 0){

        document.getElementById("msg").innerText = "🎉 全部复习完成";

        document.getElementById("options").innerHTML = "";

        return;
    }

    if(index < list.length - 1){
        index++;
    }else{
        index = 0;
    }

    render();
}

// =========================
// 上一题
// =========================
function prev(){

    if(index > 0){
        index--;
        render();
    }
}

// =========================
// 打乱
// =========================
function shuffle(arr){

    for(let i = arr.length - 1; i > 0; i--){

        let j = Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    return arr;
}

// =========================
// 退出
// =========================
function exit(){
    location.href = "favorites.html";
}

// init
render();

</script>

</body>
</html>
