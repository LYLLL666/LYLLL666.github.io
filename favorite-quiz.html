<script>

// 单词数据（改这里）
let words = JSON.parse(localStorage.getItem("favorites") || "[]");

// ⭐ 当前题号
let current =
parseInt(sessionStorage.getItem("favCurrent")) || 0;

// ⭐ 历史记录
let history =
JSON.parse(sessionStorage.getItem("favHistory") || "[]");

// 加载词库（这里不再fetch）
function init(){

    if(words.length === 0){
        alert("暂无收藏单词");
        location.href = "favorites.html";
        return;
    }

    showWord();
}

init();


// 打乱数组（保留你原来的）
function shuffle(arr){

    for(let i = arr.length - 1; i > 0; i--){

        let j = Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] =
        [arr[j], arr[i]];
    }
}


// 显示题目
function showWord(){

    let w = words[current];

    document.getElementById("word").innerText =
    w.word;

    document.getElementById("msg").innerText = "";

    // ⭐ 最后一题禁用下一题
    document.querySelector(".bottom button:nth-child(2)").disabled =
    current >= words.length - 1;

    // ⭐ 第一题禁用上一题
    document.getElementById("prevBtn").disabled =
    current === 0;

    let options = [w.meaning];

    while(options.length < 4){

        let random =
        words[Math.floor(Math.random() * words.length)].meaning;

        if(!options.includes(random)){
            options.push(random);
        }
    }

    shuffle(options);

    let box =
    document.getElementById("options");

    box.innerHTML = "";

    options.forEach(opt => {

        let div =
        document.createElement("div");

        div.className = "option";

        div.innerText = opt;

        div.onclick = () => selectAnswer(opt);

        box.appendChild(div);
    });

    restoreHistory();
}


// 选择答案
function selectAnswer(opt){

    if(history[current]) return;

    let w = words[current];

    let correct = opt === w.meaning;

    history[current] = {
        selected: opt,
        correct: correct
    };

    sessionStorage.setItem(
        "favHistory",
        JSON.stringify(history)
    );

    let all = document.querySelectorAll(".option");

    all.forEach(btn => {

        btn.onclick = null;

        if(btn.innerText === w.meaning){
            btn.classList.add("correct");
        }

        if(btn.innerText === opt &&
           !correct){
            btn.classList.add("wrong");
        }
    });

    // ⭐ 答对 → 删除收藏（核心）
    if(correct){

        words = words.filter(i => i.word !== w.word);

        localStorage.setItem(
            "favorites",
            JSON.stringify(words)
        );
    }

    setTimeout(() => {

        nextWord();

    }, 900);
}


// 恢复
function restoreHistory(){

    if(history[current]){
        renderAnswer();
    }
}


// 渲染答案
function renderAnswer(){

    let w = words[current];

    let record = history[current];

    let all = document.querySelectorAll(".option");

    all.forEach(btn => {

        btn.onclick = null;

        if(btn.innerText === w.meaning){
            btn.classList.add("correct");
        }

        if(btn.innerText === record.selected &&
           !record.correct){
            btn.classList.add("wrong");
        }
    });

    document.getElementById("msg").innerText =
    record.correct ? "✅ 正确" : "❌ 错误";
}


// 下一题（关键修改）
function nextWord(){

    if(current < words.length - 1){

        current++;

        sessionStorage.setItem("favCurrent", current);

        showWord();

    }else{

        document.getElementById("msg").innerText =
        "🎉 复习完成";

        document.getElementById("options").innerHTML = "";

        // ⭐ 禁用下一题
        document.querySelector(".bottom button:nth-child(2)").disabled = true;
    }
}


// 上一题
function prevWord(){

    if(current > 0){

        current--;

        sessionStorage.setItem("favCurrent", current);

        showWord();
    }
}


// 退出
function exitQuiz(){

    location.href = "favorites.html";
}

</script>
