<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek AI Chat</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top,#60a5fa,#0f172a);
    color:white;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.msg{
    max-width:80%;
    padding:12px 16px;
    margin:10px 0;
    border-radius:18px;
    line-height:1.6;
    word-break:break-word;
}

.user{
    margin-left:auto;
    background:rgba(255,255,255,0.18);
}

.ai{
    background:rgba(255,255,255,0.08);
}

.bottom{
    display:flex;
    padding:12px;
    gap:10px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
}

input{
    flex:1;
    border:none;
    outline:none;
    padding:12px;
    border-radius:16px;
    font-size:16px;
}

button{
    border:none;
    padding:12px 16px;
    border-radius:16px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="chat"></div>

<div class="bottom">
    <input id="input" placeholder="输入英文或中文..." />
    <button onclick="send()">发送</button>
</div>

<script>

/* 🔥 只改这里：填你的 Worker 地址 */
const WORKER_URL = "https://cool-bonus-007b.2667849583.workers.dev/";

/* 添加消息 */
function addMsg(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

/* 发送消息 */
async function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();

    if(!text) return;

    addMsg(text,"user");
    input.value = "";

    const aiBox = document.createElement("div");
    aiBox.className = "msg ai";
    aiBox.innerText = "Thinking...";
    document.getElementById("chat").appendChild(aiBox);

    try{

        const res = await fetch(WORKER_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await res.json();

        console.log("API返回：",data);

        if(!data.choices || !data.choices[0]){
            aiBox.innerText = "❌ 返回格式错误，请检查Worker";
            return;
        }

        aiBox.innerText =
        data.choices[0].message.content;

    }catch(err){

        console.error(err);
        aiBox.innerText =
        "❌ 请求失败：" + err.message;

    }
}

/* 回车发送 */
document.getElementById("input")
.addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        send();
    }
});

</script>

</body>
</html>
