<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>

/* =========================
   BASE
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    min-height:100vh;

    /* ✅ 改：body 不滚动 */
    overflow:hidden;

    background: radial-gradient(circle at top, #d7ecff, #eaf3ff);
}

/* =========================
   背景流光
========================= */
canvas{
    position:fixed;
    inset:0;
    z-index:-2;
}

/* =========================
   顶部圆形按钮
========================= */
.fab{
    position:fixed;

    width:44px;
    height:44px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    user-select:none;

    background:
    linear-gradient(145deg,
        rgba(255,255,255,.55),
        rgba(255,255,255,.15)
    );

    backdrop-filter: blur(26px) saturate(180%);
    -webkit-backdrop-filter: blur(26px) saturate(180%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        0 10px 25px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.7),
        inset 0 -2px 8px rgba(0,0,0,.08);

    color:rgba(20,20,25,.8);
    font-size:18px;

    transition:all .18s ease;

    z-index:999;
}

/* hover */
.fab:hover{
    transform:translateY(-2px);
}

/* active */
.fab:active{
    transform:scale(.94);
}

/* 左右位置 */
.back{
    top:18px;
    left:18px;
}

.refresh{
    top:18px;
    right:18px;
}

/* =========================
   中间 AI 卡片
========================= */
.centerCard{
    position:fixed;

    top:18px;
    left:50%;
    transform:translateX(-50%);

    padding:10px 18px;

    border-radius:16px;

    background:rgba(255,255,255,.38);
    backdrop-filter: blur(26px);

    box-shadow:
        0 12px 30px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);

    font-weight:600;
    color:rgba(10,10,15,.75);

    z-index:999;
}

/* =========================
   聊天框
========================= */
#chat{
    position:fixed;
    top:70px;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);

    width:92%;
    max-width:420px;

    padding:10px 10px 20px;

    overflow-y:auto;

    background:transparent;
    border:none;
    box-shadow:none;

    -webkit-overflow-scrolling:touch;

    z-index:1;
}

/* 消息 */
.msg{
    max-width:82%;
    padding:10px 14px;
    margin:10px 0;

    border-radius:16px;
    line-height:1.5;
    word-break:break-word;
}

/* 用户 */
.user{
    margin-left:auto;
    background:rgba(50,120,255,.92);
    color:white;
}

/* AI */
.ai{
    margin-right:auto;
    background:rgba(255,255,255,.75);
}

/* =========================
   输入区
========================= */
.inputBox{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);

    width:92%;
    max-width:420px;

    display:flex;
    gap:10px;

    z-index:999;
}

/* 输入框 */
input{
    flex:1;
    padding:13px 14px;

    border-radius:18px;
    border:none;
    outline:none;

    background:rgba(255,255,255,.55);
    backdrop-filter: blur(22px);

    box-shadow:
        inset 0 2px 6px rgba(255,255,255,.6),
        inset 0 -2px 6px rgba(0,0,0,.06);

    font-size:16px;
}

/* 发送按钮 */
button{
    padding:12px 16px;

    border:none;
    border-radius:18px;

    background:linear-gradient(145deg,#4a8cff,#2f6fe0);
    color:white;
    font-weight:600;
}

/* scroll bar */
#chat::-webkit-scrollbar{
    display:none;
}

</style>
</head>

<body>

<div class="fab back" onclick="history.back()">←</div>

<div class="centerCard">AI Chat</div>

<div class="fab refresh" onclick="clearHistory()">⟳</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div class="inputBox">
    <input id="input" placeholder="输入内容..." />
    <button onclick="send()">发送</button>
</div>

<script>

const chat = document.getElementById("chat");
const STORAGE_KEY = "chat_history";

function scrollBottom(){
    chat.scrollTop = chat.scrollHeight;
}

// 从 localStorage 加载聊天记录
function loadHistory(){
    let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    history.forEach(msg => {
        if (msg.text === "Thinking...") return;
        const div = document.createElement("div");
        div.className = "msg " + msg.type;
        div.innerText = msg.text;
        chat.appendChild(div);
    });
    scrollBottom();
}

// 保存当前聊天记录到 localStorage
function saveHistory(){
    let messages = [];
    chat.querySelectorAll(".msg").forEach(el => {
        let text = el.innerText;
        if (text === "Thinking...") return;
        messages.push({
            text: text,
            type: el.classList.contains("user") ? "user" : "ai"
        });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

// 清除聊天记录
function clearHistory(){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
}

function addMsg(text,type){

    const div = document.createElement("div");

    div.className = "msg " + type;

    div.innerText = text;

    chat.appendChild(div);

    scrollBottom();

    saveHistory();
}

async function send(){

    const input = document.getElementById("input");

    const text = input.value.trim();

    if(!text) return;

    addMsg(text,"user");

    input.value="";

    const ai = document.createElement("div");

    ai.className = "msg ai";

    ai.innerText = "Thinking...";

    chat.appendChild(ai);

    scrollBottom();

    try{

        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await res.json();

        if(data.choices){

            ai.innerText = data.choices[0].message.content;

        }else{

            ai.innerText = "返回错误";
        }

        scrollBottom();
        saveHistory();

    }catch(e){

        ai.innerText = "请求失败：" + e.message;

        scrollBottom();
        saveHistory();
    }
}

// 页面加载时恢复聊天记录
loadHistory();

/* 回车发送 */
document.getElementById("input").addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        send();
    }
});

</script>

</body>
</html>
