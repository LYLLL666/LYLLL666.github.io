<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>

/* =========================
   BASE
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    /* ✅ 改：允许滚动 */
    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    background: radial-gradient(circle at top, #d7ecff, #eaf3ff);
}

/* =========================
   背景流光
========================= */
canvas{
    position:fixed;
    inset:0;
    z-index:-2;
}

/* =========================
   顶部圆形按钮（改：变大 + 最高层）
========================= */
.fab{
    position:fixed;

    width:44px;   /* ✅ 改大 */
    height:44px;  /* ✅ 改大 */

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    user-select:none;

    background:
    linear-gradient(145deg,
        rgba(255,255,255,.55),
        rgba(255,255,255,.15)
    );

    backdrop-filter: blur(26px) saturate(180%);
    -webkit-backdrop-filter: blur(26px) saturate(180%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        0 10px 25px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.7),
        inset 0 -2px 8px rgba(0,0,0,.08);

    color:rgba(20,20,25,.8);
    font-size:18px;

    transition:all .18s ease;

    /* ✅ 最高层 */
    z-index:999;
}

/* hover */
.fab:hover{
    transform:translateY(-2px);
}

/* active */
.fab:active{
    transform:scale(.94);
}

/* 左右位置 */
.back{
    top:18px;
    left:18px;
}

.refresh{
    top:18px;
    right:18px;
}

/* =========================
   中间 AI 卡片（新增）
========================= */
.centerCard{
    position:fixed;

    top:34px;
    left:50%;
    transform:translateX(-50%);

    padding:10px 18px;

    border-radius:16px;

    background:rgba(255,255,255,.38);
    backdrop-filter: blur(26px);

    box-shadow:
        0 12px 30px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);

    font-weight:600;
    color:rgba(10,10,15,.75);

    z-index:999; /* ✅ 最高层 */
}

/* =========================
   聊天框（不动）
========================= */
#chat{
    position:absolute;
    top:90px;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);

    width:92%;
    max-width:420px;

    padding:16px;

    overflow-y:auto;

    border-radius:26px;

    background:rgba(255,255,255,.38);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.6),
        0 15px 35px rgba(0,0,0,.08);
}

/* 消息 */
.msg{
    max-width:82%;
    padding:10px 14px;
    margin:10px 0;

    border-radius:16px;
    line-height:1.5;
    word-break:break-word;
}

/* 用户 */
.user{
    margin-left:auto;
    background:rgba(50,120,255,.92);
    color:white;
}

/* AI */
.ai{
    margin-right:auto;
    background:rgba(255,255,255,.75);
}

/* =========================
   输入区（改：最高层）
========================= */
.inputBox{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);

    width:92%;
    max-width:420px;

    display:flex;
    gap:10px;

    z-index:999; /* ✅ 最高层 */
}

/* 输入框 */
input{
    flex:1;
    padding:13px 14px;

    border-radius:18px;
    border:none;
    outline:none;

    background:rgba(255,255,255,.55);
    backdrop-filter: blur(22px);

    box-shadow:
        inset 0 2px 6px rgba(255,255,255,.6),
        inset 0 -2px 6px rgba(0,0,0,.06);

    font-size:16px;
}

/* 发送按钮 */
button{
    padding:12px 16px;

    border:none;
    border-radius:18px;

    background:linear-gradient(145deg,#4a8cff,#2f6fe0);
    color:white;
    font-weight:600;
}

/* scroll bar */
#chat::-webkit-scrollbar{
    display:none;
}

</style>
</head>

<body>

<!-- 左上 -->
<div class="fab back" onclick="history.back()">←</div>

<!-- 中间卡片（新增） -->
<div class="centerCard">AI Chat</div>

<!-- 右上 -->
<div class="fab refresh" onclick="location.reload()">⟳</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div class="inputBox">
    <input id="input" placeholder="输入内容..." />
    <button onclick="send()">发送</button>
</div>

<script>

function addMsg(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    const chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(text,"user");
    input.value="";

    const ai = document.createElement("div");
    ai.className = "msg ai";
    ai.innerText = "Thinking...";
    document.getElementById("chat").appendChild(ai);

    try{

        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await res.json();

        if(data.choices){
            ai.innerText = data.choices[0].message.content;
        }else{
            ai.innerText = "返回错误";
        }

    }catch(e){
        ai.innerText = "请求失败：" + e.message;
    }
}

/* 回车 */
document.getElementById("input").addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});

</script>

</body>
</html>
