<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>

/* =========================
   BASE
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top, #d7ecff, #eaf3ff);
    height:100vh;
    overflow:hidden;
}

/* =========================
   顶部栏
========================= */
.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:50px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,0.35);
    backdrop-filter: blur(20px);

    border-bottom:1px solid rgba(0,0,0,0.05);
}

/* 按钮 */
.btn{
    position:absolute;
    top:10px;
    font-size:14px;
    padding:6px 10px;
    border-radius:10px;
    background:rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    border:none;
}

/* 左上返回 */
.back{
    left:10px;
}

/* 右上刷新 */
.refresh{
    right:10px;
}

/* =========================
   聊天区
========================= */
#chat{
    position:absolute;
    top:60px;
    bottom:70px;
    left:0;
    right:0;

    overflow-y:auto;
    padding:15px;
}

/* 消息 */
.msg{
    max-width:80%;
    padding:10px 14px;
    margin:10px 0;
    border-radius:14px;
    word-break:break-word;
}

/* 用户 */
.user{
    margin-left:auto;
    background:rgba(60,120,255,0.9);
    color:white;
}

/* AI */
.ai{
    margin-right:auto;
    background:rgba(255,255,255,0.7);
}

/* =========================
   输入区
========================= */
.inputBox{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;

    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border-radius:14px;
    border:none;
    outline:none;

    background:rgba(255,255,255,0.5);
    backdrop-filter: blur(20px);
}

button{
    padding:12px 14px;
    border:none;
    border-radius:14px;
    background:rgba(60,120,255,0.9);
    color:white;
}

/* 隐藏滚动条 */
#chat::-webkit-scrollbar{
    display:none;
}

</style>
</head>

<body>

<!-- 顶部 -->
<div class="topbar">

    <button class="btn back" onclick="goBack()">← 返回</button>

    <div style="font-weight:600;">AI Chat</div>

    <button class="btn refresh" onclick="location.reload()">⟳</button>

</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div class="inputBox">
    <input id="input" placeholder="输入内容..." />
    <button onclick="send()">发送</button>
</div>

<script>

/* 返回 */
function goBack(){
    history.back();
}

/* 添加消息 */
function addMsg(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    const chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* 发送 */
async function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(text,"user");
    input.value="";

    const ai = document.createElement("div");
    ai.className = "msg ai";
    ai.innerText = "Thinking...";
    document.getElementById("chat").appendChild(ai);

    try{

        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:text
            })
        });

        const data = await res.json();

        if(data.choices){
            ai.innerText = data.choices[0].message.content;
        }else{
            ai.innerText = "返回错误";
        }

    }catch(e){
        ai.innerText = "请求失败：" + e.message;
    }
}

/* 回车发送 */
document.getElementById("input").addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});

</script>

</body>
</html>
