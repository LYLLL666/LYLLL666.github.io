<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek Chat</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background:#0f0f10;
    color:#fff;
}

/* 顶部 */
header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#111;
    border-bottom:1px solid #222;
    font-weight:600;
}

/* 聊天区域 */
#chat{
    position:absolute;
    top:50px;
    bottom:70px;
    left:0;
    right:0;
    overflow-y:auto;
    padding:15px;
}

/* 消息气泡 */
.msg{
    max-width:80%;
    padding:10px 14px;
    margin:10px 0;
    border-radius:12px;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
}

/* 用户 */
.user{
    margin-left:auto;
    background:#2563eb;
}

/* AI */
.ai{
    margin-right:auto;
    background:#2a2a2a;
}

/* 输入框 */
#inputBox{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:10px;
    padding:10px;
    background:#111;
    border-top:1px solid #222;
}

input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#1c1c1c;
    color:white;
    font-size:16px;
}

button{
    padding:12px 16px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

</style>
</head>

<body>

<header>DeepSeek AI</header>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="输入消息..." />
    <button onclick="send()">发送</button>
</div>

<script>

function addMsg(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    const chat = document.getElementById("chat");
    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(text, "user");
    input.value = "";

    const ai = document.createElement("div");
    ai.className = "msg ai";
    ai.innerText = "Thinking...";
    document.getElementById("chat").appendChild(ai);

    try{

        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: text
            })
        });

        const data = await res.json();

        console.log("API返回：", data);

        if(data.choices && data.choices[0]){
            ai.innerText = data.choices[0].message.content;
        }else if(data.error){
            ai.innerText = "错误：" + data.error;
        }else{
            ai.innerText = "返回格式异常";
        }

    }catch(err){
        ai.innerText = "请求失败：" + err.message;
    }
}

/* 回车发送 */
document.getElementById("input")
.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        send();
    }
});

</script>

</body>
</html>
