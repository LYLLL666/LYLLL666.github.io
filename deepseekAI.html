<h1>页面已加载</h1>
<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DeepSeek AI</title>

<style>

body{
    margin:0;
    height:100vh;

    display:flex;
    flex-direction:column;

    font-family:-apple-system,BlinkMacSystemFont,
    "SF Pro Display";

    background:
    radial-gradient(circle at top,
    #60a5fa,
    #0f172a);

    color:white;

    overflow:hidden;
}

/* 聊天区域 */
#chat{
    flex:1;
    overflow-y:auto;

    padding:20px;
    box-sizing:border-box;
}

/* 消息 */
.msg{
    max-width:80%;

    padding:14px 18px;

    margin-bottom:14px;

    border-radius:24px;

    backdrop-filter:blur(20px);

    line-height:1.7;

    word-break:break-word;

    box-shadow:
    0 4px 20px rgba(0,0,0,0.15);
}

/* 用户 */
.user{
    margin-left:auto;

    background:
    rgba(255,255,255,0.18);
}

/* AI */
.ai{
    background:
    rgba(255,255,255,0.08);
}

/* 底部输入区 */
.bottom{
    display:flex;

    gap:12px;

    padding:16px;

    box-sizing:border-box;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:blur(20px);
}

/* 输入框 */
input{
    flex:1;

    border:none;
    outline:none;

    padding:14px 18px;

    border-radius:22px;

    background:
    rgba(255,255,255,0.12);

    color:white;

    font-size:16px;
}

/* 输入提示颜色 */
input::placeholder{
    color:rgba(255,255,255,0.6);
}

/* 按钮 */
button{
    border:none;

    padding:14px 22px;

    border-radius:22px;

    background:#3b82f6;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.2s;
}

button:active{
    transform:scale(0.96);
}

</style>
</head>

<body>

<!-- 聊天区域 -->
<div id="chat"></div>

<!-- 输入区域 -->
<div class="bottom">

    <input
    id="input"
    placeholder="Speak English...">

    <button onclick="sendMessage()">
        发送
    </button>

</div>

<script>

const WORKER_URL =
"https://cool-bonus-007b.2667849583.workers.dev";

/* 发送消息 */
async function sendMessage(){

    const input =
    document.getElementById("input");

    const chat =
    document.getElementById("chat");

    const text =
    input.value.trim();

    if(!text) return;

    /* 用户消息 */
    chat.innerHTML += `
        <div class="msg user">
            ${text}
        </div>
    `;

    input.value = "";

    /* AI加载中 */
    const loading =
    document.createElement("div");

    loading.className = "msg ai";

    loading.innerHTML =
    "Thinking...";

    chat.appendChild(loading);

    chat.scrollTop =
    chat.scrollHeight;

    try{

        const response =
        await fetch(
            WORKER_URL,
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({
                    message:text
                })
            }
        );

        const data =
        await response.json();

        const aiText =
        data.choices[0]
        .message.content;

        loading.innerHTML =
        aiText;

        chat.scrollTop =
        chat.scrollHeight;

    }catch(err){

        loading.innerHTML =
        "Error";

        console.log(err);
    }
}

/* 回车发送 */
document
.getElementById("input")
.addEventListener(
    "keydown",
    function(e){

        if(e.key === "Enter"){
            sendMessage();
        }
    }
);

</script>

</body>
</html>
