<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习系统 V8</title>

<style>

/* 🚫 去蓝框 */
*{
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;
    overflow:hidden;

    /* 🌌 苹果空间深色底 */
    background:#05070d;
}

/* 🌈 苹果“空间彩虹光场”（重点升级） */
.bg{
    position:fixed;
    inset:-60%;
    z-index:-3;

    background:
    radial-gradient(circle at 15% 20%, rgba(255, 99, 132, 0.35), transparent 45%),
    radial-gradient(circle at 75% 25%, rgba(54, 162, 235, 0.35), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(75, 192, 192, 0.3), transparent 55%),
    radial-gradient(circle at 85% 70%, rgba(153, 102, 255, 0.3), transparent 55%),
    radial-gradient(circle at 10% 85%, rgba(255, 206, 86, 0.25), transparent 50%);

    filter: blur(140px) saturate(140%);
    opacity:0.95;

    animation: spaceFlow 24s ease-in-out infinite;
}

/* 🌊 空间漂浮（慢 + 深度感） */
@keyframes spaceFlow{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-3%,2%) scale(1.15);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 visionOS深玻璃层 */
.glass{
    position:fixed;
    inset:0;

    background:rgba(255,255,255,0.06);

    backdrop-filter: blur(50px) saturate(180%);
    -webkit-backdrop-filter: blur(50px);

    z-index:-2;
}

/* 📌 标题（苹果系统风） */
h1{
    text-align:center;
    margin-top:45px;
    font-size:28px;
    font-weight:600;
    color:#f1f5f9;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:30px auto;
}

/* 🧊 苹果 Liquid Glass（升级版） */
.glass-btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:26px;

    /* 🌫 更真实玻璃（深色环境） */
    background:rgba(255,255,255,0.08);

    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);

    border:1px solid rgba(255,255,255,0.18);

    color:#f8fafc;
    font-size:16px;
    font-weight:500;

    text-align:center;

    box-shadow:
        0 18px 45px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.2);

    cursor:pointer;

    transition: all 0.2s cubic-bezier(.2,.8,.2,1);

    overflow:hidden;
}

/* ✨ 苹果空间光斑 */
.glass-btn::before{
    content:"";
    position:absolute;
    inset:-60%;

    background:radial-gradient(
        circle at 30% 20%,
        rgba(255,255,255,0.25),
        transparent 50%
    );

    opacity:0.5;
}

/* 🌊 hover轻漂浮 */
.glass-btn:hover{
    transform:translateY(-2px);
}

/* 🍏 苹果级压感（深空间版本） */
.glass-btn:active{
    transform:scale(0.95) translateY(2px);

    background:rgba(255,255,255,0.12);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.55),
        inset 0 0 20px rgba(255,255,255,0.08);
}

/* 🌫 底部 */
.tip{
    text-align:center;
    color:#94a3b8;
    font-size:12px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glass"></div>

<h1>📚 学习系统 V8</h1>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 单词学习</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="glass-btn" onclick="go('review.html')">🔁 错题复习</div>

</div>

<div class="tip">Apple Vision-style Liquid Glass UI</div>

<script>

function go(page){

if(navigator.vibrate){
navigator.vibrate(10);
}

location.href = page;
}

</script>

</body>

</html>
