<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #d1fae5, #ecfdf5);
    color:#064e3b;
    text-align:center;
}

.container{margin-top:80px;}

h1{
    color:#065f46;
}

.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.word{font-size:40px;}
.meaning{font-size:20px;color:#059669;}

button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.learn-btn{background:#34d399;color:white;}
.like-btn{background:#10b981;color:white;}
.page-btn{background:#22c55e;color:white;}

.stats{
    margin-top:20px;
    color:#065f46;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 英语学习系统</h1>

<div class="card">
    <div class="word" id="word">加载中...</div>
    <div class="meaning" id="meaning">正在加载词库</div>
</div>

<button class="learn-btn" onclick="nextWord()">下一个</button>
<button class="like-btn" onclick="collectWord()">⭐ 收藏</button>
<button class="page-btn" onclick="openFavorites()">📖 我的收藏</button>

<div class="stats">
已学习：<span id="count">0</span> | 收藏：<span id="favCount">0</span>
</div>

</div>

<script>

let words = [];
let index = 0;

// 📦 本地数据
let learned = JSON.parse(localStorage.getItem("learned") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

// 🚫 用于“降低重复率”
let recent = []; // 记录最近2个单词
const MAX_RECENT = 2;

// 📥 加载词库
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    nextWord();
});

// 📳 震动
function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(80);
    }
}

// 📌 获取不重复单词
function getRandomWord(){

    if(words.length === 0) return null;

    let w;

    do {
        const i = Math.floor(Math.random() * words.length);
        w = words[i];
    } while(recent.includes(w.word));

    // 更新最近记录
    recent.push(w.word);
    if(recent.length > MAX_RECENT){
        recent.shift();
    }

    return w;
}

// 📌 普通学习
function nextWord(){

    vibrate();

    const w = getRandomWord();
    if(!w) return;

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;

    // 学习记录
    if(!learned.includes(w.word)){
        learned.push(w.word);
        localStorage.setItem("learned", JSON.stringify(learned));
    }

    updateStats();
}

// ⭐ 收藏
function collectWord(){

    vibrate();

    const currentWord = document.getElementById("word").innerText;
    const w = words.find(i => i.word === currentWord);

    if(w && !favorites.find(i => i.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites", JSON.stringify(favorites));
    }

    updateStats();
}

// 📊 更新统计
function updateStats(){
    document.getElementById("count").innerText = learned.length;
    document.getElementById("favCount").innerText = favorites.length;
}

// 📖 收藏练习（重点升级）
function openFavorites(){

    vibrate();

    if(favorites.length === 0){
        alert("暂无收藏");
        return;
    }

    let i = 0;

    // 🔥 进入“练习模式UI”
    document.body.innerHTML = `
        <div style="text-align:center;margin-top:100px;font-family:Arial;">
            <h1>⭐ 收藏练习模式</h1>

            <div style="
                width:300px;
                margin:30px auto;
                padding:30px;
                background:#ecfdf5;
                border-radius:20px;
                color:#065f46;
            ">
                <div id="fword" style="font-size:40px;"></div>
                <div id="fmeaning" style="font-size:20px;margin-top:10px;"></div>
            </div>

            <button onclick="nextFav()" style="
                padding:12px 25px;
                background:#10b981;
                color:white;
                border:none;
                border-radius:10px;
                font-size:16px;
            ">下一个</button>

            <br><br>

            <button onclick="location.reload()">退出练习</button>
        </div>
    `;

    window.nextFav = function(){

        vibrate();

        const w = favorites[i];

        document.getElementById("fword").innerText = w.word;
        document.getElementById("fmeaning").innerText = w.meaning;

        i++;

        if(i >= favorites.length){
            i = 0; // 循环练习
        }
    };

    nextFav();
}

</script>

</body>
</html>
