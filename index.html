<script>

let words = [];

// 🌍 自动加载词库（你以后可以无限扩展这个文件）
fetch("words.json")
    .then(res => res.json())
    .then(data => {
        words = data;
    })
    .catch(() => {
        // 如果加载失败，备用词库
        words = [
            { word: "Dream", meaning: "梦想" },
            { word: "Future", meaning: "未来" },
            { word: "Success", meaning: "成功" }
        ];
    });

function nextWord() {

    if (words.length === 0) return;

    const random = Math.floor(Math.random() * words.length);

    document.getElementById("word").innerText = words[random].word;
    document.getElementById("meaning").innerText = words[random].meaning;
}

</script>
