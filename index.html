<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Study System</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont;
    overflow:hidden;
    background:#04060b;
}

/* =========================
   彩虹背景（降低曝光）
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-4;
}

/* 暗化层 */
.bg-dark{
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        rgba(0,0,0,.12),
        rgba(0,0,0,.45)
    );

    z-index:-3;
}

/* 玻璃环境 */
.glass-bg{
    position:fixed;
    inset:0;

    background:rgba(255,255,255,.015);

    backdrop-filter:
    blur(55px)
    saturate(130%);

    -webkit-backdrop-filter:
    blur(55px)
    saturate(130%);

    z-index:-2;
}

/* =========================
   标题（苹果磨砂深灰）
========================= */
.title{

    margin-top:72px;

    text-align:center;

    font-size:31px;
    font-weight:560;

    color:rgba(12,12,16,.78);

    letter-spacing:.4px;

    text-shadow:
    0 1px 1px rgba(255,255,255,.14);

    opacity:.95;
}

/* =========================
   容器
========================= */
.container{
    width:90%;
    max-width:390px;
    margin:50px auto;
}

/* =========================
   苹果 Liquid Glass 按钮
========================= */
.btn{

    position:relative;

    margin:18px 0;
    padding:24px;

    border-radius:38px;

    /* 更高级玻璃层 */
    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.11),
        rgba(255,255,255,.035)
    );

    backdrop-filter:
    blur(28px)
    saturate(165%);

    -webkit-backdrop-filter:
    blur(28px)
    saturate(165%);

    /* 高光边缘 */
    border:
    1px solid rgba(255,255,255,.30);

    /* 苹果液态轮廓 */
    box-shadow:

        inset 0 1px 1px rgba(255,255,255,.42),

        inset 0 -1px 1px rgba(255,255,255,.08),

        inset 0 0 18px rgba(255,255,255,.05),

        0 0 0 1px rgba(255,255,255,.03),

        0 12px 40px rgba(0,0,0,.12);

    /* 深灰磨砂字体 */
    color:rgba(10,10,12,.78);

    text-shadow:
    0 1px 1px rgba(255,255,255,.14);

    font-size:18px;
    font-weight:500;

    text-align:center;

    letter-spacing:.2px;

    overflow:hidden;
    cursor:pointer;

    transition:
    transform .16s ease,
    box-shadow .25s ease,
    border-color .25s ease,
    background .25s ease;
}

/* 顶部液态高光 */
.btn::before{

    content:"";

    position:absolute;

    left:2px;
    right:2px;
    top:2px;

    height:48%;

    border-radius:34px;

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.38),
        rgba(255,255,255,.08),
        rgba(255,255,255,0)
    );

    pointer-events:none;
}

/* 边缘柔光 */
.btn::after{

    content:"";

    position:absolute;
    inset:0;

    border-radius:38px;

    box-shadow:
        inset 0 0 22px rgba(255,255,255,.12),
        inset 0 0 3px rgba(255,255,255,.40);

    opacity:.9;

    pointer-events:none;
}

/* Hover */
.btn:hover{

    transform:translateY(-1px);

    border-color:rgba(255,255,255,.40);

    box-shadow:

        inset 0 1px 1px rgba(255,255,255,.50),

        inset 0 0 22px rgba(255,255,255,.06),

        0 14px 42px rgba(0,0,0,.16);
}

/* 按压反馈 */
.btn:active{

    transform:scale(.985);

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.14),
        rgba(255,255,255,.06)
    );

    box-shadow:

        inset 0 2px 10px rgba(255,255,255,.12),

        inset 0 0 25px rgba(255,255,255,.08),

        0 6px 14px rgba(0,0,0,.12);
}

/* =========================
   Footer
========================= */
.tip{

    margin-top:30px;

    text-align:center;

    font-size:13px;

    color:rgba(255,255,255,.22);

    letter-spacing:.3px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="bg-dark"></div>

<div class="glass-bg"></div>

<div class="title">Study System</div>

<div class="container">

<div class="btn" onclick="go('word.html')">📖 单词学习</div>

<div class="btn" onclick="go('quiz.html')">🧠 练习模式</div>

<div class="btn" onclick="go('favorites.html')">⭐ 收藏</div>

<div class="btn" onclick="go('wronglist.html')">❌ 错题本</div>

<div class="btn" onclick="go('review.html')">🔁 复习模式</div>

</div>

<div class="tip">Liquid Glass Interface</div>

<script>

/* =========================
   彩虹动态背景（降低亮度）
========================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let w,h;

function resize(){
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
}

resize();

window.addEventListener("resize",resize);

let points=[];

for(let i=0;i<90;i++){

    points.push({

        x:Math.random()*w,
        y:Math.random()*h,

        vx:(Math.random()-.5)*.28,
        vy:(Math.random()-.5)*.28,

        hue:Math.random()*360,

        r:Math.random()*160+80
    });
}

function draw(){

ctx.clearRect(0,0,w,h);

ctx.globalCompositeOperation="lighter";

for(let p of points){

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>w)p.vx*=-1;
    if(p.y<0||p.y>h)p.vy*=-1;

    p.hue+=.12;

    const g=ctx.createRadialGradient(
        p.x,p.y,0,
        p.x,p.y,p.r
    );

    /* 降低曝光 */
    g.addColorStop(
        0,
        `hsla(${p.hue},100%,68%,0.14)`
    );

    g.addColorStop(
        .45,
        `hsla(${p.hue+40},100%,60%,0.06)`
    );

    g.addColorStop(
        1,
        "rgba(0,0,0,0)"
    );

    ctx.fillStyle=g;

    ctx.beginPath();

    ctx.arc(
        p.x,
        p.y,
        p.r,
        0,
        Math.PI*2
    );

    ctx.fill();
}

ctx.globalCompositeOperation="source-over";

requestAnimationFrame(draw);
}

draw();

/* =========================
   跳转
========================= */

function go(page){

    if(navigator.vibrate){
        navigator.vibrate(10);
    }

    location.href=page;
}

</script>

</body>
</html>
