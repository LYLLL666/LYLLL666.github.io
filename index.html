<style>

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:#f5f7fb;
}

/* 🌈 苹果风“果味彩虹雾” */
.bg{
    position:fixed;
    inset:-60%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,205,210,0.9), transparent 42%),
    radial-gradient(circle at 70% 25%, rgba(187,222,251,0.9), transparent 45%),
    radial-gradient(circle at 40% 75%, rgba(200,230,201,0.9), transparent 48%),
    radial-gradient(circle at 80% 70%, rgba(225,190,231,0.9), transparent 50%),
    radial-gradient(circle at 10% 80%, rgba(255,249,196,0.9), transparent 45%);

    filter: blur(110px) saturate(130%);
    opacity:0.95;

    animation: float 16s ease-in-out infinite;
}

/* 🌊 更“果冻漂浮” */
@keyframes float{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-2%,2%) scale(1.12);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 苹果 visionOS 级玻璃层 */
.glass{
    position:fixed;
    inset:0;

    background:rgba(255,255,255,0.65);

    backdrop-filter: blur(40px) saturate(160%);
    -webkit-backdrop-filter: blur(40px);

    z-index:-2;
}

</style>
