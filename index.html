<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Glass UI</title>

<style>

/* 🚫 系统基础 */
*{
    margin:0;
    padding:0;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
}

body{
    font-family:-apple-system, BlinkMacSystemFont;
    background:#0b0f18;
    overflow:hidden;
}

/* 🌈 1. 光场背景（不是彩虹，是“光源空间”） */
.bg{
    position:fixed;
    inset:-80%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 25%, rgba(255,100,130,0.35), transparent 45%),
    radial-gradient(circle at 70% 30%, rgba(80,160,255,0.35), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(120,255,200,0.25), transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(200,120,255,0.25), transparent 55%);

    filter: blur(140px) saturate(160%);
    animation: drift 18s ease-in-out infinite;
}

@keyframes drift{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-3%,2%) scale(1.2);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 2. 玻璃“折射层”（核心） */
.glass-layer{
    position:fixed;
    inset:0;

    /* 👉 苹果关键：低透明 + 强blur */
    background:rgba(255,255,255,0.05);

    backdrop-filter: blur(70px) saturate(180%);
    -webkit-backdrop-filter: blur(70px);

    z-index:-2;
}

/* 📌 标题 */
h1{
    text-align:center;
    margin-top:50px;
    color:rgba(255,255,255,0.9);
    font-size:28px;
    font-weight:600;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:35px auto;
}

/* 🍏 3. Apple Glass Button（核心） */
.glass-btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    /* 🧠 squircle感（苹果按钮形状） */
    border-radius:28px;

    /* 🧊 玻璃主体 */
    background:rgba(255,255,255,0.06);

    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);

    border:1px solid rgba(255,255,255,0.15);

    color:rgba(255,255,255,0.92);
    font-size:16px;
    font-weight:500;

    text-align:center;

    overflow:hidden;

    /* 🌌 深度 */
    box-shadow:
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.15);

    cursor:pointer;

    transition: all 0.25s cubic-bezier(.2,.9,.2,1);
}

/* ✨ 4. 高光（不是线，是光面） */
.glass-btn::before{
    content:"";
    position:absolute;
    inset:-50%;

    background:
    radial-gradient(circle at 30% 20%,
        rgba(255,255,255,0.22),
        transparent 55%);

    opacity:0.9;
}

/* 🌊 hover轻浮 */
.glass-btn:hover{
    transform: translateY(-3px);
}

/* 🧠 5. 苹果级“形变按压”（关键） */
.glass-btn:active{

    /* 👉 不是缩放，是“压扁” */
    transform: scale(0.96) translateY(2px);

    /* 👉 玻璃变厚（更实） */
    background:rgba(255,255,255,0.10);

    /* 👉 光变暗（像被按住） */
    box-shadow:
        0 15px 30px rgba(0,0,0,0.7),
        inset 0 10px 30px rgba(0,0,0,0.3),
        inset 0 0 20px rgba(255,255,255,0.08);
}

/* 🌫 小字 */
.tip{
    text-align:center;
    color:rgba(255,255,255,0.5);
    font-size:12px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glass-layer"></div>

<h1>📚 Study System</h1>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 Word Study</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 Practice</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ Favorites</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ Mistakes</div>
<div class="glass-btn" onclick="go('review.html')">🔁 Review</div>

</div>

<div class="tip">Apple Liquid Glass (True Material Simulation)</div>

<script>

function go(page){

if(navigator.vibrate){
navigator.vibrate(12);
}

location.href = page;
}

</script>

</body>

</html>
