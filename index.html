<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Canvas</title>

<style>

*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
}

body{
    overflow:hidden;
    background:#05070d;
    font-family:-apple-system, BlinkMacSystemFont;
}

/* 🌌 canvas背景 */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* 🧊 玻璃UI层 */
.ui{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* 🍏 玻璃按钮 */
.glass-btn{
    width:260px;
    padding:18px;
    margin:12px;

    border-radius:26px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);

    color:white;
    text-align:center;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    box-shadow:0 20px 60px rgba(0,0,0,0.6);

    cursor:pointer;

    transition:transform 0.15s ease;
}

/* 🌊 点击压缩 */
.glass-btn:active{
    transform:scale(0.92);
}

.title{
    color:white;
    margin-bottom:20px;
    font-size:22px;
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="ui">

<div class="title">📚 Liquid Glass System</div>

<div class="glass-btn">📖 单词学习</div>
<div class="glass-btn">🧠 练习模式</div>
<div class="glass-btn">⭐ 收藏</div>
<div class="glass-btn">❌ 错题本</div>
<div class="glass-btn">🔁 复习</div>

</div>

<script>

/* =========================
   🌌 光场 canvas 背景
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🌈 光点 */
let points = [];

for(let i=0;i<40;i++){
    points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        r:Math.random()*120+80
    });
}

/* 🌊 动画 */
function animate(){

ctx.clearRect(0,0,w,h);

/* 🌈 光场 */
for(let p of points){

p.x += p.vx;
p.y += p.vy;

if(p.x<0||p.x>w)p.vx*=-1;
if(p.y<0||p.y>h)p.vy*=-1;

/* 渐变光 */
let gradient = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);

gradient.addColorStop(0,"rgba(255,120,180,0.35)");
gradient.addColorStop(0.3,"rgba(120,180,255,0.25)");
gradient.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle = gradient;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

}

requestAnimationFrame(animate);
}

animate();

</script>

</body>

</html>
