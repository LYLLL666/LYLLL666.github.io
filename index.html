<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #d1fae5, #ecfdf5);
    color:#064e3b;
    text-align:center;
}

.container{margin-top:80px;}

.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.word{font-size:40px;}
.meaning{font-size:20px;color:#059669;}

button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.learn-btn{background:#34d399;color:white;}
.like-btn{background:#10b981;color:white;}
.page-btn{background:#22c55e;color:white;}
</style>

</head>

<body>

<div class="container">

<h1>📚 英语学习系统</h1>

<div class="card">
    <div class="word" id="word">加载中...</div>
    <div class="meaning" id="meaning">正在加载词库</div>
</div>

<button class="learn-btn" onclick="nextWord()">下一个</button>
<button class="like-btn" onclick="collectWord()">⭐ 收藏</button>
<button class="page-btn" onclick="openFavorites()">📖 我的收藏</button>
<button class="page-btn" onclick="startQuiz()">🧠 练习模式</button>

<div>
已学习：<span id="count">0</span> |
收藏：<span id="favCount">0</span>
</div>

</div>

<script>

let words = [];
let queue = [];
let currentIndex = 0;
let isReady = false;

let learned = JSON.parse(localStorage.getItem("learned") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

// 📥 加载词库
fetch("words.json")
.then(res => res.json())
.then(data => {

    words = data;
    isReady = true;

    shuffleWords();
    nextWord();
});

// 🔀 洗牌
function shuffleWords(){
    queue = [...words];

    for(let i = queue.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
    }
}

// 📌 下一个单词
function nextWord(){

    if(!isReady){
        console.log("加载中...");
        return;
    }

    if(queue.length === 0){
        shuffleWords();
    }

    const w = queue.pop();
    currentIndex = words.indexOf(w);

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;

    if(!learned.includes(w.word)){
        learned.push(w.word);
        localStorage.setItem("learned", JSON.stringify(learned));
    }

    updateStats();
}

// ⭐ 收藏
function collectWord(){

    if(!isReady) return;

    const w = words[currentIndex];

    if(w && !favorites.find(i => i.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites", JSON.stringify(favorites));
    }

    updateStats();
}

// 📊 更新
function updateStats(){
    document.getElementById("count").innerText = learned.length;
    document.getElementById("favCount").innerText = favorites.length;
}

// 📖 收藏页
function openFavorites(){
    window.location.href = "favorites.html";
}

let quizIndex = 0;
let quizOptions = [];
let quizAnswer = null;

// 🧠 开始练习模式
let quizIndex = 0;
let quizAnswer = null;

function startQuiz(){

    if(!isReady){
        alert("词库加载中...");
        return;
    }

    quizIndex = 0;

    document.body.innerHTML = `
        <h1>🧠 单词练习模式</h1>

        <div class="card">
            <div id="quizWord" style="font-size:40px;"></div>
            <div id="options"></div>
        </div>

        <div id="result" style="margin-top:10px;"></div>

        <div style="margin-top:20px;">
            <button onclick="prevQuiz()">⬅ 上一题</button>
            <button onclick="backMain()">退出</button>
            <button onclick="nextQuiz()">下一题 ➡</button>
        </div>
    `;

    showQuiz();
}

// 📌 显示题目
function showQuiz(){

    const w = words[quizIndex];
    quizAnswer = w;

    let opts = [w.meaning];

    while(opts.length < 4){
        let r = words[Math.floor(Math.random() * words.length)].meaning;
        if(!opts.includes(r)){
            opts.push(r);
        }
    }

    opts.sort(() => Math.random() - 0.5);

    document.getElementById("quizWord").innerText = w.word;

    const box = document.getElementById("options");
    box.innerHTML = "";

    document.getElementById("result").innerHTML = "";

    opts.forEach(opt => {

        const btn = document.createElement("button");

        btn.innerText = opt;
        btn.style = `
            display:block;
            width:80%;
            margin:10px auto;
            padding:10px;
            border-radius:10px;
            border:none;
            background:#d1fae5;
            cursor:pointer;
            font-size:16px;
        `;

        btn.onclick = () => checkAnswer(btn, opt);

        box.appendChild(btn);
    });
}

// 🎯 判断答案（核心升级）
function checkAnswer(btn, opt){

    const buttons = document.querySelectorAll("#options button");
    const correct = quizAnswer.meaning;

    if(opt === correct){

        // ✔ 正确
        btn.style.background = "#22c55e";
        btn.innerText = "✔ 正确";

        document.getElementById("result").innerHTML =
            "<h2 style='color:green'>回答正确 🎉</h2>";

    }else{

        // ❌ 错误
        btn.style.background = "#ef4444";
        btn.innerText = "❌ 错误";

        document.getElementById("result").innerHTML =
            "<h2 style='color:red'>错误，已显示正确答案</h2>";

        // ⭐ 显示正确答案
        buttons.forEach(b => {
            if(b.innerText === correct){
                b.style.background = "#22c55e";
                b.innerText = "✔ 正确答案";
            }else{
                b.style.opacity = "0.4";
            }
        });

        // ⭐ 加入收藏
        if(!favorites.find(i => i.word === quizAnswer.word)){
            favorites.push(quizAnswer);
            localStorage.setItem("favorites", JSON.stringify(favorites));
        }

        updateStats();
    }

    // 🚀 自动下一题（统一）
    setTimeout(() => {
        nextQuiz();
    }, 800);
}

// ➡ 下一题
function nextQuiz(){
    quizIndex++;
    if(quizIndex >= words.length) quizIndex = 0;
    showQuiz();
}

// ⬅ 上一题
function prevQuiz(){
    quizIndex--;
    if(quizIndex < 0) quizIndex = words.length - 1;
    showQuiz();
}

// 🔙 返回主页面
function backMain(){
    location.reload();
}

</script>

</body>
</html>
