<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{margin-top:80px;}

.card{
    width:320px;
    margin:20px auto;
    background:rgba(255,255,255,0.1);
    padding:25px;
    border-radius:20px;
}

.word{font-size:40px;}
.meaning{color:#38bdf8;font-size:20px;}

button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.learn-btn{background:#38bdf8;color:white;}
.like-btn{background:#22c55e;color:white;}
.next-btn{background:#f59e0b;color:white;}

.stats{
    margin-top:20px;
    font-size:16px;
    color:#cbd5e1;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 英语学习系统</h1>

<div class="card">
    <div class="word" id="word">加载中...</div>
    <div class="meaning" id="meaning">正在加载词库</div>
</div>

<button class="learn-btn" onclick="nextWord()">下一个</button>
<button class="like-btn" onclick="collectWord()">⭐ 收藏</button>
<button class="next-btn" onclick="showFavorites()">📖 收藏列表</button>

<div class="stats">
    已学习：<span id="count">0</span> | 收藏：<span id="favCount">0</span>
</div>

</div>

<script>

let words = [];
let index = 0;

// 📦 本地存储
let learned = JSON.parse(localStorage.getItem("learned") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

// 📥 加载词库
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    nextWord();
})
.catch(() => {
    document.getElementById("word").innerText = "词库加载失败";
});

// 📌 下一个单词
function nextWord(){

    if(words.length === 0) return;

    index = Math.floor(Math.random()*words.length);
    const w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;

    // 记录学习
    if(!learned.includes(w.word)){
        learned.push(w.word);
        localStorage.setItem("learned", JSON.stringify(learned));
    }

    updateStats();
}

// ⭐ 收藏
function collectWord(){

    const w = words[index];
    if(!favorites.find(item => item.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites", JSON.stringify(favorites));
    }

    updateStats();
}

// 📖 查看收藏
function showFavorites(){

    if(favorites.length === 0){
        alert("暂无收藏");
        return;
    }

    let list = favorites.map(f => f.word + " - " + f.meaning).join("\n");
    alert("收藏单词：\n\n" + list);
}

// 📊 更新统计
function updateStats(){
    document.getElementById("count").innerText = learned.length;
    document.getElementById("favCount").innerText = favorites.length;
}

</script>

</body>
</html>
