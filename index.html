<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Study System</title>

<style>

/* =========================
   🧼 RESET
========================= */
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:-apple-system, BlinkMacSystemFont;
    background:#05070d;
    overflow:hidden;
}

/* =========================
   🌈 CANVAS BACKGROUND
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* =========================
   🧊 GLASS OVERLAY LAYER
========================= */
.glass-bg{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.03);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px);
    z-index:-2;
}

/* =========================
   📌 TITLE
========================= */
.title{
    text-align:center;
    margin-top:60px;
    font-size:28px;
    font-weight:600;
    color:rgba(255,255,255,0.92);
}

/* =========================
   📦 CONTAINER
========================= */
.container{
    width:90%;
    max-width:360px;
    margin:40px auto;
}

/* =========================
   🍏 LIQUID GLASS BUTTON
========================= */
.btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:30px;

    background:rgba(255,255,255,0.07);

    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);

    border:1px solid rgba(255,255,255,0.16);

    color:rgba(255,255,255,0.92);
    font-size:16px;
    font-weight:500;

    text-align:center;

    box-shadow:
        0 35px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.12);

    cursor:pointer;

    transition: transform 0.15s ease;
}

/* ✨ 高光层 */
.btn::before{
    content:"";
    position:absolute;
    inset:-60%;

    background:radial-gradient(
        circle at 30% 20%,
        rgba(255,255,255,0.22),
        transparent 60%
    );

    opacity:0.9;
}

/* 🌊 hover */
.btn:hover{
    transform:translateY(-2px);
}

/* 🧠 点击反馈（苹果风压感） */
.btn:active{
    transform:scale(0.92);
    background:rgba(255,255,255,0.12);
}

/* =========================
   🌫 FOOTER
========================= */
.tip{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:rgba(255,255,255,0.45);
}

</style>

</head>

<body>

<!-- 🌈 动态彩虹背景 -->
<canvas id="bg"></canvas>

<!-- 🧊 玻璃环境层 -->
<div class="glass-bg"></div>

<div class="title">📚 Study System</div>

<div class="container">

<div class="btn" onclick="go('word.html')">📖 单词学习</div>
<div class="btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="btn" onclick="go('review.html')">🔁 复习模式</div>

</div>

<div class="tip">Liquid Glass + Rainbow Light Field UI</div>

<script>

/* =========================
   🌈 RAINBOW LIGHT FIELD
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🌈 光粒子 */
let points = [];

for(let i=0;i<120;i++){
    points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5,
        hue:Math.random()*360,
        r:Math.random()*120+60
    });
}

/* 🌊 动画 */
function animate(){

ctx.clearRect(0,0,w,h);

/* ✨ 光混合模式 */
ctx.globalCompositeOperation = "lighter";

for(let p of points){

p.x += p.vx;
p.y += p.vy;

if(p.x<0||p.x>w)p.vx*=-1;
if(p.y<0||p.y>h)p.vy*=-1;

p.hue += 0.3;

let gradient = ctx.createRadialGradient(
    p.x,p.y,0,
    p.x,p.y,p.r
);

gradient.addColorStop(0,`hsla(${p.hue},100%,70%,0.35)`);
gradient.addColorStop(0.4,`hsla(${p.hue+40},100%,60%,0.15)`);
gradient.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle = gradient;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

}

ctx.globalCompositeOperation = "source-over";

requestAnimationFrame(animate);
}

animate();

/* =========================
   📱 NAV
========================= */
function go(page){

if(navigator.vibrate){
navigator.vibrate(12);
}

location.href = page;
}

</script>

</body>

</html>
