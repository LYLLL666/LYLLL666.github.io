<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning</title>

<script>

let words = [];
let queue = [];
let currentIndex = 0;
let isReady = false;

let learned = JSON.parse(localStorage.getItem("learned") || "[]");
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

fetch("words.json")
.then(res => res.json())
.then(data => {

    words = data;
    isReady = true;

    shuffleWords();
    nextWord();
});

// 🔀 洗牌
function shuffleWords(){
    queue = [...words];

    for(let i = queue.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
    }
}

// 📌 下一个单词
function nextWord(){

    if(!isReady){
        alert("词库加载中...");
        return;
    }

    if(queue.length === 0){
        shuffleWords();
    }

    const w = queue.pop();
    currentIndex = words.indexOf(w);

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;

    if(!learned.includes(w.word)){
        learned.push(w.word);
        localStorage.setItem("learned", JSON.stringify(learned));
    }

    updateStats();
}

// ⭐ 收藏（🔥彻底修复版）
function collectWord(){

    if(!isReady) return;

    const w = words[currentIndex];

    if(w && !favorites.find(i => i.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites", JSON.stringify(favorites));
    }

    updateStats();
}

// 📊 更新
function updateStats(){
    document.getElementById("count").innerText = learned.length;
    document.getElementById("favCount").innerText = favorites.length;
}

// 📖 打开收藏页
function openFavorites(){
    window.location.href = "favorites.html";
}
    
window.openFavorites = function(){
    window.location.href = "favorites.html";
}
    
</script>

</body>
</html>
