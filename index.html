<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Water UI</title>

<style>

/* =========================
   🧼 BASE
========================= */
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:-apple-system, BlinkMacSystemFont;
    background:#05070d;
    overflow:hidden;
}

/* =========================
   🌈 BACKGROUND
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-2;
}

/* =========================
   📦 CONTAINER
========================= */
.container{
    width:90%;
    max-width:360px;
    margin:120px auto;
}

/* =========================
   💧 WATER DROPLET BUTTON
   👉 只剩轮廓高光
========================= */
.btn{
    position:relative;
    height:56px;
    margin:18px 0;

    border-radius:999px;
    background:transparent;
    cursor:pointer;

    overflow:hidden;

    transition: transform 0.25s ease;
}

/* 💎 轮廓水滴高光 */
.btn::before{
    content:"";
    position:absolute;
    inset:0;

    border-radius:inherit;

    /* 只保留“边缘体积感” */
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.22),
        0 0 22px rgba(120,200,255,0.35),
        inset 0 0 14px rgba(255,255,255,0.08);

    /* 水滴折射感 */
    background:
        radial-gradient(circle at 30% 20%,
            rgba(255,255,255,0.35),
            transparent 60%
        ),
        radial-gradient(circle at 70% 80%,
            rgba(255,255,255,0.12),
            transparent 70%
        );

    filter: blur(0.25px);

    pointer-events:none;
}

/* 内部完全透明 */
.btn::after{
    content:"";
    position:absolute;
    inset:0;
    background:transparent;
    pointer-events:none;
}

/* hover 浮起 */
.btn:hover{
    transform:translateY(-2px);
}

/* press 水滴压扁 */
.btn:active{
    transform:scale(0.93);
}

.btn:active::before{
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.35),
        0 0 28px rgba(120,200,255,0.55),
        inset 0 10px 20px rgba(0,0,0,0.25),
        inset 0 -8px 20px rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <div class="btn"></div>
    <div class="btn"></div>
    <div class="btn"></div>
    <div class="btn"></div>
    <div class="btn"></div>
</div>

<script>

/* =========================
   🌈 彩色流动背景
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let points = [];

for(let i=0;i<90;i++){
    points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        hue:Math.random()*360,
        r:Math.random()*150+60
    });
}

function animate(){

/* 🌫 稍微亮一点的底色（减少黑） */
ctx.fillStyle = "rgba(10,18,30,0.35)";
ctx.fillRect(0,0,w,h);

ctx.globalCompositeOperation="lighter";

for(let p of points){

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>w)p.vx*=-1;
if(p.y<0||p.y>h)p.vy*=-1;

p.hue+=0.6;

/* 🌈 流动彩色能量 */
let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);

g.addColorStop(0,`hsla(${p.hue},100%,70%,0.45)`);
g.addColorStop(0.4,`hsla(${p.hue+40},100%,60%,0.18)`);
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

}

ctx.globalCompositeOperation="source-over";

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
