<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Study System</title>

<style>

/* =========================
   🧼 BASE
========================= */
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:-apple-system, BlinkMacSystemFont;
    background:#05070d;
    overflow:hidden;
}

/* =========================
   🌈 RAINBOW LIGHT FIELD
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* =========================
   🧊 ENV GLASS LAYER
========================= */
.glass-bg{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.02);
    backdrop-filter: blur(60px) saturate(200%);
    -webkit-backdrop-filter: blur(60px);
    z-index:-2;
}

/* =========================
   📌 TITLE
========================= */
.title{
    text-align:center;
    margin-top:60px;
    font-size:28px;
    font-weight:600;
    color:rgba(255,255,255,0.92);
}

/* =========================
   📦 CONTAINER
========================= */
.container{
    width:90%;
    max-width:360px;
    margin:40px auto;
}

/* =========================
   💎 LIQUID CRYSTAL BUTTON
   （最终晶莹水滴版）
========================= */
.btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:38px;

    /* 💧 更透明（关键修复） */
    background:rgba(255,255,255,0.075);

    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

    border:1px solid rgba(255,255,255,0.20);

    color:rgba(255,255,255,0.96);
    font-size:16px;
    font-weight:500;
    text-align:center;

    overflow:hidden;
    cursor:pointer;

    /* ✨ 更“空气感”阴影（去灰） */
    box-shadow:
        0 24px 55px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.40),
        inset 0 -10px 18px rgba(0,0,0,0.10);

    transition:
        transform 0.18s cubic-bezier(.2,.9,.2,1),
        background 0.25s ease,
        box-shadow 0.25s ease;
}

/* =========================
   ✨ 晶体顶部高光（增强透明感）
========================= */
.btn::before{
    content:"";
    position:absolute;
    inset:-50%;

    border-radius:inherit;

    background:
    radial-gradient(
        circle at 30% 18%,
        rgba(255,255,255,0.65),
        rgba(255,255,255,0.28) 28%,
        rgba(255,255,255,0.10) 55%,
        transparent 78%
    );

    mix-blend-mode: screen;
    opacity:1;

    pointer-events:none;
}

/* =========================
   💧 水晶折射边缘（关键修复）
   👉 不压暗！全部是“发光过渡”
========================= */
.btn::after{
    content:"";
    position:absolute;
    inset:0;

    border-radius:inherit;

    background:
    radial-gradient(
        circle at 50% 0%,
        rgba(255,255,255,0.38),
        transparent 72%
    ),
    radial-gradient(
        circle at 50% 100%,
        rgba(0,0,0,0.08),
        transparent 78%
    ),
    radial-gradient(
        circle at 0% 50%,
        rgba(255,255,255,0.22),
        transparent 75%
    ),
    radial-gradient(
        circle at 100% 50%,
        rgba(255,255,255,0.22),
        transparent 75%
    );

    opacity:1;
    pointer-events:none;
}

/* =========================
   🌊 hover（轻浮）
========================= */
.btn:hover{
    transform:translateY(-2px);
}

/* =========================
   🧠 按压（晶体压缩，不发灰）
========================= */
.btn:active{
    transform:scale(0.97);

    background:rgba(255,255,255,0.10);

    box-shadow:
        0 14px 30px rgba(0,0,0,0.40),
        inset 0 22px 40px rgba(0,0,0,0.18),
        inset 0 0 18px rgba(255,255,255,0.14);
}

/* =========================
   🌫 FOOTER
========================= */
.tip{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:rgba(255,255,255,0.45);
}

</style>

</head>

<body>

<!-- 🌈 背景 -->
<canvas id="bg"></canvas>

<!-- 🧊 环境 -->
<div class="glass-bg"></div>

<div class="title">📚 Study System</div>

<div class="container">

<div class="btn" onclick="go('word.html')">📖 单词学习</div>
<div class="btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="btn" onclick="go('review.html')">🔁 复习模式</div>

</div>

<div class="tip">Liquid Glass · Crystal Droplet System</div>

<script>

/* =========================
   🌈 彩虹光场
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let points = [];

for(let i=0;i<120;i++){
    points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5,
        hue:Math.random()*360,
        r:Math.random()*120+60
    });
}

function animate(){

ctx.clearRect(0,0,w,h);
ctx.globalCompositeOperation="lighter";

for(let p of points){

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>w)p.vx*=-1;
if(p.y<0||p.y>h)p.vy*=-1;

p.hue+=0.25;

let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);

g.addColorStop(0,`hsla(${p.hue},100%,70%,0.35)`);
g.addColorStop(0.4,`hsla(${p.hue+40},100%,60%,0.15)`);
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

}

ctx.globalCompositeOperation="source-over";

requestAnimationFrame(animate);
}

animate();

/* =========================
   📱 跳转
========================= */
function go(page){
if(navigator.vibrate){
navigator.vibrate(10);
}
location.href = page;
}

</script>

</body>
</html>
