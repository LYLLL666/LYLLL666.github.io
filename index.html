<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass V2</title>

<style>

/* ======================
   🧼 RESET
====================== */
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:-apple-system, BlinkMacSystemFont;
    background:#05070d;
    overflow:hidden;
}

/* ======================
   🌈 CANVAS LIGHT FIELD
====================== */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* ======================
   🧊 GLASS BACK LAYER
====================== */
.glass-bg{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.03);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px);
    z-index:-2;
}

/* ======================
   📦 UI
====================== */
.title{
    text-align:center;
    margin-top:60px;
    color:rgba(255,255,255,0.92);
    font-size:28px;
    font-weight:600;
}

.container{
    width:90%;
    max-width:360px;
    margin:40px auto;
}

/* ======================
   🍏 LIQUID GLASS CARD
   （核心：伪折射）
====================== */
.btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:30px;

    background:rgba(255,255,255,0.06);

    backdrop-filter: blur(35px);
    -webkit-backdrop-filter: blur(35px);

    border:1px solid rgba(255,255,255,0.18);

    color:rgba(255,255,255,0.92);
    text-align:center;

    font-size:16px;
    font-weight:500;

    overflow:hidden;

    box-shadow:
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.2);

    cursor:pointer;

    transition: all 0.2s ease;
}

/* ✨ 光层 */
.btn::before{
    content:"";
    position:absolute;
    inset:-50%;

    background:
    radial-gradient(circle at 30% 20%,
        rgba(255,255,255,0.25),
        transparent 60%);

    opacity:0.9;
}

/* ======================
   🌊 hover浮动
====================== */
.btn:hover{
    transform:translateY(-3px);
}

/* ======================
   🧠 按压（材质变化）
====================== */
.btn:active{
    transform:scale(0.94);

    background:rgba(255,255,255,0.11);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.7),
        inset 0 20px 40px rgba(0,0,0,0.35);
}

/* ======================
   🌫 FOOTER
====================== */
.tip{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:rgba(255,255,255,0.45);
}

</style>

</head>

<body>

<!-- 🌈 光场 -->
<canvas id="bg"></canvas>

<!-- 🧊 玻璃层 -->
<div class="glass-bg"></div>

<div class="title">📚 Study System</div>

<div class="container">

<div class="btn">📖 单词学习</div>
<div class="btn">🧠 练习模式</div>
<div class="btn">⭐ 收藏</div>
<div class="btn">❌ 错题本</div>
<div class="btn">🔁 复习模式</div>

</div>

<div class="tip">Liquid Glass V2 - Refraction System</div>

<script>

/* ======================
   🌈 光场背景（增强版）
====================== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let p = [];

for(let i=0;i<100;i++){
    p.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        r:Math.random()*140+60,
        hue:Math.random()*360
    });
}

function draw(){

ctx.clearRect(0,0,w,h);
ctx.globalCompositeOperation="lighter";

for(let i of p){

i.x+=i.vx;
i.y+=i.vy;

if(i.x<0||i.x>w)i.vx*=-1;
if(i.y<0||i.y>h)i.vy*=-1;

i.hue+=0.3;

let g=ctx.createRadialGradient(i.x,i.y,0,i.x,i.y,i.r);

g.addColorStop(0,`hsla(${i.hue},100%,70%,0.35)`);
g.addColorStop(0.4,`hsla(${i.hue+40},100%,60%,0.15)`);
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(i.x,i.y,i.r,0,Math.PI*2);
ctx.fill();

}

ctx.globalCompositeOperation="source-over";

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
