<script>
window.onerror = function(msg, src, line, col, err){
    document.body.innerHTML =
    "<h2 style='color:red'>JS报错</h2>" +
    "<pre>" + msg + "</pre>" +
    "<br>行号：" + line;
};
</script>
<script>
window.onerror = function(msg, src, line, col, err){
    document.body.innerHTML =
    "<h2 style='color:red'>JS真实错误：</h2>" +
    "<pre>" + msg + "</pre>" +
    "<br>文件：" + src +
    "<br>行号：" + line +
    "<br>列号：" + col;
};
