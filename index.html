<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语学习系统</title>

<style>

/* 🌈 整体浅色背景 */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(180deg,#f0f9ff,#ecfdf5);
    text-align:center;
    color:#0f172a;
}

/* 🧠 标题 */
h1{
    margin-top:40px;
    font-size:26px;
    font-weight:bold;
}

/* 📦 卡片容器 */
.container{
    width:90%;
    max-width:360px;
    margin:30px auto;
}

/* 🎯 按钮卡片 */
.card-btn{
    background:white;
    margin:14px 0;
    padding:16px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    cursor:pointer;
    transition:all 0.15s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:16px;
    user-select:none;
}

/* ✨ 点击效果（轻微震动感） */
.card-btn:active{
    transform:scale(0.97);
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* 🧩 图标 */
.icon{
    font-size:20px;
}

/* 🌿 底部提示 */
.tip{
    margin-top:20px;
    font-size:12px;
    color:#64748b;
}

</style>

</head>

<body>

<h1>📚 英语学习系统</h1>

<div class="container">

<div class="card-btn" onclick="go('word.html')">
<span class="icon">📖</span> 单词学习
</div>

<div class="card-btn" onclick="go('quiz.html')">
<span class="icon">🧠</span> 练习模式
</div>

<div class="card-btn" onclick="go('favorites.html')">
<span class="icon">⭐</span> 我的收藏
</div>

<div class="card-btn" onclick="go('wronglist.html')">
<span class="icon">❌</span> 错题本
</div>

<div class="card-btn" onclick="go('review.html')">
<span class="icon">🔁</span> 错题复习
</div>

</div>

<div class="tip">轻量学习 · 每天进步一点点</div>

<script>

function go(page){

// 📳 轻触反馈（手机震动）
if(navigator.vibrate){
navigator.vibrate(15);
}

location.href = page;

}

</script>

</body>

</html>
