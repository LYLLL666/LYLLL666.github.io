<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass Study System</title>

    <style>
        /* =========================
           🧼 基础重置
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 苹果典型的深色模式背景色，非纯黑 */
            background: #121217; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================
           🌈 背景层 (减弱流动感，增加优雅感)
        ========================= */
        canvas {
            position: fixed;
            inset: 0;
            z-index: -3;
            filter: blur(40px); /* 额外的模糊让流动更丝滑 */
        }

        .glass-bg {
            position: fixed;
            inset: 0;
            /* 增加一点白色的蒙版，减少纯黑感 */
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(80px) saturate(150%);
            -webkit-backdrop-filter: blur(80px);
            z-index: -2;
        }

        /* =========================
           📌 标题
        ========================= */
        .title {
            margin-top: 70px;
            font-size: 28px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -0.5px;
        }

        /* =========================
           🧊 苹果级液态玻璃按键
        ========================= */
        .container {
            width: 90%;
            max-width: 360px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            position: relative;
            padding: 18px 24px;
            border-radius: 22px;
            cursor: pointer;
            
            /* 核心：高通透玻璃材质 */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            
            /* 苹果标志性的“高光边框” */
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;

            /* 阴影：非常轻薄的投影 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* 按键内部的光效 */
        .btn::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), 
                        rgba(255, 255, 255, 0.12) 0%, 
                        transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .btn:hover::before {
            opacity: 1;
        }

        /* 🍎 苹果标准的交互缩放 */
        .btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .tip {
            margin-top: auto;
            margin-bottom: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>

<body>

    <canvas id="bg"></canvas>
    <div class="glass-bg"></div>

    <div class="title">学习系统</div>

    <div class="container">
        <div class="btn" onclick="go('word.html')"><span>📖</span> 单词学习</div>
        <div class="btn" onclick="go('quiz.html')"><span>🧠</span> 练习模式</div>
        <div class="btn" onclick="go('favorites.html')"><span>⭐</span> 收藏中心</div>
        <div class="btn" onclick="go('wronglist.html')"><span>❌</span> 错题本</div>
        <div class="btn" onclick="go('review.html')"><span>🔁</span> 复习巩固</div>
    </div>

    <div class="tip">Designed for iOS 18 Interface</div>

    <script>
        /* =========================
           🌈 背景逻辑：减弱了速度和亮度
        ========================= */
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");

        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        let points = [];
        for (let i = 0; i < 40; i++) { // 减少粒子数量，让背景更干净
            points.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.2, // 速度减慢一倍
                vy: (Math.random() - 0.5) * 0.2,
                hue: Math.random() * 360,
                r: Math.random() * 200 + 150
            });
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            ctx.globalCompositeOperation = "screen"; // 改用 screen 让色彩更柔和，不那么暗

            for (let p of points) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < -100 || p.x > w + 100) p.vx *= -1;
                if (p.y < -100 || p.y > h + 100) p.vy *= -1;

                p.hue += 0.1;
                let g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                // 降低了颜色的透明度(0.1)，减少“黑色块”感
                g.addColorStop(0, `hsla(${p.hue}, 60%, 70%, 0.1)`); 
                g.addColorStop(1, "transparent");

                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();

        /* =========================
           🖱 光源交互控制
        ========================= */
        document.querySelectorAll('.btn').forEach(btn => {
            const move = (e) => {
                const rect = btn.getBoundingClientRect();
                const xPos = e.touches ? e.touches[0].clientX : e.clientX;
                const yPos = e.touches ? e.touches[0].clientY : e.clientY;
                btn.style.setProperty('--x', `${xPos - rect.left}px`);
                btn.style.setProperty('--y', `${yPos - rect.top}px`);
            };
            btn.addEventListener('mousemove', move);
            btn.addEventListener('touchstart', move, {passive: true});
        });

        function go(page) {
            if (navigator.vibrate) navigator.vibrate(8);
            // 这里可以添加页面跳转逻辑
        }
    </script>
</body>

</html>
