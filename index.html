<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习系统 V3</title>

<style>

/* 🚫 去掉所有蓝色选中框 */
*{
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:#0b1020;
}

/* 🌈 混乱彩虹背景 */
.bg{
    position:fixed;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 20%, #ff4d6d, transparent 45%),
    radial-gradient(circle at 70% 30%, #ffd166, transparent 50%),
    radial-gradient(circle at 40% 80%, #4cc9f0, transparent 50%),
    radial-gradient(circle at 80% 70%, #b5179e, transparent 55%),
    radial-gradient(circle at 10% 80%, #06d6a0, transparent 50%);

    filter: blur(100px) saturate(160%);
    opacity:0.88;

    animation: drift 22s ease-in-out infinite;
}

@keyframes drift{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-4%,3%) scale(1.2);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 磨砂层 */
.glass{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    background:rgba(255,255,255,0.05);
    z-index:-2;
}

/* 📌 标题 */
h1{
    text-align:center;
    margin-top:40px;
    color:white;
    font-size:26px;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:30px auto;
}

/* 🧊 液态玻璃按钮（最终版） */
.glass-btn{
    position:relative;
    padding:16px 18px;
    margin:12px 0;

    border-radius:20px;

    background:rgba(255,255,255,0.16);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);

    border:1px solid rgba(255,255,255,0.28);

    color:#0f172a;
    font-size:16px;
    font-weight:500;

    text-align:center;

    box-shadow:
        0 12px 35px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.55);

    cursor:pointer;

    transition:
        transform 0.18s cubic-bezier(.2,.9,.2,1),
        box-shadow 0.18s ease,
        background 0.18s ease;

    overflow:hidden;
}

/* ✨ 苹果高光层 */
.glass-btn::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;

    background:radial-gradient(
        circle at 30% 25%,
        rgba(255,255,255,0.7),
        transparent 45%
    );

    opacity:0.25;
    pointer-events:none;
}

/* 📱 hover */
.glass-btn:hover{
    transform:translateY(-2px);
}

/* 🧠 点击反馈（核心） */
.glass-btn:active{
    transform:scale(0.94);
    box-shadow:
        0 6px 18px rgba(0,0,0,0.22),
        inset 0 2px 10px rgba(0,0,0,0.08);
    background:rgba(255,255,255,0.22);
}

/* 🌫 提示文字 */
.tip{
    text-align:center;
    color:white;
    font-size:12px;
    opacity:0.6;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glass"></div>

<h1>📚 学习系统 V3</h1>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 单词学习</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="glass-btn" onclick="go('review.html')">🔁 错题复习</div>

</div>

<div class="tip">Liquid Glass UI · Learning System</div>

<script>

function go(page){

// 📳 轻触反馈
if(navigator.vibrate){
navigator.vibrate([8]);
}

location.href = page;
}

</script>

</body>

</html>
