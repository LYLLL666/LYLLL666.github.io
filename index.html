<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass Study System Pro</title>

    <style>
        /* =========================
           🧼 基础重置
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #030509;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================
           🌈 背景层
        ========================= */
        canvas {
            position: fixed;
            inset: 0;
            z-index: -3;
        }

        .glass-bg {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(60px) saturate(180%);
            -webkit-backdrop-filter: blur(60px);
            z-index: -2;
        }

        /* =========================
           📌 布局内容
        ========================= */
        .title {
            margin-top: 80px;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .container {
            width: 90%;
            max-width: 380px;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* =========================
           🧊 核心：液体玻璃按钮
        ========================= */
        .btn {
            position: relative;
            padding: 20px;
            border-radius: 24px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.2, 1.2), box-shadow 0.2s ease;

            /* 玻璃本体 */
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            
            /* 模拟精细边框 */
            border: 1px solid rgba(255, 255, 255, 0.15);
            
            /* 文字样式 */
            color: rgba(255, 255, 255, 0.95);
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.5px;

            /* 深度阴影 */
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        /* ✨ 动态交互光源 (通过JS控制) */
        .btn::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle at var(--x, 50%) var(--y, 50%), 
                rgba(255, 255, 255, 0.15) 0%, 
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        /* 🍎 按压动效 */
        .btn:active {
            transform: scale(0.97) translateY(2px);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 5px 15px rgba(0, 0, 0, 0.5),
                inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .tip {
            margin-top: auto;
            margin-bottom: 40px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

    </style>
</head>

<body>

    <canvas id="bg"></canvas>
    <div class="glass-bg"></div>

    <div class="title">Study System</div>

    <div class="container">
        <div class="btn" onclick="go('word.html')">📖 单词学习</div>
        <div class="btn" onclick="go('quiz.html')">🧠 练习模式</div>
        <div class="btn" onclick="go('favorites.html')">⭐ 收藏中心</div>
        <div class="btn" onclick="go('wronglist.html')">❌ 错题笔记本</div>
        <div class="btn" onclick="go('review.html')">🔁 复习巩固</div>
    </div>

    <div class="tip">Experimental Liquid UI · 2026</div>

    <script>
        /* =========================
           🌈 彩虹光场 (优化性能版)
        ========================= */
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");

        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        // 减少粒子数量到 60 以提升移动端性能，增大半径
        let points = [];
        for (let i = 0; i < 60; i++) {
            points.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                hue: Math.random() * 360,
                r: Math.random() * 150 + 100
            });
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            ctx.globalCompositeOperation = "lighter";

            for (let p of points) {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < -100 || p.x > w + 100) p.vx *= -1;
                if (p.y < -100 || p.y > h + 100) p.vy *= -1;

                p.hue += 0.2;

                let g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                g.addColorStop(0, `hsla(${p.hue}, 80%, 60%, 0.25)`);
                g.addColorStop(1, "transparent");

                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();

        /* =========================
           🖱 鼠标光源追踪逻辑
        ========================= */
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(btn => {
            const handleMove = (e) => {
                const rect = btn.getBoundingClientRect();
                // 兼容触摸屏和鼠标
                const xPos = e.touches ? e.touches[0].clientX : e.clientX;
                const yPos = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = ((xPos - rect.left) / rect.width) * 100;
                const y = ((yPos - rect.top) / rect.height) * 100;
                
                btn.style.setProperty('--x', `${x}%`);
                btn.style.setProperty('--y', `${y}%`);
            };

            btn.addEventListener('mousemove', handleMove);
            btn.addEventListener('touchmove', handleMove, {passive: true});
        });

        /* =========================
           📱 触感反馈与跳转
        ========================= */
        function go(page) {
            if (navigator.vibrate) {
                navigator.vibrate(10); // 短促震动
            }
            
            // 延迟跳转，让用户看清点击效果
            setTimeout(() => {
                console.log("Navigating to:", page);
                // location.href = page; // 实际使用时取消注释
            }, 150);
        }
    </script>

</body>
</html>
