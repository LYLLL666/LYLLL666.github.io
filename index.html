<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习系统 V4</title>

<style>

/* 🚫 去蓝框 */
*{
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:#050816;
}

/* 🌈 第一层彩虹流体 */
.bg1{
    position:fixed;
    top:-60%;
    left:-60%;
    width:220%;
    height:220%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 30%, #ff006e, transparent 40%),
    radial-gradient(circle at 60% 20%, #ffbe0b, transparent 45%),
    radial-gradient(circle at 40% 70%, #3a86ff, transparent 50%),
    radial-gradient(circle at 80% 80%, #8338ec, transparent 55%),
    radial-gradient(circle at 10% 80%, #06d6a0, transparent 50%);

    filter: blur(120px) saturate(180%);
    opacity:0.85;

    animation: drift1 18s infinite ease-in-out;
}

/* 🌊 第二层反向漂移 */
.bg2{
    position:fixed;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    z-index:-4;

    background:
    radial-gradient(circle at 30% 40%, #ff4d6d, transparent 45%),
    radial-gradient(circle at 70% 60%, #48cae4, transparent 50%),
    radial-gradient(circle at 50% 20%, #f72585, transparent 45%);

    filter: blur(140px);
    opacity:0.6;

    animation: drift2 25s infinite alternate;
}

/* 🌊 不规则流动 */
@keyframes drift1{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-6%,4%) scale(1.25);}
100%{transform:translate(0,0) scale(1);}
}

@keyframes drift2{
0%{transform:translate(0,0) scale(1);}
100%{transform:translate(5%,-5%) scale(1.2);}
}

/* 🧊 磨砂层 */
.glass{
    position:fixed;
    inset:0;
    backdrop-filter: blur(45px);
    background:rgba(255,255,255,0.05);
    z-index:-2;
}

/* 📌 标题 */
h1{
    text-align:center;
    margin-top:40px;
    color:white;
    font-size:26px;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:30px auto;
}

/* 🧊 超级液态按钮 */
.glass-btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:22px;

    background:rgba(255,255,255,0.16);
    backdrop-filter: blur(30px);

    border:1px solid rgba(255,255,255,0.3);

    color:#0f172a;
    font-size:16px;
    font-weight:500;

    text-align:center;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.6);

    cursor:pointer;

    transition: all 0.25s cubic-bezier(.2,.9,.2,1);

    overflow:hidden;
}

/* ✨ 高光流动 */
.glass-btn::before{
    content:"";
    position:absolute;
    inset:-50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent 45%);
    opacity:0.25;
}

/* 🌊 hover漂浮 */
.glass-btn:hover{
    transform:translateY(-3px) scale(1.01);
}

/* 🧠 超级按压效果（重点） */
.glass-btn:active{
    transform:scale(0.92) translateY(2px);

    box-shadow:
        0 5px 15px rgba(0,0,0,0.35),
        inset 0 6px 20px rgba(0,0,0,0.15),
        inset 0 0 20px rgba(255,255,255,0.25);

    background:rgba(255,255,255,0.22);
}

/* 🌫 标语 */
.tip{
    text-align:center;
    color:white;
    font-size:12px;
    opacity:0.7;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="glass"></div>

<h1>📚 学习系统 V4</h1>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 单词学习</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="glass-btn" onclick="go('review.html')">🔁 错题复习</div>

</div>

<div class="tip">Liquid Chaos Glass UI · V4</div>

<script>

function go(page){

if(navigator.vibrate){
navigator.vibrate([10]);
}

location.href = page;
}

</script>

</body>

</html>
