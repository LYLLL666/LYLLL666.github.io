<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Study System</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont;
    overflow:hidden;
    background:#05070d;
}

/* =========================
   彩虹动态背景
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-3;
}

.glass-bg{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.02);
    backdrop-filter:blur(60px) saturate(180%);
    -webkit-backdrop-filter:blur(60px);
    z-index:-2;
}

/* =========================
   标题
========================= */
.title{
    margin-top:70px;
    text-align:center;
    font-size:30px;
    font-weight:600;
    color:rgba(255,255,255,.92);
    letter-spacing:.5px;
}

/* =========================
   容器
========================= */
.container{
    width:90%;
    max-width:380px;
    margin:45px auto;
}

/* =========================
   苹果 Liquid Glass 按钮
========================= */
.btn{
    position:relative;

    margin:18px 0;
    padding:24px;

    border-radius:36px;

    /* 更透明 */
    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.08),
        rgba(255,255,255,.03)
    );

    backdrop-filter:blur(26px) saturate(180%);
    -webkit-backdrop-filter:blur(26px) saturate(180%);

    /* 边缘高光增强 */
    border:1px solid rgba(255,255,255,.28);

    /* 苹果液态高光 */
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.35),
        inset 0 -1px 1px rgba(255,255,255,.08),
        inset 0 0 22px rgba(255,255,255,.05),
        0 0 0 1px rgba(255,255,255,.05),
        0 10px 35px rgba(255,255,255,.03);

    /* 字体 */
    color:rgba(15,15,18,.72);

    text-shadow:
    0 1px 1px rgba(255,255,255,.12);

    font-size:18px;
    font-weight:430;

    text-align:center;
    letter-spacing:.2px;

    overflow:hidden;
    cursor:pointer;

    transition:
    transform .15s ease,
    background .2s ease,
    box-shadow .2s ease;
}

/* 顶部液态高光 */
.btn::before{
    content:"";
    position:absolute;

    left:2px;
    right:2px;
    top:2px;

    height:46%;

    border-radius:34px;

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.34),
        rgba(255,255,255,.05),
        rgba(255,255,255,0)
    );

    pointer-events:none;
}

/* 边缘发光 */
.btn::after{
    content:"";
    position:absolute;
    inset:0;

    border-radius:36px;

    box-shadow:
        inset 0 0 18px rgba(255,255,255,.10),
        inset 0 0 2px rgba(255,255,255,.35);

    pointer-events:none;
}

/* hover */
.btn:hover{
    transform:translateY(-1px);

    border-color:rgba(255,255,255,.36);
}

/* 苹果按压反馈 */
.btn:active{

    transform:scale(.985);

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.12),
        rgba(255,255,255,.05)
    );

    box-shadow:
        inset 0 2px 10px rgba(255,255,255,.10),
        inset 0 0 24px rgba(255,255,255,.06),
        0 4px 10px rgba(0,0,0,.08);
}

/* =========================
   Footer
========================= */
.tip{
    margin-top:28px;
    text-align:center;
    font-size:13px;
    color:rgba(255,255,255,.35);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="glass-bg"></div>

<div class="title">📚 Study System</div>

<div class="container">

<div class="btn" onclick="go('word.html')">📖 单词学习</div>
<div class="btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="btn" onclick="go('review.html')">🔁 复习模式</div>

</div>

<div class="tip">Liquid Glass System + Rainbow Light Field</div>

<script>

/* =========================
   彩虹动态流光
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let points=[];

for(let i=0;i<120;i++){
    points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-.5)*.35,
        vy:(Math.random()-.5)*.35,
        hue:Math.random()*360,
        r:Math.random()*140+70
    });
}

function draw(){

ctx.clearRect(0,0,w,h);
ctx.globalCompositeOperation="lighter";

for(let p of points){

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>w)p.vx*=-1;
    if(p.y<0||p.y>h)p.vy*=-1;

    p.hue+=.2;

    const g=ctx.createRadialGradient(
        p.x,p.y,0,
        p.x,p.y,p.r
    );

    g.addColorStop(0,`hsla(${p.hue},100%,72%,0.32)`);
    g.addColorStop(.45,`hsla(${p.hue+45},100%,65%,0.14)`);
    g.addColorStop(1,"rgba(0,0,0,0)");

    ctx.fillStyle=g;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
}

ctx.globalCompositeOperation="source-over";

requestAnimationFrame(draw);
}

draw();

/* =========================
   跳转
========================= */
function go(page){

if(navigator.vibrate){
navigator.vibrate(12);
}

location.href=page;
}

</script>

</body>
</html>
