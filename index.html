<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Liquid Glass Study System</title>

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background:#0b0d12;
}

/* =========================
   彩虹动态背景
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-4;
}

/* 轻微暗化（不要太黑） */
.bg-dark{
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        rgba(0,0,0,.04),
        rgba(0,0,0,.16)
    );

    z-index:-3;
}

/* 全局玻璃层 */
.glass-bg{
    position:fixed;
    inset:0;

    backdrop-filter:
    blur(45px)
    saturate(145%);

    -webkit-backdrop-filter:
    blur(45px)
    saturate(145%);

    background:rgba(255,255,255,.015);

    z-index:-2;
}

/* =========================
   TITLE
========================= */
.title{

    margin-top:72px;

    text-align:center;

    font-size:32px;
    font-weight:650;

    color:rgba(10,10,12,.78);

    letter-spacing:.2px;

    text-shadow:
    0 1px 1px rgba(255,255,255,.12);
}

/* =========================
   CONTAINER
========================= */
.container{
    width:90%;
    max-width:390px;
    margin:48px auto;
}

/* =========================
   苹果 Liquid Glass Button
========================= */
.btn{

    position:relative;

    margin:20px 0;

    padding:26px;

    border-radius:999px;

    overflow:hidden;

    cursor:pointer;

    /* 真正苹果风格玻璃 */
    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.14),
        rgba(255,255,255,.05)
    );

    backdrop-filter:
    blur(24px)
    saturate(170%);

    -webkit-backdrop-filter:
    blur(24px)
    saturate(170%);

    /* 边缘 */
    border:
    1px solid rgba(255,255,255,.24);

    /* 柔和液态边缘 */
    box-shadow:

        inset 0 1px 1px rgba(255,255,255,.32),

        inset 0 -1px 1px rgba(255,255,255,.08),

        inset 0 0 16px rgba(255,255,255,.05),

        0 8px 30px rgba(0,0,0,.08);

    /* 深灰磨砂字体 */
    color:rgba(12,12,16,.76);

    font-size:18px;
    font-weight:540;

    text-align:center;

    letter-spacing:.2px;

    text-shadow:
    0 1px 1px rgba(255,255,255,.10);

    transition:
    transform .16s ease,
    background .25s ease,
    border-color .25s ease,
    box-shadow .25s ease;
}

/* 苹果液态高光（修复白杠） */
.btn::before{

    content:"";

    position:absolute;

    left:12px;
    right:12px;
    top:6px;

    height:28%;

    border-radius:999px;

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.18),
        rgba(255,255,255,.04),
        transparent
    );

    filter:blur(4px);

    opacity:.95;

    pointer-events:none;
}

/* 边缘湿润感 */
.btn::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:999px;

    box-shadow:

        inset 0 0 18px rgba(255,255,255,.10),

        inset 0 0 2px rgba(255,255,255,.35);

    opacity:.85;

    pointer-events:none;
}

/* Hover */
.btn:hover{

    transform:translateY(-1px);

    border-color:rgba(255,255,255,.34);
}

/* 按压 */
.btn:active{

    transform:scale(.985);

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.16),
        rgba(255,255,255,.06)
    );

    box-shadow:

        inset 0 2px 10px rgba(255,255,255,.10),

        0 4px 14px rgba(0,0,0,.10);
}

/* =========================
   FOOTER
========================= */
.tip{

    margin-top:34px;

    text-align:center;

    font-size:13px;

    color:rgba(255,255,255,.26);

    letter-spacing:.4px;
}

</style>
</head>

<body>

<!-- 背景 -->
<canvas id="bg"></canvas>

<!-- 暗化 -->
<div class="bg-dark"></div>

<!-- 玻璃环境 -->
<div class="glass-bg"></div>

<!-- 标题 -->
<div class="title">Study System</div>

<!-- 按钮 -->
<div class="container">

<div class="btn" onclick="go('word.html')">
📖 单词学习
</div>

<div class="btn" onclick="go('quiz.html')">
🧠 练习模式
</div>

<div class="btn" onclick="go('favorites.html')">
⭐ 收藏
</div>

<div class="btn" onclick="go('wronglist.html')">
❌ 错题本
</div>

<div class="btn" onclick="go('review.html')">
🔁 复习模式
</div>

</div>

<div class="tip">
Liquid Glass Interface
</div>

<script>

/* =========================
   彩虹动态流光
========================= */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){

    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

resize();

window.addEventListener("resize",resize);

let points=[];

/* 减少数量，更高级 */
for(let i=0;i<75;i++){

    points.push({

        x:Math.random()*w,
        y:Math.random()*h,

        vx:(Math.random()-.5)*.22,
        vy:(Math.random()-.5)*.22,

        hue:Math.random()*360,

        r:Math.random()*180+90
    });
}

function draw(){

    ctx.clearRect(0,0,w,h);

    ctx.globalCompositeOperation="lighter";

    for(let p of points){

        p.x += p.vx;
        p.y += p.vy;

        if(p.x<0||p.x>w)p.vx*=-1;
        if(p.y<0||p.y>h)p.vy*=-1;

        p.hue += .08;

        const g = ctx.createRadialGradient(
            p.x,p.y,0,
            p.x,p.y,p.r
        );

        /* 降曝光后的苹果彩色玻璃 */
        g.addColorStop(
            0,
            `hsla(${p.hue},100%,68%,0.18)`
        );

        g.addColorStop(
            .45,
            `hsla(${p.hue+40},100%,60%,0.08)`
        );

        g.addColorStop(
            1,
            "rgba(0,0,0,0)"
        );

        ctx.fillStyle = g;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.r,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    ctx.globalCompositeOperation="source-over";

    requestAnimationFrame(draw);
}

draw();

/* =========================
   页面跳转
========================= */

function go(page){

    if(navigator.vibrate){
        navigator.vibrate(10);
    }

    location.href = page;
}

</script>

</body>
</html>
