<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习系统</title>

<style>

/* 🚫 系统级去选中 */
*{
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;
    background:#05070d;
    overflow:hidden;
}

/* 🌈 苹果“光场彩虹背景” */
.bg{
    position:fixed;
    inset:-60%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 20%, rgba(255, 120, 160, 0.35), transparent 45%),
    radial-gradient(circle at 70% 30%, rgba(120, 180, 255, 0.35), transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(120, 255, 200, 0.3), transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(200, 140, 255, 0.3), transparent 55%),
    radial-gradient(circle at 10% 80%, rgba(255, 220, 120, 0.25), transparent 50%);

    filter: blur(130px) saturate(140%);
    opacity:0.95;

    animation: flow 22s ease-in-out infinite;
}

@keyframes flow{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-3%,2%) scale(1.15);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 visionOS玻璃层 */
.glass-layer{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(55px) saturate(180%);
    -webkit-backdrop-filter: blur(55px);
    z-index:-2;
}

/* 📌 标题 */
h1{
    text-align:center;
    margin-top:50px;
    font-size:28px;
    font-weight:600;
    color:#f8fafc;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:30px auto;
}

/* 🍏 真·苹果玻璃按钮 */
.glass-btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:28px;

    /* 🌈 关键：真正透明 */
    background:rgba(255,255,255,0.06);

    backdrop-filter: blur(38px);
    -webkit-backdrop-filter: blur(38px);

    border:1px solid rgba(255,255,255,0.18);

    color:#f8fafc;
    font-size:16px;
    font-weight:500;

    text-align:center;

    /* 🧊 空间阴影 */
    box-shadow:
        0 25px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.12);

    cursor:pointer;

    overflow:hidden;

    /* ⚡瞬时响应（关键） */
    transition:none;
}

/* ✨ 光折射层 */
.glass-btn::before{
    content:"";
    position:absolute;
    inset:-60%;

    background:radial-gradient(
        circle at 30% 20%,
        rgba(255,255,255,0.2),
        transparent 55%
    );

    opacity:0.7;
}

/* 🌊 hover轻浮 */
.glass-btn:hover{
    transform: translateY(-2px);
}

/* 🧠 🍏 苹果级真实按压（核心） */
.glass-btn:active{
    animation: press 180ms cubic-bezier(.2,1.6,.2,1) forwards;
}

/* ⚡ 强弹性回弹（像系统按钮） */
@keyframes press{

0%{
    transform:scale(1);
}

40%{
    transform:scale(0.85) translateY(6px);
}

70%{
    transform:scale(1.06) translateY(-2px);
}

100%{
    transform:scale(1) translateY(0);
}

}

/* 🌫 小字 */
.tip{
    text-align:center;
    color:#94a3b8;
    font-size:12px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glass-layer"></div>

<h1>📚 学习系统</h1>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 单词学习</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="glass-btn" onclick="go('review.html')">🔁 错题复习</div>

</div>

<div class="tip">Apple Vision Glass UI System</div>

<script>

function go(page){

// ⚡瞬时反馈
if(navigator.vibrate){
navigator.vibrate(10);
}

location.href = page;
}

</script>

</body>

</html>
