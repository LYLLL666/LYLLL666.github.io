<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study UI</title>

<style>

/* 🚫 系统级清理 */
*{
    margin:0;
    padding:0;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
}

body{
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display";
    background:#0b0f17;
    overflow:hidden;
}

/* 🌈 苹果“光场环境”（不是彩虹，是空间光） */
.bg{
    position:fixed;
    inset:-80%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 25%, rgba(255, 90, 120, 0.35), transparent 45%),
    radial-gradient(circle at 70% 30%, rgba(80, 160, 255, 0.35), transparent 50%),
    radial-gradient(circle at 45% 80%, rgba(80, 255, 180, 0.25), transparent 55%),
    radial-gradient(circle at 85% 70%, rgba(190, 120, 255, 0.25), transparent 55%);

    filter: blur(140px) saturate(150%);
    animation: drift 18s ease-in-out infinite;
}

@keyframes drift{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-3%,2%) scale(1.2);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 真实玻璃环境层（关键） */
.environment{
    position:fixed;
    inset:0;

    /* 👉 苹果关键：不是白，是“空气感” */
    background:rgba(255,255,255,0.04);

    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px);

    z-index:-2;
}

/* 📌 标题（Apple SF风） */
.title{
    text-align:center;
    margin-top:55px;
    font-size:28px;
    font-weight:600;
    color:rgba(255,255,255,0.92);
    letter-spacing:0.3px;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:35px auto;
}

/* 🍏 Liquid Glass Card（真正苹果版） */
.glass-btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:30px;

    /* 🧊 核心：透明+环境色 */
    background:rgba(255,255,255,0.07);

    backdrop-filter: blur(45px) saturate(180%);
    -webkit-backdrop-filter: blur(45px);

    /* ✨ 苹果边界光 */
    border:1px solid rgba(255,255,255,0.18);

    color:rgba(255,255,255,0.95);
    font-size:16px;
    font-weight:500;

    text-align:center;

    /* 🌌 空间阴影 */
    box-shadow:
        0 30px 80px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.12);

    overflow:hidden;

    cursor:pointer;

    transition: transform 0.25s cubic-bezier(.2,.9,.2,1);
}

/* ✨ 真实高光（苹果玻璃关键） */
.glass-btn::before{
    content:"";
    position:absolute;
    inset:-60%;

    background:
    radial-gradient(circle at 30% 20%,
        rgba(255,255,255,0.18),
        transparent 55%);

    opacity:0.9;
}

/* 🌊 hover轻浮 */
.glass-btn:hover{
    transform: translateY(-3px);
}

/* 🧠 苹果级按压（真实系统感） */
.glass-btn:active{
    transform: scale(0.94) translateY(2px);

    background:rgba(255,255,255,0.10);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.65),
        inset 0 10px 25px rgba(0,0,0,0.25);
}

/* 🌫 小字 */
.footer{
    text-align:center;
    margin-top:25px;
    font-size:12px;
    color:rgba(255,255,255,0.5);
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="environment"></div>

<div class="title">📚 Study System</div>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 Word Study</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 Practice</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ Favorites</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ Mistakes</div>
<div class="glass-btn" onclick="go('review.html')">🔁 Review</div>

</div>

<div class="footer">Apple Vision-inspired Liquid Glass UI</div>

<script>

function go(page){

if(navigator.vibrate){
navigator.vibrate(12);
}

location.href = page;
}

</script>

</body>

</html>
