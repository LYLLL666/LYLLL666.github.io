<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Water UI</title>

<style>

/* =========================
   🧼 BASE
========================= */
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:-apple-system, BlinkMacSystemFont;
    background:#05070d;
    overflow:hidden;
}

/* =========================
   🌈 BACKGROUND
========================= */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-2;
}

/* =========================
   📌 TITLE
========================= */
.title{
    text-align:center;
    margin-top:60px;
    font-size:28px;
    font-weight:600;
    color:rgba(255,255,255,0.92);
}

/* =========================
   📦 CONTAINER
========================= */
.container{
    width:90%;
    max-width:360px;
    margin:40px auto;
}

/* =========================
   💧 LIQUID WATER BUTTON (核心)
   👉 完全透明 + 只留边缘光
========================= */
.btn{
    position:relative;
    padding:18px;
    margin:14px 0;

    border-radius:42px;

    /* ❗ 关键：完全透明 */
    background:transparent;

    border:none;

    color:rgba(255,255,255,0.95);
    font-size:16px;
    font-weight:500;
    text-align:center;

    cursor:pointer;

    overflow:hidden;

    transition: transform 0.18s cubic-bezier(.2,.9,.2,1);
}

/* =========================
   💧 水滴“边缘光壳（外圈发光）”
   👉 核心视觉
========================= */
.btn::before{
    content:"";
    position:absolute;
    inset:-2px;

    border-radius:inherit;

    /* ✨ 外圈水滴光 */
    background:
    radial-gradient(
        circle at 50% 0%,
        rgba(255,255,255,0.55),
        transparent 70%
    ),
    radial-gradient(
        circle at 50% 100%,
        rgba(0,0,0,0.25),
        transparent 75%
    ),
    radial-gradient(
        circle at 0% 50%,
        rgba(255,255,255,0.35),
        transparent 72%
    ),
    radial-gradient(
        circle at 100% 50%,
        rgba(255,255,255,0.35),
        transparent 72%
    );

    filter: blur(0.4px);
    opacity:1;

    pointer-events:none;
}

/* =========================
   ✨ 内部“高光曲面感”
   👉 不填充，只模拟折射
========================= */
.btn::after{
    content:"";
    position:absolute;
    inset:-10%;

    border-radius:inherit;

    background:
    radial-gradient(
        circle at 30% 20%,
        rgba(255,255,255,0.55),
        rgba(255,255,255,0.20) 30%,
        transparent 70%
    );

    mix-blend-mode: screen;
    opacity:0.9;

    pointer-events:none;
}

/* =========================
   🌊 hover
========================= */
.btn:hover{
    transform:translateY(-2px);
}

/* =========================
   🧠 press（水滴被按压）
========================= */
.btn:active{
    transform:scale(0.96);
}

/* =========================
   🌫 text glow
========================= */
.btn span{
    position:relative;
    z-index:2;
    text-shadow:0 0 10px rgba(255,255,255,0.25);
}

/* =========================
   🌈 footer
========================= */
.tip{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    color:rgba(255,255,255,0.45);
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="title">📚 Liquid Water UI</div>

<div class="container">

<div class="btn"><span>📖 单词学习</span></div>
<div class="btn"><span>🧠 练习模式</span></div>
<div class="btn"><span>⭐ 收藏</span></div>
<div class="btn"><span>❌ 错题本</span></div>
<div class="btn"><span>🔁 复习模式</span></div>

</div>

<div class="tip">Pure Liquid Edge · Transparent Core</div>

<script>

/* =========================
   🌈 背景光场
========================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let points = [];

for(let i=0;i<100;i++){
    points.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5,
        hue:Math.random()*360,
        r:Math.random()*140+60
    });
}

function animate(){

ctx.clearRect(0,0,w,h);
ctx.globalCompositeOperation="lighter";

for(let p of points){

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>w)p.vx*=-1;
if(p.y<0||p.y>h)p.vy*=-1;

p.hue+=0.3;

let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);

g.addColorStop(0,`hsla(${p.hue},100%,70%,0.35)`);
g.addColorStop(0.5,`hsla(${p.hue+30},100%,60%,0.12)`);
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

}

ctx.globalCompositeOperation="source-over";

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
