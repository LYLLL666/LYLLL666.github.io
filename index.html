<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习系统 V3</title>

<style>

/* 🌈 混乱彩虹背景 */
body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:#0b1020;
}

/* 🌈 流体彩虹 */
.bg{
    position:fixed;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 20%, #ff4d6d, transparent 45%),
    radial-gradient(circle at 70% 30%, #ffd166, transparent 50%),
    radial-gradient(circle at 40% 80%, #4cc9f0, transparent 50%),
    radial-gradient(circle at 80% 70%, #b5179e, transparent 55%),
    radial-gradient(circle at 10% 80%, #06d6a0, transparent 50%);

    filter: blur(100px) saturate(160%);
    opacity:0.85;

    animation: drift 22s ease-in-out infinite;
}

@keyframes drift{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-4%,3%) scale(1.2);}
100%{transform:translate(0,0) scale(1);}
}

/* 🧊 磨砂层 */
.glass{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    backdrop-filter: blur(40px);
    background:rgba(255,255,255,0.05);
    z-index:-2;
}

/* 🧊 标题 */
h1{
    text-align:center;
    margin-top:40px;
    color:white;
}

/* 📦 容器 */
.container{
    width:90%;
    max-width:360px;
    margin:30px auto;
}

/* 🧊 液态玻璃按钮 */
.glass-btn{
    position:relative;
    padding:16px;
    margin:12px 0;

    border-radius:18px;

    background:rgba(255,255,255,0.18);
    backdrop-filter: blur(25px);

    border:1px solid rgba(255,255,255,0.25);

    color:#0f172a;
    font-size:16px;

    text-align:center;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.15),
        inset 0 1px 0 rgba(255,255,255,0.4);

    cursor:pointer;

    transition:0.15s;
}

/* ✨ 高光 */
.glass-btn::before{
    content:"";
    position:absolute;
    width:160%;
    height:160%;
    top:-40%;
    left:-40%;
    background:radial-gradient(circle, rgba(255,255,255,0.6), transparent 40%);
    opacity:0.35;
}

/* 📱 点击效果 */
.glass-btn:active{
    transform:scale(0.96);
}

/* 🌫 底部提示 */
.tip{
    text-align:center;
    color:white;
    font-size:12px;
    opacity:0.6;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glass"></div>

<h1>📚 学习系统 V3</h1>

<div class="container">

<div class="glass-btn" onclick="go('word.html')">📖 单词学习</div>
<div class="glass-btn" onclick="go('quiz.html')">🧠 练习模式</div>
<div class="glass-btn" onclick="go('favorites.html')">⭐ 收藏</div>
<div class="glass-btn" onclick="go('wronglist.html')">❌ 错题本</div>
<div class="glass-btn" onclick="go('review.html')">🔁 错题复习</div>

</div>

<div class="tip">Liquid Glass UI · Study System</div>

<script>

function go(page){

if(navigator.vibrate){
navigator.vibrate(15);
}

location.href = page;

}

</script>

</body>

</html>
