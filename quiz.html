<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>练习模式</title>

<style>

body{
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
}

.card{
    width:320px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#word{
    font-size:40px;
    margin-bottom:20px;
    color:#065f46;
}

.option{
    width:85%;
    margin:10px auto;
    padding:12px;
    border-radius:10px;
    border:2px solid #d1d5db;
    background:white;
    color:#065f46;
    cursor:pointer;
    transition:0.2s;
}

.correct{
    background:#bbf7d0 !important;
    border-color:#22c55e;
}

.wrong{
    background:#fecaca !important;
    border-color:#ef4444;
}

#msg{
    margin-top:15px;
    font-size:18px;
    height:30px;
    color:#065f46;
}

.bottom button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#10b981;
    color:white;
    cursor:pointer;
}

.disabled{
    opacity:0.5;
}

</style>
</head>

<body>

<h1>🧠 练习模式</h1>

<div class="card">

    <div id="word"></div>

    <div id="options"></div>

    <div id="msg"></div>

</div>

<div class="bottom">
    <button id="prevBtn" onclick="prevWord()">上一题</button>
    <button onclick="nextWord()">下一题</button>
    <button onclick="location.href='index.html'">退出</button>
</div>

<script>

let words = [];

let current = 0;

let favorites =
JSON.parse(localStorage.getItem("favorites") || "[]");

// ⭐ 当前练习记录（退出即消失）
let history = [];

// 加载词库
fetch("words.json")
.then(res => res.json())
.then(data => {

    words = data;

    shuffle(words);

    showWord();
});

// 打乱
function shuffle(arr){

    for(let i = arr.length - 1; i > 0; i--){

        let j = Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

// 显示题目
function showWord(){

    let w = words[current];

    document.getElementById("word").innerText = w.word;

    document.getElementById("msg").innerText = "";

    // 第一题不能上一题
    let prevBtn = document.getElementById("prevBtn");

    if(current === 0){

        prevBtn.disabled = true;

        prevBtn.classList.add("disabled");

    }else{

        prevBtn.disabled = false;

        prevBtn.classList.remove("disabled");
    }

    let options = [w.meaning];

    while(options.length < 4){

        let random =
        words[Math.floor(Math.random() * words.length)].meaning;

        if(!options.includes(random)){

            options.push(random);
        }
    }

    shuffle(options);

    let box = document.getElementById("options");

    box.innerHTML = "";

    options.forEach(opt => {

        let btn = document.createElement("div");

        btn.className = "option";

        btn.innerText = opt;

        btn.onclick = () => checkAnswer(opt);

        box.appendChild(btn);
    });

    // ⭐ 如果做过这题，恢复状态
    restoreHistory(options);
}

// 检查答案
function checkAnswer(opt){

    let w = words[current];

    let correct = opt === w.meaning;

    // 保存历史
    history[current] = {

        selected: opt,

        correct: correct
    };

    // 错题收藏
    if(!correct){

        if(!favorites.find(i => i.word === w.word)){

            favorites.push(w);

            localStorage.setItem(
                "favorites",
                JSON.stringify(favorites)
            );
        }
    }

    renderAnswer();
    
    // 自动下一题
    setTimeout(() => {

        if(current < words.length - 1){

            nextWord();
        }

    }, 1200);
}

// 渲染答案
function renderAnswer(){

    let w = words[current];

    let record = history[current];

    let all = document.querySelectorAll(".option");

    all.forEach(btn => {

        btn.onclick = null;

        let text = btn.innerText;

        // 正确答案
        if(text === w.meaning){

            btn.classList.add("correct");
        }

        // 用户选错
        if(text === record.selected &&
           text !== w.meaning){

            btn.classList.add("wrong");
        }
    });

    // 提示
    if(record.correct){

        document.getElementById("msg").innerText =
        "✅ 回答正确";

    }else{

        document.getElementById("msg").innerText =
        "❌ 回答错误，已加入收藏";
    }
}

// 恢复历史
function restoreHistory(){

    if(history[current]){

        renderAnswer();
    }
}

// 下一题
function nextWord(){

    if(current < words.length - 1){

        current++;

        showWord();
    }
}

// 上一题
function prevWord(){

    if(current > 0){

        current--;

        showWord();
    }
}

</script>

</body>
</html>
