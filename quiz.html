<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>练习模式</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

/* 👇 只在这里新增（关键） */
*{
    -webkit-tap-highlight-color: transparent;
}
    
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,rgba(255,255,255,.45),rgba(255,255,255,.10),rgba(0,0,0,.02));
    pointer-events:none;
}

.title-card{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;

    padding:10px 18px;
    border-radius:14px;

    background: rgba(255,255,255,0.40);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 8px 20px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);

    font-size:15px;
    font-weight:600;
    color:#0f172a;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(18px);
    box-shadow:0 8px 18px rgba(0,0,0,.12);
    z-index:99999;
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

/* 五卡结构 */
.cards{
    margin-top:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

/* 卡片 */
.card{
    width:300px;
    padding:20px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,.35);
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    cursor:pointer;
    transition:.2s;
}

.card:active{
    transform:scale(.97);
}

/* 单词 */
.word{
    font-size:38px;
    font-weight:700;
}

/* 选项 */
.option{
    font-size:16px;
}

/* 状态 */
.correct{
    background:rgba(34,197,94,.25) !important;
    border-color:rgba(34,197,94,.6) !important;
}

.wrong{
    background:rgba(239,68,68,.25) !important;
    border-color:rgba(239,68,68,.6) !important;
}

/* 底部按钮 */
.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:40px;
    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;
    font-size:22px;
    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    transition:.2s;
}

.btn:active{
    transform:scale(.92);
}

/* =========================
   ⭐ 分组UI
========================= */

.group-wrap{
    position:fixed;
    right:16px;
    top:20px;

    display:flex;
    gap:10px;

    z-index:99999;
}

.group-btn{
    height:44px;
    padding:0 16px;

    border-radius:14px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:13px;
    color:#0f172a;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="back" onclick="exit()">←</div>

<div class="group-wrap">
    <div class="group-btn" id="groupBtn" onclick="chooseGroup()">第1组</div>
    <div class="group-btn" onclick="refreshQuiz()">⟳</div>
</div>

<div class="top">练习模式</div>
<div class="title-card">练习模式</div>

<div class="cards">

    <div class="card word" id="wordCard"></div>

    <div class="card option" id="o0"></div>
    <div class="card option" id="o1"></div>
    <div class="card option" id="o2"></div>
    <div class="card option" id="o3"></div>

</div>

<div class="bottom-bar">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="speak()">🔊</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>
let quizState = JSON.parse(localStorage.getItem("quiz_state") || "{}");

let words = [];
let allWords = [];

let index = Number(localStorage.getItem("quiz_index") || 0);
let answered = false;
let lockNext = false;
let hasSpoken = false;
let currentOptions = [];

/* =========================
   分组（与学习模式同步 word_group）
========================= */
let groupIndex = Number(localStorage.getItem("word_group") || 1);
const GROUP_SIZE = 50;
let totalWords = 0;

function chooseGroup(){

    let maxGroup = Math.ceil(totalWords / GROUP_SIZE) || 5;
    let input = prompt("请选择第几组（1-" + maxGroup + "）");

    let n = Number(input);

    if(!Number.isInteger(n) || n < 1 || n > maxGroup){
        alert("请输入1-" + maxGroup + "之间的整数");
        return;
    }

    groupIndex = n;

    localStorage.setItem("word_group", groupIndex);

    index = 0;

    localStorage.setItem("quiz_index","0");

    applyGroup();
    render();
}

function applyGroup(){

    let start = (groupIndex - 1) * GROUP_SIZE;
    let end = start + GROUP_SIZE;

    words = allWords.slice(start,end);

    document.getElementById("groupBtn").innerText = "第" + groupIndex + "组";
}

fetch("words.json?v=" + Date.now())
.then(res => res.json())
.then(data => {
    totalWords = data.length;

    let saved = localStorage.getItem("quiz_order");

    if(saved){
        allWords = JSON.parse(saved);
    }else{
        allWords = data;
        localStorage.setItem("quiz_order", JSON.stringify(allWords));
    }

    applyGroup();

    bind();
    render();
});

function stateKey(){
    return groupIndex + "_" + index;
}

function render(){

    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("wordCard").innerText = w.word;

    currentOptions = generate(w);

    currentOptions.forEach((opt,i)=>{
        let el = document.getElementById("o"+i);
        el.innerText = opt.text;
        el.className = "card option";
    });

    answered = false;
    lockNext = false;
    hasSpoken = false;

    localStorage.setItem("quiz_index", index);

    requestAnimationFrame(()=>{
        setTimeout(()=> speakAuto(),200);
    });

    let state = quizState[stateKey()];

    if(state){

        answered = true;
        lockNext = true;

        let options = document.querySelectorAll(".option");
        let selected = state.selected;

        if(state.correct){
            options[selected].classList.add("correct");
        }else{
            options[selected].classList.add("wrong");

            currentOptions.forEach((o,idx)=>{
                if(o.correct) options[idx].classList.add("correct");
            });
        }
    }
}

function generate(correct){

    let pool = words
        .filter(w => w.word !== correct.word)
        .sort(() => Math.random() - 0.5)
        .slice(0,3)
        .map(w => ({text:w.definition, correct:false}));

    pool.push({text:correct.definition, correct:true});

    return pool.sort(() => Math.random() - 0.5);
}

function select(i){

    if(answered || lockNext) return;

    answered = true;
    lockNext = true;

    let options = document.querySelectorAll(".option");
    let w = words[index];

    let isCorrect = currentOptions[i].correct;

    quizState[stateKey()] = {
        selected: i,
        correct: isCorrect
    };

    localStorage.setItem("quiz_state", JSON.stringify(quizState));

    if(isCorrect){

        options[i].classList.add("correct");
        autoNext(500);

    }else{

        options[i].classList.add("wrong");

        currentOptions.forEach((o,idx)=>{
            if(o.correct) options[idx].classList.add("correct");
        });

        addWrong(w);
        autoNext(2000);
    }
}

function autoNext(t){

    setTimeout(()=>{

        if(index >= words.length - 1){
            showTip(endTips[Math.floor(Math.random() * endTips.length)]);
            return;
        }

        index++;
        render();

    }, t);
}

function addWrong(w){
    let list = JSON.parse(localStorage.getItem("wrong_list") || "[]");
    if(!list.some(i=>i.word===w.word)){
        list.push(w);
        localStorage.setItem("wrong_list",JSON.stringify(list));
    }
}

function next(){

if(index >= words.length - 1){

    setTimeout(()=>{
        showTip(endTips[Math.floor(Math.random() * endTips.length)]);
    }, 300);

    return;
}

    index++;
    render();
}

function prev(){
    if(index > 0){
        index--;
        render();
    }
}

function speak(){
    let w = words[index];
    if(!w) return;

    let audio = new Audio(
        "https://ssl.gstatic.com/dictionary/static/sounds/oxford/" + w.word.toLowerCase() + "--_us_1.mp3"
    );

    audio.play().catch(()=>{
        let u = new SpeechSynthesisUtterance(w.word);
        u.lang="en-US";
        speechSynthesis.speak(u);
    });
}

function speakAuto(){
    if(hasSpoken) return;
    hasSpoken = true;
    speak();
}

function bind(){
    document.getElementById("wordCard").onclick = speak;
    for(let i=0;i<4;i++){
        document.getElementById("o"+i).onclick = ()=>select(i);
    }
}

function exit(){
    location.href = "index.html";
}

function refreshQuiz(){
    localStorage.removeItem("quiz_state");
    localStorage.removeItem("quiz_index");
    localStorage.removeItem("quiz_order");
    location.reload();
}

function showTip(text){

    let tip = document.createElement("div");

    tip.innerText = text;

    tip.style.position = "fixed";
    tip.style.left = "50%";
    tip.style.bottom = "120px";
    tip.style.transform = "translateX(-50%)";

    tip.style.padding = "8px 14px";
    tip.style.borderRadius = "10px";

    tip.style.fontSize = "13px";
    tip.style.color = "#1f2937";
    tip.style.textShadow = "0 1px 2px rgba(255,255,255,0.6)";
    tip.style.background = "linear-gradient(135deg, rgba(255, 180, 190, 0.35), rgba(255, 220, 180, 0.35), rgba(180, 235, 255, 0.35), rgba(200, 255, 240, 0.35), rgba(220, 200, 255, 0.35))";
    tip.style.backdropFilter = "blur(14px)";
    tip.style.webkitBackdropFilter = "blur(14px)";
    tip.style.zIndex = "99999";

    tip.style.opacity = "0";
    tip.style.transition = "0.2s";

    document.body.appendChild(tip);

    setTimeout(()=>{
        tip.style.opacity = "1";
        tip.style.transform = "translateX(-50%) translateY(-6px)";
    },10);

    setTimeout(()=>{
        tip.style.opacity = "0";
    },3000);

    setTimeout(()=>{
        tip.remove();
    },3400);
}

const endTips = [
    "好啦，这一组做完了哦～先别急着继续，起来走一走也好呀 学习之外的世界也很有意思的！",

    "这一组结束啦，辛苦你啦～要不要先休息一下？看看窗外、喝口水也可以呀 不用一直待在这里的。",

    "做完这一部分啦～可以先放松一下哦 学习很重要，但生活里还有好多可爱的事情等你去发现呢。",

    "这一组已经搞定啦～先别继续刷了嘛，出去动一动或者发会儿呆都很好 真的不用一直学的呀。",

    "完成这一组啦～奖励自己休息一下吧 生活又不只有学习，对吧？慢一点也没关系的～"
];

</script>

</body>
</html>
