<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>练习模式</title>

<style>

/* =========================
   UI完全保持你原来的
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;

    overflow:hidden;

    text-align:center;

    color:#0f172a;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
}

/* 卡片 */
.card{
    margin-top:90px;
    width:300px;
    padding:24px;
    border-radius:24px;

    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);

    margin-left:auto;
    margin-right:auto;
}

#word{
    font-size:44px;
    font-weight:700;
}

/* 选项 */
.options{
    width:320px;
    margin:24px auto 0;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.option{
    padding:16px;
    border-radius:20px;
    background:rgba(255,255,255,.45);
    cursor:pointer;
}

.correct{ background:rgba(52,199,89,.25); }
.wrong{ background:rgba(255,59,48,.22); }

.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:80px;
    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    display:flex;
    align-items:center;
    justify-content:center;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">练习模式</div>

<div class="card">
    <div id="word">Loading...</div>
    <div id="phonetic"></div>
</div>

<div class="options" id="options"></div>

<div class="bottom-bar">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>

/* =========================
   核心：完全模仿学习页
========================= */

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);

/* 错题 */
let wrongs = JSON.parse(localStorage.getItem("wrongs_list") || "[]");

/* =========================
   加载词库（完全同学习页）
========================= */
fetch("words.json")
.then(res => res.json())
.then(data => {

    let saved = localStorage.getItem("words_order");

    if(saved){
        words = JSON.parse(saved);
    }else{
        words = data.sort(() => Math.random() - 0.5);
        localStorage.setItem("words_order", JSON.stringify(words));
    }

    render();
    speak();
});

/* =========================
   渲染
========================= */
function render(){

    if(!words.length) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";

    /* 4选项 */
    let options = [w.definition];

    while(options.length < 4){

        let r = words[Math.floor(Math.random()*words.length)].definition;

        if(r && !options.includes(r)){
            options.push(r);
        }
    }

    options.sort(() => Math.random() - 0.5);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach(text => {

        let div = document.createElement("div");
        div.className = "option";
        div.innerText = text;

        div.onclick = () => check(div, text, w);

        box.appendChild(div);
    });

    localStorage.setItem("word_index", index);
}

/* =========================
   发音（同学习页）
========================= */
function speak(){

    let w = words[index];
    if(!w) return;

    window.speechSynthesis.cancel();

    let u = new SpeechSynthesisUtterance(w.word);
    u.lang = "en-US";
    u.rate = 0.95;

    speechSynthesis.speak(u);
}

/* =========================
   判断
========================= */
function check(el, selected, w){

    let all = document.querySelectorAll(".option");
    all.forEach(i => i.style.pointerEvents = "none");

    if(selected === w.definition){

        el.classList.add("correct");

        setTimeout(next, 500);

    }else{

        el.classList.add("wrong");

        all.forEach(i => {
            if(i.innerText === w.definition){
                i.classList.add("correct");
            }
        });

        saveWrong(w);

        setTimeout(next, 2000);
    }
}

/* =========================
   错题（稳定版）
========================= */
function saveWrong(w){

    if(!w || !w.word) return;

    let exists = wrongs.some(i => i.word === w.word);

    if(!exists){

        wrongs.push({
            word: w.word,
            phonetic: w.phonetic || "",
            definition: w.definition || "",
            example: w.example || ""
        });

        localStorage.setItem("wrongs_list", JSON.stringify(wrongs));
    }
}

/* =========================
   切换（完全模仿学习页逻辑）
========================= */
function next(){

    index++;

    if(index >= words.length){
        index = 0;
    }

    render();
    speak();
}

function prev(){

    if(index > 0){
        index--;
        render();
        speak();
    }
}

/* =========================
   返回
========================= */
function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
