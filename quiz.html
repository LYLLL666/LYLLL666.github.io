<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>练习模式</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    /* 🌈 绿色 + 橙色彩虹混合 */
    background: linear-gradient(
        135deg,
        #34d399 0%,     /* 绿色 */
        #a7f3d0 20%,    /* 浅绿 */
        #fdba74 50%,    /* 橙色 */
        #fb923c 75%,    /* 深橙 */
        #86efac 100%    /* 回到绿 */
    );

    min-height:100vh;
    text-align:center;
    color:#0f172a;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,rgba(255,255,255,.45),rgba(255,255,255,.10),rgba(0,0,0,.02));
    pointer-events:none;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background: radial-gradient(
        circle at 20% 20%,
        rgba(255,255,255,.35),
        transparent 40%
    ),
    radial-gradient(
        circle at 80% 30%,
        rgba(255,200,100,.25),
        transparent 45%
    ),
    radial-gradient(
        circle at 40% 80%,
        rgba(100,255,180,.25),
        transparent 50%
    );

    pointer-events:none;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(18px);
    box-shadow:0 8px 18px rgba(0,0,0,.12);
    z-index:99999;
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

/* 五卡结构 */
.cards{
    margin-top:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

/* 卡片 */
.card{
    width:300px;
    padding:20px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,.35);
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    cursor:pointer;
    transition:.2s;
}

.card:active{
    transform:scale(.97);
}

/* 单词 */
.word{
    font-size:38px;
    font-weight:700;
}

/* 选项 */
.option{
    font-size:16px;
}

/* 状态 */
.correct{
    background:rgba(34,197,94,.25) !important;
    border-color:rgba(34,197,94,.6) !important;
}

.wrong{
    background:rgba(239,68,68,.25) !important;
    border-color:rgba(239,68,68,.6) !important;
}

/* 底部按钮 */
.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:40px;
    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;
    font-size:22px;
    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    transition:.2s;
}

.btn:active{
    transform:scale(.92);
}

</style>
</head>

<body>

<div class="back" onclick="exit()">←</div>
<div class="top">练习模式</div>

<div class="cards">

    <div class="card word" id="wordCard"></div>

    <div class="card option" id="o0"></div>
    <div class="card option" id="o1"></div>
    <div class="card option" id="o2"></div>
    <div class="card option" id="o3"></div>

</div>

<div class="bottom-bar">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="speak()">🔊</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>

/* =========================
   状态存储（新增）
========================= */
let quizState = JSON.parse(localStorage.getItem("quiz_state") || "{}");

let words = [];
let index = Number(localStorage.getItem("quiz_index") || 0);
let answered = false;
let lockNext = false;
let hasSpoken = false;
let currentOptions = [];

/* =========================
   词库
========================= */
fetch("words.json")
.then(res => res.json())
.then(data => {

    let saved = localStorage.getItem("quiz_order");

    if(saved){
        words = JSON.parse(saved);
    }else{
        words = [...data].sort(() => Math.random() - 0.5);
        localStorage.setItem("quiz_order", JSON.stringify(words));
    }

    bind();
    render();
});

/* =========================
   渲染
========================= */
function render(){

    let w = words[index];

    document.getElementById("wordCard").innerText = w.word;

    currentOptions = generate(w);

    currentOptions.forEach((opt,i)=>{
        let el = document.getElementById("o"+i);
        el.innerText = opt.text;
        el.className = "card option";
    });

    answered = false;
    lockNext = false;
    hasSpoken = false;

    localStorage.setItem("quiz_index", index);

    requestAnimationFrame(()=>{
        setTimeout(()=>{
            speakAuto();
        },200);
    });

    /* =========================
       🔥恢复历史选择（新增）
    ========================= */
    let state = quizState[index];

    if(state){

        answered = true;
        lockNext = true;

        let options = document.querySelectorAll(".option");

        let selected = state.selected;

        if(state.correct){

            options[selected].classList.add("correct");

        }else{

            options[selected].classList.add("wrong");

            currentOptions.forEach((o,idx)=>{
                if(o.correct){
                    options[idx].classList.add("correct");
                }
            });
        }
    }
}

/* =========================
   生成选项
========================= */
function generate(correct){

    let pool = words
        .filter(w => w.word !== correct.word)
        .sort(() => Math.random() - 0.5)
        .slice(0,3)
        .map(w => ({text:w.definition, correct:false}));

    pool.push({text:correct.definition, correct:true});

    return pool.sort(() => Math.random() - 0.5);
}

/* =========================
   点击选择（已加状态记录）
========================= */
function select(i){

    if(answered || lockNext) return;

    answered = true;
    lockNext = true;

    let options = document.querySelectorAll(".option");
    let w = words[index];

    let isCorrect = currentOptions[i].correct;

    /* 🔥记录状态（新增） */
    quizState[index] = {
        selected: i,
        correct: isCorrect
    };

    localStorage.setItem("quiz_state", JSON.stringify(quizState));

    if(isCorrect){

        options[i].classList.add("correct");
        autoNext(500);

    }else{

        options[i].classList.add("wrong");

        currentOptions.forEach((o,idx)=>{
            if(o.correct){
                options[idx].classList.add("correct");
            }
        });

        addWrong(w);
        autoNext(2000);
    }
}

/* =========================
   自动翻页
========================= */
function autoNext(t){
    setTimeout(()=>{
        next();
    }, t);
}

/* =========================
   错题本
========================= */
function addWrong(w){
    let list = JSON.parse(localStorage.getItem("wrong_list") || "[]");
    if(!list.some(i=>i.word===w.word)){
        list.push(w);
        localStorage.setItem("wrong_list",JSON.stringify(list));
    }
}

/* =========================
   翻页
========================= */
function next(){
    index = (index + 1) % words.length;
    render();
}

function prev(){
    if(index > 0){
        index--;
        render();
    }
}

/* =========================
   发音系统
========================= */
function speak(){
    playAudio();
}

function speakAuto(){
    if(hasSpoken) return;
    hasSpoken = true;
    playAudio();
}

function playAudio(){

    let w = words[index];
    if(!w) return;

    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${w.word.toLowerCase()}--_us_1.mp3`
    );

    audio.play().catch(()=>{
        let u = new SpeechSynthesisUtterance(w.word);
        u.lang="en-US";
        speechSynthesis.speak(u);
    });
}

/* =========================
   绑定点击
========================= */
function bind(){
    document.getElementById("wordCard").onclick = speak;
    for(let i=0;i<4;i++){
        document.getElementById("o"+i).onclick = ()=>select(i);
    }
}

/* =========================
   退出
========================= */
function exit(){
    location.href = "index.html";
}

</script>

</body>
</html>
