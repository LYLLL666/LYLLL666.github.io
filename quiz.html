<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>练习模式</title>

<style>

/* =========================
   BASE（学习模式统一UI）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top,#dff3ff 0%,#f4fbff 40%,#eaf4ff 70%,#e3efff 100%);
    min-height:100vh;
    text-align:center;
    color:#0f172a;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,rgba(255,255,255,.45),rgba(255,255,255,.10),rgba(0,0,0,.02));
    pointer-events:none;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(18px);
    box-shadow:0 8px 18px rgba(0,0,0,.12);
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

/* =========================
   五卡片结构
========================= */
.cards{
    margin-top:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

/* 卡片统一风格 */
.card{
    width:300px;
    padding:20px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,.35);
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    cursor:pointer;
    transition:.2s;
}

.card:active{
    transform:scale(.97);
}

/* 单词卡 */
.word{
    font-size:38px;
    font-weight:700;
}

/* 选项卡 */
.option{
    font-size:16px;
}

/* 状态 */
.correct{
    background:rgba(34,197,94,.25) !important;
    border-color:rgba(34,197,94,.6) !important;
}

.wrong{
    background:rgba(239,68,68,.25) !important;
    border-color:rgba(239,68,68,.6) !important;
}

/* =========================
   底部按钮（学习模式一致）
========================= */
.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:40px;
    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.4);
    backdrop-filter:blur(18px);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
}

.btn:active{
    transform:scale(.92);
}

</style>
</head>

<body>

<div class="back" onclick="exit()">←</div>
<div class="top">练习模式</div>

<div class="cards">

    <div class="card word" onclick="speak()" id="wordCard"></div>

    <div class="card option" onclick="select(0)" id="o0"></div>
    <div class="card option" onclick="select(1)" id="o1"></div>
    <div class="card option" onclick="select(2)" id="o2"></div>
    <div class="card option" onclick="select(3)" id="o3"></div>

</div>

<div class="bottom-bar">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>

let words = [];
let index = Number(localStorage.getItem("quiz_index") || 0);
let answered = false;
let currentOptions = [];

/* =========================
   词库（锁定顺序）
========================= */
fetch("words.json")
.then(res => res.json())
.then(data => {

    let saved = localStorage.getItem("quiz_order");

    if(saved){
        words = JSON.parse(saved);
    }else{
        words = [...data].sort(() => Math.random() - 0.5);
        localStorage.setItem("quiz_order", JSON.stringify(words));
    }

    render();
});

/* =========================
   渲染
========================= */
function render(){

    let w = words[index];

    document.getElementById("wordCard").innerText = w.word;

    currentOptions = generate(w);

    currentOptions.forEach((opt,i)=>{
        let el = document.getElementById("o"+i);
        el.innerText = opt.text;
        el.className = "card option";
    });

    answered = false;

    localStorage.setItem("quiz_index", index);
}

/* =========================
   生成选项
========================= */
function generate(correct){

    let pool = words
        .filter(w => w.word !== correct.word)
        .sort(()=>Math.random()-0.5)
        .slice(0,3)
        .map(w => ({text:w.definition, correct:false}));

    pool.push({text:correct.definition, correct:true});

    return pool.sort(()=>Math.random()-0.5);
}

/* =========================
   选择答案
========================= */
function select(i){

    if(answered) return;
    answered = true;

    let w = words[index];

    let options = document.querySelectorAll(".option");

    if(currentOptions[i].correct){

        options[i].classList.add("correct");

    }else{

        options[i].classList.add("wrong");

        addWrong(w);

        currentOptions.forEach((o,idx)=>{
            if(o.correct){
                options[idx].classList.add("correct");
            }
        });
    }
}

/* =========================
   错题本
========================= */
function addWrong(w){

    let list = JSON.parse(localStorage.getItem("wrong_list") || "[]");

    if(!list.some(i=>i.word===w.word)){
        list.push(w);
        localStorage.setItem("wrong_list",JSON.stringify(list));
    }
}

/* =========================
   上一题 / 下一题
========================= */
function next(){
    index = (index + 1) % words.length;
    render();
}

function prev(){
    if(index > 0){
        index--;
        render();
    }
}

/* =========================
   发音（学习模式一致）
========================= */
function speak(){

    let w = words[index];

    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${w.word.toLowerCase()}--_us_1.mp3`
    );

    audio.play().catch(()=>{
        let u = new SpeechSynthesisUtterance(w.word);
        u.lang = "en-US";
        speechSynthesis.speak(u);
    });
}

/* 退出 */
function exit(){
    location.href = "index.html";
}

</script>

</body>
</html>
