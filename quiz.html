<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>练习模式</title>

<style>

/* =========================
   UI：完全沿用学习模式（不改）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow:hidden;

    text-align:center;
    color:#0f172a;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,rgba(255,255,255,.45),rgba(255,255,255,.10),rgba(0,0,0,.02));
    pointer-events:none;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
    color:#0f172a;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(18px);
    box-shadow:0 8px 18px rgba(0,0,0,.12), inset 0 1px 1px rgba(255,255,255,.6);
    z-index:99999;
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* 卡片（学习模式同款） */
.card{
    margin-top:90px;
    width:300px;
    padding:22px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,.35);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.4),0 10px 30px rgba(0,0,0,.06);
    margin-left:auto;
    margin-right:auto;
    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

/* 发音按钮（不动） */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;
    width:38px;
    height:38px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:16px;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
    backdrop-filter:blur(12px);
    box-shadow:0 6px 12px rgba(0,0,0,.10), inset 0 1px 1px rgba(255,255,255,.6);
}

/* 选项 */
.options{
    width:320px;
    margin:24px auto 0;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.option{
    padding:16px 18px;
    border-radius:20px;
    background:rgba(255,255,255,.45);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.35);
    font-size:16px;
    cursor:pointer;
}

.correct{ background:rgba(52,199,89,.25); }
.wrong{ background:rgba(255,59,48,.22); }

/* 底部按钮（学习模式同款） */
.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:80px;
    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.35);
    background:linear-gradient(to bottom,rgba(255,255,255,.18),rgba(255,255,255,.06));
    backdrop-filter:blur(18px);
    box-shadow:0 8px 18px rgba(0,0,0,.08);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">练习模式</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>
    <div id="word">Loading...</div>
    <div id="phonetic"></div>
</div>

<div class="options" id="options"></div>

<div class="bottom-bar">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>

let words = [];
let index = 0;

/* 错题本（不动） */
let wrongs = JSON.parse(localStorage.getItem("wronglist") || "[]");

/* 状态保存（关键修复点） */
let state = JSON.parse(localStorage.getItem("quiz_state") || "{}");

/* =========================
   词库：完全复用学习模式逻辑（不刷新）
========================= */
fetch("words.json")
.then(res => res.json())
.then(data => {

    let saved = localStorage.getItem("words_order");

    if(saved){
        words = JSON.parse(saved);
    }else{
        words = [...data].sort(() => Math.random() - 0.5);
        localStorage.setItem("words_order", JSON.stringify(words));
    }

    render();
    speak();
});

/* =========================
   渲染（4选1 + 状态恢复）
========================= */
function render(){

    if(!words.length) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";

    let correct = w.definition;

    let options = [correct];

    while(options.length < 4){
        let r = words[Math.floor(Math.random()*words.length)].definition;
        if(r && !options.includes(r)) options.push(r);
    }

    options.sort(() => Math.random() - 0.5);

    let box = document.getElementById("options");
    box.innerHTML = "";

    let saved = state[index];

    options.forEach(text => {

        let div = document.createElement("div");
        div.className = "option";
        div.innerText = text;

        if(saved){
            div.style.pointerEvents = "none";
            if(text === saved.correct) div.classList.add("correct");
            if(text === saved.selected && text !== saved.correct) div.classList.add("wrong");
        }

        div.onclick = () => check(div, text, w);

        box.appendChild(div);
    });
}

/* =========================
   发音（稳定版）
========================= */
function speak(){

    let w = words[index];
    if(!w) return;

    window.speechSynthesis.cancel();

    let u = new SpeechSynthesisUtterance(w.word);
    u.lang = "en-US";
    u.rate = 0.95;

    speechSynthesis.speak(u);
}

/* =========================
   答题 + 错题
========================= */
function check(el, selected, w){

    let correct = w.definition;

    let all = document.querySelectorAll(".option");
    all.forEach(i => i.style.pointerEvents = "none");

    state[index] = { selected, correct };
    localStorage.setItem("quiz_state", JSON.stringify(state));

    if(selected === correct){

        el.classList.add("correct");
        setTimeout(next, 500);

    }else{

        el.classList.add("wrong");

        all.forEach(i=>{
            if(i.innerText === correct){
                i.classList.add("correct");
            }
        });

        if(!wrongs.some(i => i.word === w.word)){
            wrongs.push(w);
            localStorage.setItem("wronglist", JSON.stringify(wrongs));
        }

        setTimeout(next, 2000);
    }
}

/* =========================
   切换（不刷新）
========================= */
function next(){
    index = (index + 1) % words.length;
    render();
    speak();
}

function prev(){
    if(index > 0){
        index--;
        render();
        speak();
    }
}

/* =========================
   返回
========================= */
function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
