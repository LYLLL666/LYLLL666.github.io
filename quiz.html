<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>练习模式</title>

<style>

/* =========================
   完全复制学习页UI
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow:hidden;
    text-align:center;
    color:#0f172a;
}

/* 返回 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:0 8px 18px rgba(0,0,0,.12);
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

/* 卡片 */
.card{
    margin-top:90px;
    width:300px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);

    margin-left:auto;
    margin-right:auto;

    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

/* 发音 */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;

    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);
}

/* =========================
   练习选项（严格UI统一）
========================= */
.options{
    width:300px;
    margin:24px auto 0;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.option{
    padding:16px;
    border-radius:20px;

    background:rgba(255,255,255,.45);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.35);

    cursor:pointer;

    font-size:16px;
}

.option:active{
    transform:scale(0.98);
}

.correct{
    background:rgba(52,199,89,.25);
}

.wrong{
    background:rgba(255,59,48,.22);
}

/* 底部按钮（完全一致学习页） */
.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:80px;

    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    background:rgba(255,255,255,.2);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
}

.btn:active{
    transform:scale(.92);
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">练习模式</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>
    <div id="word">Loading...</div>
    <div id="phonetic"></div>
</div>

<div class="options" id="options"></div>

<div class="bottom-bar">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>

/* =========================
   数据 & 顺序（完全不刷新）
========================= */
let words = [];
let index = Number(localStorage.getItem("word_index") || 0);

let wrongs = JSON.parse(localStorage.getItem("wrongs_list") || "[]");

/* 只初始化一次随机顺序 */
fetch("words.json")
.then(res => res.json())
.then(data => {

    let saved = localStorage.getItem("words_order");

    if(saved){
        words = JSON.parse(saved);
    }else{
        words = data.sort(() => Math.random() - 0.5);
        localStorage.setItem("words_order", JSON.stringify(words));
    }

    render();
    speak();
});

/* =========================
   渲染题目
========================= */
function render(){

    let w = words[index];
    if(!w) return;

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";

    let options = [w.definition];

    while(options.length < 4){
        let r = words[Math.floor(Math.random()*words.length)].definition;
        if(!options.includes(r)) options.push(r);
    }

    options.sort(() => Math.random() - 0.5);

    let box = document.getElementById("options");
    box.innerHTML = "";

    options.forEach(t => {

        let div = document.createElement("div");
        div.className = "option";
        div.innerText = t;

        div.onclick = () => check(div, t, w);

        box.appendChild(div);
    });

    localStorage.setItem("word_index", index);
}

/* =========================
   发音（完全复用学习页逻辑）
========================= */
function speak(){

    let w = words[index];
    if(!w) return;

    window.speechSynthesis.cancel();

    let u = new SpeechSynthesisUtterance(w.word);
    u.lang = "en-US";
    u.rate = 0.95;

    speechSynthesis.speak(u);
}

/* =========================
   判断
========================= */
function check(el, selected, w){

    let all = document.querySelectorAll(".option");
    all.forEach(i => i.style.pointerEvents = "none");

    if(selected === w.definition){

        el.classList.add("correct");
        setTimeout(() => next(), 500);

    }else{

        el.classList.add("wrong");

        all.forEach(i => {
            if(i.innerText === w.definition){
                i.classList.add("correct");
            }
        });

        saveWrong(w);

        setTimeout(() => next(), 2000);
    }
}

/* =========================
   错题
========================= */
function saveWrong(w){

    if(!w || !w.word) return;

    if(!wrongs.find(i => i.word === w.word)){
        wrongs.push(w);
        localStorage.setItem("wrongs_list", JSON.stringify(wrongs));
    }
}

/* =========================
   切换（不刷新）
========================= */
function next(){
    index = (index + 1) % words.length;
    render();
    speak();
}

function prev(){
    if(index > 0){
        index--;
        render();
        speak();
    }
}

/* =========================
   返回
========================= */
function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
