<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>练习模式</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
}
.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
}
#word{font-size:40px;font-weight:bold;}
.option{
    width:85%;
    margin:10px auto;
    padding:14px;
    border-radius:12px;
    border:2px solid #ddd;
    cursor:pointer;
}
.correct{background:#bbf7d0;}
.wrong{background:#fecaca;}
</style>
</head>

<body>

<h1>🧠 练习模式</h1>

<div class="card">
<div id="word">加载中...</div>
<div id="options"></div>
<div id="msg"></div>
</div>

<script>

let words = [];
let index = 0;

let wrongList =
JSON.parse(localStorage.getItem("wrong_list") || "[]");

fetch("words.json")
.then(res=>res.json())
.then(data=>{
    words = data;
    render();
});

function render(){

let w = words[index];

document.getElementById("word").innerText = w.word;

let options = [w.meaning];

while(options.length<4){
let r = words[Math.floor(Math.random()*words.length)].meaning;
if(!options.includes(r)) options.push(r);
}

options = options.sort(()=>Math.random()-0.5);

document.getElementById("options").innerHTML =
options.map(o =>
`<div class="option" onclick="check('${o}','${w.word}','${w.meaning}')">${o}</div>`
).join("");

}

function check(opt, word, correct){

if(opt !== correct){

if(!wrongList.find(i=>i.word===word)){
wrongList.push({word, meaning:correct});
localStorage.setItem("wrong_list",JSON.stringify(wrongList));
}

document.getElementById("msg").innerText="❌ 错题已记录";

}else{
document.getElementById("msg").innerText="✅ 正确";
}

index++;
render();

}

</script>

</body>
</html>
