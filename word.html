<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>单词学习</title>

<style>
/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* 返回按钮 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;

    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* 主卡片 */
.card{
    margin-top:90px;
    width:300px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    margin-left:auto;
    margin-right:auto;

    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

#pos{
    margin-top:4px;
    font-size:14px;
    opacity:.6;
}

#meaning{
    margin-top:10px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* 发音按钮 */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:16px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(12px);

    box-shadow:
        0 6px 12px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);
}

.audio-btn:active{
    transform:scale(.92);
}

/* 例句 */
.example-card{
    margin-top:18px;
    width:300px;
    padding:20px;
    border-radius:24px;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.3),
        0 10px 25px rgba(0,0,0,.05);

    margin-left:auto;
    margin-right:auto;
}

/* 按钮 */
.bottom-bar{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:300px;

    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06));

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

.btn.disabled{
    opacity:.25;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">单词学习</div>

<div class="card">
    <div class="audio-btn" onclick="playAudio()">🔊</div>

    <div id="word">加载中...</div>
    <div id="phonetic"></div>
    <div id="pos"></div>
    <div id="meaning"></div>
</div>

<div class="example-card">
    <div id="exampleTitle">例句</div>
    <div id="example"></div>
    <div id="exampleTranslation"></div>
</div>

<div class="bottom-bar">
    <div id="prevBtn" class="btn" onclick="prevWord()">←</div>
    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>
</div>

<script>

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

/* ====== 加载词库（已修复） ====== */
fetch("words.json")
.then(res => {
    if(!res.ok) throw new Error("words.json加载失败");
    return res.json();
})
.then(data => {

    let saved = localStorage.getItem("words_order");

    // 🔥 默认用原始数据
    let finalWords = data;

    if(saved){
        try {
            let parsed = JSON.parse(saved);

            // 确保数据有效
            if(Array.isArray(parsed) && parsed.length > 0){
                finalWords = parsed;
            }

        } catch(e){
            console.log("缓存损坏，已重置");
            localStorage.removeItem("words_order");
        }
    };

    // 如果没有缓存 → 随机一次
    if(!saved){
        finalWords = data.sort(() => Math.random() - 0.5);
        localStorage.setItem("words_order", JSON.stringify(finalWords));
    }

    words = finalWords;

    if(index >= words.length) index = 0;

    render();
})
.catch(err => {
    console.log(err);
    document.getElementById("word").innerText = "加载失败";
});

/* ====== 渲染 ====== */
function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";
    document.getElementById("pos").innerText = w.pos || "";
    document.getElementById("meaning").innerText = w.definition || "";

    document.getElementById("example").innerText = w.example || "";
    document.getElementById("exampleTranslation").innerText = w.example_translation || "";

    localStorage.setItem("word_index", index);

    let prevBtn = document.getElementById("prevBtn");
    if(index === 0){
        prevBtn.classList.add("disabled");
    }else{
        prevBtn.classList.remove("disabled");
    }
}

/* ====== 发音 ====== */
function playAudio(){

    let w = words[index];
    if(!w || !w.word) return;

    // 停掉上一句（避免叠音）
    window.speechSynthesis.cancel();

    let utter = new SpeechSynthesisUtterance(w.word);

    // 美式英语发音
    utter.lang = "en-US";

    // 语速（可调）
    utter.rate = 0.95;

    // 音调（可调）
    utter.pitch = 1;

    speechSynthesis.speak(utter);
}

/* ====== 切换 ====== */
function nextWord(){
    index = (index + 1) % words.length;
    render();
    autoPlay();
}

function prevWord(){
    if(index > 0){
        index--;
        render();
        autoPlay();
    }
}

/* ====== 收藏（已修复完整） ====== */
function saveWord(){
    let w = words[index];

    if(!favorites.find(i => i.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites_list", JSON.stringify(favorites));
        document.getElementById("meaning").innerText = "⭐ 已加入收藏";
    }else{
        document.getElementById("meaning").innerText = "⚠️ 已收藏过";
    }
}

/* ====== 返回 ====== */
function back(){
    location.href = "index.html";
}
//自动阅读
function autoPlay(){

    let w = words[index];
    if(!w || !w.word) return;

    // 防止叠音
    window.speechSynthesis.cancel();

    let utter = new SpeechSynthesisUtterance(w.word);
    utter.lang = "en-US";
    utter.rate = 0.95;

    speechSynthesis.speak(utter);
}

</script>

</body>
</html>
