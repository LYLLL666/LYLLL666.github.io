<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词学习</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#eaf4ff,#e3efff);
    height:100vh;
    overflow:hidden;
    text-align:center;
    color:#0f172a;
}

/* 顶部标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

/* 返回按钮（左上角固定） */
.back{
    position:absolute;
    left:16px;
    top:16px;
    font-size:26px;
    cursor:pointer;
}

/* 单词卡 */
.card{
    margin-top:60px;
    width:320px;
    padding:30px;
    border-radius:24px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.35);
    margin-left:auto;
    margin-right:auto;
}

#word{
    font-size:44px;
    font-weight:700;
}

#meaning{
    margin-top:14px;
    font-size:16px;
}

/* 按钮区 */
.bottom-bar{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:120px;
    display:flex;
    gap:60px;
}

/* 圆形按钮 */
.btn{
    width:52px;
    height:52px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.2);
    backdrop-filter:blur(18px);
    cursor:pointer;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.2s;
}

.btn:active{
    transform:scale(.92);
}

/* 禁用状态 */
.btn.disabled{
    opacity:.3;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">单词学习</div>

<div class="card">
    <div id="word">加载中...</div>
    <div id="meaning"></div>
</div>

<div class="bottom-bar">

    <!-- ⭐ 上一个 -->
    <div id="prevBtn" class="btn" onclick="prevWord()">←</div>

    <!-- 收藏 -->
    <div class="btn" onclick="saveWord()">⭐</div>

    <!-- 下一个 -->
    <div class="btn" onclick="nextWord()">→</div>

</div>

<script>

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);

let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    render();
});

function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;

    // ⭐ 保存进度
    localStorage.setItem("word_index", index);

    // ⭐ 控制“上一个”按钮状态
    let prevBtn = document.getElementById("prevBtn");

    if(index === 0){
        prevBtn.classList.add("disabled");
    }else{
        prevBtn.classList.remove("disabled");
    }
}

function nextWord(){
    index = (index + 1) % words.length;
    render();
}

function prevWord(){
    if(index > 0){
        index--;
        render();
    }
}

function saveWord(){

let w = words[index];

if(!favorites.find(i => i.word === w.word)){

favorites.push(w);

localStorage.setItem(
"favorites_list",
JSON.stringify(favorites)
);

document.getElementById("meaning").innerText =
"⭐ 已加入收藏";

}else{
document.getElementById("meaning").innerText =
"⚠️ 已收藏过";
}

}

function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
