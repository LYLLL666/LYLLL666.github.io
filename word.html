<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>单词学习</title>

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* =========================
   APP 容器（关键）
========================= */
.app{
    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;

    position:relative;
}

/* =========================
   安卓优化（最终稳定版）
========================= */
html.is-android body{
    display:flex;
    justify-content:center;
}

/* 🔥只缩 app，不动 body */
html.is-android .app{
    transform: scale(0.78);
    transform-origin: top center;
    width: 128%;
}

/* 防止安卓字体抖动 */
html.is-android *{
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
}

/* =========================
   返回按钮
========================= */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

/* =========================
   标题
========================= */
.top{
    margin-top:18px;
    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* =========================
   主卡片
========================= */
.card{
    margin-top:70px;
    width:300px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

#pos{
    margin-top:4px;
    font-size:14px;
    opacity:.6;
}

#meaning{
    margin-top:10px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* =========================
   发音按钮
========================= */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:16px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(12px);

    box-shadow:
        0 6px 12px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);
}

.audio-btn:active{
    transform:scale(.92);
}

/* =========================
   例句卡
========================= */
.example-card{
    margin-top:18px;
    width:300px;
    padding:20px;
    border-radius:24px;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.3),
        0 10px 25px rgba(0,0,0,.05);
}

/* =========================
   按钮区
========================= */
.bottom-bar{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:80px;

    display:flex;
    gap:80px;
}

/* =========================
   按钮
========================= */
.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06));

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

.btn.disabled{
    opacity:.25;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="app">

<div class="back" onclick="back()">←</div>
<div class="top">单词学习</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>

    <div id="word">加载中...</div>
    <div id="phonetic"></div>
    <div id="pos"></div>
    <div id="meaning"></div>
</div>

<div class="example-card">
    <div id="exampleTitle">例句</div>
    <div id="example"></div>
    <div id="exampleTranslation"></div>
</div>

<div class="bottom-bar">
    <div class="btn" onclick="prevWord()">←</div>
    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>
</div>

</div>

<script>

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

/* 安卓识别 */
if (/Android/i.test(navigator.userAgent)) {
    document.documentElement.classList.add("is-android");
}

/* 加载词库 */
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    if(index >= words.length) index = 0;
    render();
});

function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";
    document.getElementById("pos").innerText = w.pos || "";
    document.getElementById("meaning").innerText = w.definition || "";

    document.getElementById("example").innerText = w.example || "";
    document.getElementById("exampleTranslation").innerText = w.example_translation || "";
}

/* 发音 */
function speak(){

    let w = words[index];
    if(!w || !w.word) return;

    let word = w.word.toLowerCase().trim();

    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${word}--_us_1.mp3`
    );

    audio.play().catch(() => {
        window.speechSynthesis.cancel();

        let u = new SpeechSynthesisUtterance(w.word);
        u.lang = "en-US";
        u.rate = 0.95;

        speechSynthesis.speak(u);
    });

    audio.onerror = function(){
        window.speechSynthesis.cancel();

        let u = new SpeechSynthesisUtterance(w.word);
        u.lang = "en-US";
        u.rate = 0.95;

        speechSynthesis.speak(u);
    };
}

/* 切换 */
function nextWord(){
    index = (index + 1) % words.length;
    render();
    speak();
}

function prevWord(){
    if(index > 0){
        index--;
        render();
        speak();
    }
}

/* 收藏 */
function saveWord(){
    let w = words[index];

    if(!favorites.find(i => i.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites_list", JSON.stringify(favorites));
    }
}

/* 返回 */
function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
