<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词学习</title>

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    /* 🌿 学习沉浸背景 */
    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    text-align:center;
    color:#0f172a;
    overflow:hidden;
}

/* 柔光层 */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* =========================
   TITLE
========================= */
h1{
    margin-top:24px;
    font-size:22px;
    font-weight:600;
    color:rgba(15,23,42,.85);
}

/* =========================
   CARD
========================= */
.card{
    width:320px;
    margin:22px auto;
    padding:28px;

    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);
}

/* 单词 */
#word{
    font-size:44px;
    font-weight:700;
    letter-spacing:1px;
}

/* 释义 */
#meaning{
    margin-top:14px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* =========================
   圆形按钮栏（重点改造）
========================= */
.btn-bar{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:18px;
}

/* 圆形玻璃按钮 */
.btn{
    width:52px;
    height:52px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.18),
        rgba(255,255,255,.06)
    );

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:20px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:all .18s ease;
}

/* hover */
.btn:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,.5);
}

/* active */
.btn:active{
    transform:scale(.92);
}

/* =========================
   TOP BACK BUTTON
========================= */
.top-btn{
    position:absolute;
    left:16px;
    top:14px;

    width:44px;
    height:44px;
    border-radius:50%;

    border:none;

    background:rgba(255,255,255,.4);
    backdrop-filter:blur(16px);

    font-size:18px;

    cursor:pointer;

    box-shadow:0 6px 14px rgba(0,0,0,.08);
}

/* =========================
   SMALL TEXT
========================= */
.tip{
    margin-top:14px;
    font-size:12px;
    color:rgba(71,85,105,.7);
}

</style>
</head>

<body>

<h1>📖 单词学习</h1>

<button class="top-btn" onclick="back()">⬅</button>

<div class="card">

<div id="word">加载中...</div>
<div id="meaning"></div>

<div class="btn-bar">

    <button class="btn" onclick="saveWord()">⭐</button>
    <button class="btn" onclick="nextWord()">➡</button>

</div>

<div class="tip">点击按钮进行学习操作</div>

</div>

<script>

let words = [];
let index = 0;

let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

// 加载
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    render();
});

// 渲染
function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;
}

// 收藏
function saveWord(){

let w = words[index];

if(!favorites.find(i => i.word === w.word)){

favorites.push(w);

localStorage.setItem(
"favorites_list",
JSON.stringify(favorites)
);

document.getElementById("meaning").innerText =
"⭐ 已加入收藏";

}else{

document.getElementById("meaning").innerText =
"⚠️ 已收藏过";

}

}

// 下一个
function nextWord(){
    index = (index + 1) % words.length;
    render();
}

// 返回
function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
