<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词学习</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ecfdf5;
    text-align:center;
    color:#065f46;
}

h1{
    margin-top:25px;
}

.card{
    width:320px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

#word{
    font-size:42px;
    font-weight:bold;
}

#meaning{
    margin-top:15px;
    font-size:18px;
    color:#374151;
}

.btn{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
}

.save{
    background:#10b981;
    color:white;
}

.next{
    background:#3b82f6;
    color:white;
}

.top-btn{
    margin:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#065f46;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>📖 单词学习</h1>

<button class="top-btn" onclick="back()">返回主页</button>

<div class="card">

<div id="word">加载中...</div>
<div id="meaning"></div>

<button class="btn save" onclick="saveWord()">⭐ 加入收藏</button>
<button class="btn next" onclick="nextWord()">➡ 下一个</button>

</div>

<script>

let words = [];
let index = 0;

// ⭐ 收藏库
let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

// 加载单词
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    render();
});

// 渲染单词
function render(){

if(words.length === 0) return;

let w = words[index];

document.getElementById("word").innerText = w.word;
document.getElementById("meaning").innerText = w.meaning;

}

// ⭐ 加入收藏（去重）
function saveWord(){

let w = words[index];

if(!favorites.find(i => i.word === w.word)){

favorites.push(w);

localStorage.setItem(
"favorites_list",
JSON.stringify(favorites)
);

document.getElementById("meaning").innerText =
"⭐ 已加入收藏";

}else{

document.getElementById("meaning").innerText =
"⚠️ 已收藏过";

}

}

// 下一词
function nextWord(){

index++;

if(index >= words.length){
index = 0;
}

render();

}

// 返回主页
function back(){
location.href = "index.html";
}

</script>

</body>

</html>
