<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>单词学习</title>

<style>

/* =========================
   BASE（不动）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

*{
    -webkit-tap-highlight-color: transparent;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* 返回按钮 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

/* =========================
   🔥 当前分组圆形卡片
========================= */
.group-indicator{
    position:fixed;
    right:110px;
    top:18px;

    width:44px;
    height:44px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;
    font-weight:600;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

/* =========================
   分组按钮（右上）
========================= */
.group-btn{
    position:fixed;
    right:16px;
    top:20px;

    width:70px;
    height:44px;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:14px;

    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

.group-btn:active{
    transform:scale(.95);
}

/* ====== 以下UI全部不动 ====== */

.title-card{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;

    padding:10px 18px;
    border-radius:14px;

    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 6px 15px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);

    font-size:15px;
    font-weight:600;
    color:#0f172a;
}

.card{
    margin-top:90px;
    width:300px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    margin-left:auto;
    margin-right:auto;

    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

#pos{
    margin-top:4px;
    font-size:14px;
    opacity:.6;
}

#meaning{
    margin-top:10px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:16px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(12px);

    box-shadow:
        0 6px 12px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);
}

.audio-btn:active{
    transform:scale(.92);
}

.example-card{
    margin-top:18px;
    width:300px;
    padding:20px;
    border-radius:24px;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.3),
        0 10px 25px rgba(0,0,0,.05);

    margin-left:auto;
    margin-right:auto;
}

.bottom-bar{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:220px;

    display:flex;
    gap:80px;
}

.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06));

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>

<div class="group-indicator" id="groupShow">1</div>

<div class="group-btn" onclick="selectGroup()">📚</div>

<div class="title-card">单词学习</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>

    <div id="word">加载中...</div>
    <div id="phonetic"></div>
    <div id="pos"></div>
    <div id="meaning"></div>
</div>

<div class="example-card">
    <div id="example"></div>
</div>

<div class="bottom-bar">
    <div class="btn" onclick="prevWord()">←</div>
    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>
</div>

<script>

/* =========================
   分组系统（5组固定）
========================= */
let groupIndex = Number(localStorage.getItem("word_group") || 0);

function updateGroupUI(){
    document.getElementById("groupShow").innerText = groupIndex + 1;
}

function selectGroup(){

    let g = prompt("选择第几组（1 - 5）");

    if(!g) return;

    g = Number(g) - 1;

    if(g < 0 || g > 4) return;

    groupIndex = g;
    localStorage.setItem("word_group", groupIndex);

    location.reload();
}

function applyGroup(data){

    let start = groupIndex * 50;
    let end = start + 50;

    return data.slice(start, end);
}

/* =========================
   主逻辑
========================= */
let words = [];
let index = Number(localStorage.getItem("word_index") || 0);

fetch("words.json?v=" + Date.now())
.then(res => res.json())
.then(data => {

    data = applyGroup(data);

    words = [...data].sort(() => Math.random() - 0.5);

    if(index >= words.length) index = 0;

    updateGroupUI();
    render();
    setTimeout(() => speak(), 300);
});

function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";
    document.getElementById("pos").innerText = w.pos || "";
    document.getElementById("meaning").innerText = w.definition || "";

    localStorage.setItem("word_index", index);
}

/* =========================
   功能
========================= */
function nextWord(){
    if(index >= words.length - 1) return;
    index++;
    render();
    speak();
}

function prevWord(){
    if(index > 0){
        index--;
        render();
        speak();
    }
}

function speak(){
    let w = words[index];
    if(!w) return;

    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${w.word}--_us_1.mp3`
    );

    audio.play().catch(()=>{});
}

function saveWord(){

    let list = JSON.parse(localStorage.getItem("favorites_list") || "[]");

    let w = words[index];
    if(!w) return;

    if(!list.some(i => i.word === w.word)){
        list.push(w);
        localStorage.setItem("favorites_list", JSON.stringify(list));
    }
}

function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
