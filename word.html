<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词学习</title>

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    height:100vh;
    overflow:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

/* 柔光层 */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* =========================
   TITLE
========================= */
h1{
    margin-top:22px;
    font-size:22px;
    font-weight:600;
    color:rgba(15,23,42,.85);
}

/* =========================
   WORD CARD（保持原逻辑）
========================= */
.card{
    margin-top:60px;
    width:320px;
    padding:30px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    margin-left:auto;
    margin-right:auto;
}

#word{
    font-size:44px;
    font-weight:700;
}

#meaning{
    margin-top:14px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* =========================
   ⭐ 按钮区（关键修改：位置）
========================= */

/* 👉 不贴底，放在中下 */
.bottom-bar{
    position:absolute;

    left:50%;
    transform:translateX(-50%);

    bottom:120px; /* ⭐ 重点：从底部抬上来 */

    display:flex;
    gap:80px;

    align-items:center;
    justify-content:center;
}

/* =========================
   圆形玻璃按钮（完全保留你的原风格）
========================= */
.btn{
    width:52px;
    height:52px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.18),
        rgba(255,255,255,.06)
    );

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:all .18s ease;

    color:rgba(15,23,42,.75);
}

.btn:hover{
    transform:translateY(-2px);
}

.btn:active{
    transform:scale(.92);
}

/* =========================
   返回按钮
========================= */
.back{
    position:absolute;
    left:16px;
    top:16px;

    font-size:26px;
    cursor:pointer;

    color:rgba(15,23,42,.7);
}

/* =========================
   标题
========================= */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;

    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">单词学习</div>

<div class="card">
    <div id="word">加载中...</div>
    <div id="meaning"></div>
</div>

<!-- ⭐ 改动重点：仍然圆形，但位置上移 -->
<div class="bottom-bar">

    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>

</div>

<script>

let words = [];
let index = 0;

let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    render();
});

function render(){
    if(words.length === 0) return;

    let w = words[index];
    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;
}

function saveWord(){

let w = words[index];

if(!favorites.find(i => i.word === w.word)){

favorites.push(w);

localStorage.setItem(
"favorites_list",
JSON.stringify(favorites)
);

document.getElementById("meaning").innerText =
"⭐ 已加入收藏";

}else{

document.getElementById("meaning").innerText =
"⚠️ 已收藏过";

}

}

function nextWord(){
    index = (index + 1) % words.length;
    render();
}

function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
