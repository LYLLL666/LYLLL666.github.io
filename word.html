<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词学习</title>

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    height:100vh;
    overflow:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

/* 柔光层 */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* =========================
   返回按钮（已修复：固定屏幕左上角）
========================= */
.back{
    position:fixed; /* ⭐关键修复 */

    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

/* =========================
   标题
========================= */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;

    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* =========================
   单词卡
========================= */
.card{
    margin-top:100px;
    width:280px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    margin-left:auto;
    margin-right:auto;
}

#word{
    font-size:44px;
    font-weight:700;
}

#meaning{
    margin-top:14px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* =========================
   按钮区域
========================= */
.bottom-bar{
    position:absolute;

    left:50%;
    transform:translateX(-50%);

    bottom:220px;

    display:flex;
    gap:80px;

    align-items:center;
    justify-content:center;
}

/* =========================
   圆形按钮
========================= */
.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,.18),
        rgba(255,255,255,.06)
    );

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

.btn.disabled{
    opacity:.25;
    pointer-events:none;
}

</style>
</head>

<body>

<!-- 返回按钮（已彻底修复位置） -->
<div class="back" onclick="back()">←</div>

<div class="top">单词学习</div>

<div class="card">
    <div id="word">加载中...</div>
    <div id="meaning"></div>
</div>

<div class="bottom-bar">

    <div id="prevBtn" class="btn" onclick="prevWord()">←</div>

    <div class="btn" onclick="saveWord()">⭐</div>

    <div class="btn" onclick="nextWord()">→</div>

</div>

<script>

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);

let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;

    if(index >= words.length) index = 0;

    render();
});

function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;

    // 保存进度
    localStorage.setItem("word_index", index);

    // 上一个按钮控制
    let prevBtn = document.getElementById("prevBtn");

    if(index === 0){
        prevBtn.classList.add("disabled");
    }else{
        prevBtn.classList.remove("disabled");
    }
}

function nextWord(){
    index = (index + 1) % words.length;
    render();
}

function prevWord(){
    if(index > 0){
        index--;
        render();
    }
}

function saveWord(){

let w = words[index];

if(!favorites.find(i => i.word === w.word)){

favorites.push(w);

localStorage.setItem("favorites_list", JSON.stringify(favorites));

document.getElementById("meaning").innerText =
"⭐ 已加入收藏";

}else{
document.getElementById("meaning").innerText =
"⚠️ 已收藏过";
}

}

function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
