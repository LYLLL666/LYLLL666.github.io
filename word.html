<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词学习</title>

<style>

/* =========================
   BASE
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    height:100vh;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;

    text-align:center;
    color:#0f172a;
}

/* 柔光层 */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* =========================
   TITLE
========================= */
h1{
    margin-top:22px;
    font-size:22px;
    font-weight:600;
    color:rgba(15,23,42,.85);
}

/* =========================
   WORD CARD（居中上半区）
========================= */
.card{
    margin-top:60px;
    width:320px;
    padding:30px;

    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);
}

#word{
    font-size:44px;
    font-weight:700;
}

#meaning{
    margin-top:14px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* =========================
   底部操作栏
========================= */
.bottom-bar{
    width:100%;
    padding:22px 0 34px 0;

    display:flex;
    justify-content:center;
    gap:90px;

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-top:1px solid rgba(255,255,255,.25);
}

/* 极简箭头按钮 */
.btn{
    font-size:28px;
    font-weight:300;

    cursor:pointer;
    user-select:none;

    color:rgba(15,23,42,.75);

    transition:transform .15s ease;
}

/* hover */
.btn:hover{
    transform:translateY(-2px);
}

/* active */
.btn:active{
    transform:scale(.85);
}

/* 收藏按钮（中间稍突出） */
.save{
    font-size:30px;
}

/* =========================
   TOP TITLE
========================= */
.top{
    position:absolute;
    top:18px;
    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* 返回按钮（左上角极简） */
.back{
    position:absolute;
    left:16px;
    top:16px;

    font-size:24px;
    cursor:pointer;

    color:rgba(15,23,42,.7);
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>

<div class="top">单词学习</div>

<div class="card">
    <div id="word">加载中...</div>
    <div id="meaning"></div>
</div>

<!-- 底部操作 -->
<div class="bottom-bar">

    <div class="btn save" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>

</div>

<script>

let words = [];
let index = 0;

let favorites =
JSON.parse(localStorage.getItem("favorites_list") || "[]");

// 加载
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    render();
});

// 渲染
function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("meaning").innerText = w.meaning;
}

// 收藏
function saveWord(){

let w = words[index];

if(!favorites.find(i => i.word === w.word)){

favorites.push(w);

localStorage.setItem(
"favorites_list",
JSON.stringify(favorites)
);

document.getElementById("meaning").innerText =
"⭐ 已加入收藏";

}else{

document.getElementById("meaning").innerText =
"⚠️ 已收藏过";

}

}

// 下一个
function nextWord(){
    index = (index + 1) % words.length;
    render();
}

// 返回
function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
