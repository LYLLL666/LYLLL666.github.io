<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>单词学习</title>

<style>

/* =========================
   BASE（UI完全不动）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

/* 👇 只在这里新增（关键） */
*{
    -webkit-tap-highlight-color: transparent;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* 返回按钮 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

.title-card{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;

    padding:10px 18px;
    border-radius:14px;

    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 6px 15px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);

    font-size:15px;
    font-weight:600;
    color:#0f172a;
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;

    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* 主卡片 */
.card{
    margin-top:90px;
    width:300px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    margin-left:auto;
    margin-right:auto;

    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

#pos{
    margin-top:4px;
    font-size:14px;
    opacity:.6;
}

#meaning{
    margin-top:10px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* 发音按钮 */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:16px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(12px);

    box-shadow:
        0 6px 12px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);
}

.audio-btn:active{
    transform:scale(.92);
}

/* 例句 */
.example-card{
    margin-top:18px;
    width:300px;
    padding:20px;
    border-radius:24px;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.3),
        0 10px 25px rgba(0,0,0,.05);

    margin-left:auto;
    margin-right:auto;
}

/* 按钮区 */
.bottom-bar{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:220px;

    display:flex;
    gap:80px;
}

/* 按钮 */
.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06));

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

.btn.disabled{
    opacity:.25;
    pointer-events:none;
}

/* =========================
   ⭐ 分组UI
========================= */

.group-wrap{
    position:fixed;
    right:16px;
    top:20px;

    display:flex;
    gap:10px;

    z-index:99999;
}

/* ⭐ 已融合：按钮直接显示分组 */
.group-btn{
    height:44px;
    padding:0 16px;

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    font-size:13px;
    color:#0f172a;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>

<div class="group-wrap">
    <!-- ⭐ 已融合：显示+按钮合一 -->
    <div class="group-btn" id="groupBtn" onclick="chooseGroup()">第1组</div>
</div>

<div class="top">单词学习</div>
<div class="title-card">单词学习</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>

    <div id="word">加载中...</div>
    <div id="phonetic"></div>
    <div id="pos"></div>
    <div id="meaning"></div>
</div>

<div class="example-card">
    <div id="exampleTitle">例句</div>
    <div id="example"></div>

    <div id="example_translation"
         style="
            margin-top:10px;
            font-size:14px;
            opacity:.65;
            line-height:1.6;
         ">
    </div>
</div>

<div class="bottom-bar">
    <div class="btn" onclick="prevWord()">←</div>
    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>
</div>

<script>

const WORDS_VERSION = "v3";

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

/* =========================
   ⭐ 分组系统
========================= */
let groupIndex = Number(localStorage.getItem("word_group") || 1);
const GROUP_SIZE = 50;

/* ⭐ 已融合：按钮即显示当前组 */
function updateGroupUI(){
    document.getElementById("groupBtn").innerText = `第${groupIndex}组`;
}

/* 选择分组 */
function chooseGroup(){

    let input = prompt("请选择第几组（1-5）");

    let n = Number(input);

    if(!Number.isInteger(n) || n < 1 || n > 5){
        alert("请输入1-5之间的整数");
        return;
    }

    groupIndex = n;
    localStorage.setItem("word_group", groupIndex);

    index = 0;
    localStorage.removeItem("word_index");
    
    applyGroup();
    location.reload();
}

/* 应用分组 */
function applyGroup(){

    let start = (groupIndex - 1) * GROUP_SIZE;
    let end = start + GROUP_SIZE;

    words = words.slice(start, end);

    updateGroupUI();
    
}

/* =========================
   加载词库
========================= */
fetch("words.json?v=" + Date.now())
.then(res => res.json())
.then(data => {

    words = data;

    applyGroup();

    if(index >= words.length) index = 0;

    render();

    setTimeout(() => speak(), 300);
});

function render(){

    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";
    document.getElementById("pos").innerText = w.pos || "";
    document.getElementById("meaning").innerText = w.definition || "";
    document.getElementById("example").innerText = w.example || "";
    document.getElementById("example_translation").innerText = w.example_translation || "";
    localStorage.setItem("word_index", index);
}

/* =========================
   发音
========================= */
function speak(){

    let w = words[index];
    if(!w || !w.word) return;

    let word = w.word.toLowerCase().trim();

    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${word}--_us_1.mp3`
    );

    audio.play().catch(()=>{});
}

/* =========================
   翻页
========================= */
function nextWord(){

    if(index >= words.length - 1){
      
      alert("恭喜🎉你已经学完了这一部分，可以前往练习模式进行对应部分的练习了");
      
        return;
    }

    index++;
    render();
    setTimeout(()=>speak(),150);
}

function prevWord(){

    if(index > 0){
        index--;
        render();
        setTimeout(()=>speak(),150);
    }
}

/* =========================
   收藏
========================= */
function saveWord(){

    let w = words[index];
    if(!w) return;

    let list = JSON.parse(localStorage.getItem("favorites_list") || "[]");

    if(!list.some(i => i.word === w.word)){
        list.push(w);
        localStorage.setItem("favorites_list", JSON.stringify(list));
    }
}

function back(){
    location.href = "index.html";
}

/* 初始化 */
updateGroupUI();

</script>

</body>
</html>
