<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>单词学习</title>

<style>

/* =========================
   BASE（核心修复：居中系统）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-x:hidden;
    overflow-y:auto;

    display:flex;
    flex-direction:column;
    align-items:center;   /* ⭐关键：水平绝对居中 */
    justify-content:flex-start;

    text-align:center;
    color:#0f172a;
}

/* 背景光层 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );
    pointer-events:none;
}

/* =========================
   返回按钮（固定，不参与居中计算）
========================= */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;
    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:0 8px 18px rgba(0,0,0,.12);
    z-index:9999;
}

/* =========================
   标题
========================= */
.top{
    margin-top:18px;
    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* =========================
   主卡片（核心修复：max-width + 不用固定300）
========================= */
.card{
    width:90%;
    max-width:320px;

    margin-top:70px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    position:relative;
}

/* 文本 */
#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

#pos{
    margin-top:4px;
    font-size:14px;
    opacity:.6;
}

#meaning{
    margin-top:10px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* =========================
   发音按钮（不动）
========================= */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;
    font-size:16px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(12px);
    box-shadow:0 6px 12px rgba(0,0,0,.10);
}

/* =========================
   例句卡（同宽逻辑）
========================= */
.example-card{
    width:90%;
    max-width:320px;

    margin-top:18px;
    padding:20px;
    border-radius:24px;

    background:rgba(255,255,255,.45);
    backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);
}

/* =========================
   按钮区（真正稳定关键）
========================= */
.bottom-bar{
    position:fixed;   /* ⭐关键：脱离布局，不会歪 */
    bottom:120px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:70px;
}

/* 按钮 */
.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06));

    backdrop-filter:blur(18px);
    box-shadow:0 8px 18px rgba(0,0,0,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

/* =========================
   安卓/IOS 不再区分（关键优化）
   👉 统一布局 = 不再歪
========================= */

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>

<div class="top">单词学习</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>

    <div id="word">加载中...</div>
    <div id="phonetic"></div>
    <div id="pos"></div>
    <div id="meaning"></div>
</div>

<div class="example-card">
    <div id="example"></div>
    <div id="exampleTranslation"></div>
</div>

<div class="bottom-bar">
    <div class="btn" onclick="prevWord()">←</div>
    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>
</div>

<script>

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

/* 加载词库 */
fetch("words.json")
.then(res => res.json())
.then(data => {
    words = data;
    if(index >= words.length) index = 0;
    render();
});

function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";
    document.getElementById("pos").innerText = w.pos || "";
    document.getElementById("meaning").innerText = w.definition || "";
    document.getElementById("example").innerText = w.example || "";
    document.getElementById("exampleTranslation").innerText = w.example_translation || "";
}

function speak(){
    let w = words[index];
    if(!w) return;

    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${w.word.toLowerCase()}--_us_1.mp3`
    );

    audio.play().catch(() => {
        let u = new SpeechSynthesisUtterance(w.word);
        u.lang = "en-US";
        speechSynthesis.speak(u);
    });
}

function nextWord(){
    index = (index + 1) % words.length;
    render();
    speak();
}

function prevWord(){
    if(index > 0){
        index--;
        render();
        speak();
    }
}

function saveWord(){
    let w = words[index];
    if(!favorites.find(i => i.word === w.word)){
        favorites.push(w);
        localStorage.setItem("favorites_list", JSON.stringify(favorites));
    }
}

function back(){
    location.href = "index.html";
}

</script>

</body>
</html>
