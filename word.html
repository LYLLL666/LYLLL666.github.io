<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>单词学习</title>

<style>

/* =========================
   BASE（UI完全不动）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";

    background: radial-gradient(
        circle at top,
        #dff3ff 0%,
        #f4fbff 40%,
        #eaf4ff 70%,
        #e3efff 100%
    );

    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;

    text-align:center;
    color:#0f172a;

    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.45),
        rgba(255,255,255,.10),
        rgba(0,0,0,.02)
    );

    pointer-events:none;
}

/* 返回按钮 */
.back{
    position:fixed;
    left:16px;
    top:20px;

    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    cursor:pointer;

    color:#0f172a;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    box-shadow:
        0 8px 18px rgba(0,0,0,.12),
        inset 0 1px 1px rgba(255,255,255,.6);

    z-index:99999;
}

/* 标题 */
.top{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;

    font-size:18px;
    font-weight:600;
    color:rgba(15,23,42,.75);
}

/* 主卡片 */
.card{
    margin-top:90px;
    width:300px;
    padding:22px;
    border-radius:24px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 10px 30px rgba(0,0,0,.06);

    margin-left:auto;
    margin-right:auto;

    position:relative;
}

#word{
    font-size:44px;
    font-weight:700;
}

#phonetic{
    margin-top:6px;
    font-size:14px;
    opacity:.7;
}

#pos{
    margin-top:4px;
    font-size:14px;
    opacity:.6;
}

#meaning{
    margin-top:10px;
    font-size:16px;
    color:rgba(51,65,85,.9);
}

/* 发音按钮 */
.audio-btn{
    position:absolute;
    top:12px;
    right:12px;

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    font-size:16px;

    background:rgba(255,255,255,.35);
    border:1px solid rgba(255,255,255,.6);

    backdrop-filter:blur(12px);

    box-shadow:
        0 6px 12px rgba(0,0,0,.10),
        inset 0 1px 1px rgba(255,255,255,.6);
}

.audio-btn:active{
    transform:scale(.92);
}

/* 例句 */
.example-card{
    margin-top:18px;
    width:300px;
    padding:20px;
    border-radius:24px;

    background:rgba(255,255,255,.45);

    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.3),
        0 10px 25px rgba(0,0,0,.05);

    margin-left:auto;
    margin-right:auto;
}

/* 按钮区 */
.bottom-bar{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:220px;

    display:flex;
    gap:80px;
}

/* 按钮 */
.btn{
    width:52px;
    height:52px;
    border-radius:50%;

    border:1px solid rgba(255,255,255,.35);

    background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.06));

    backdrop-filter:blur(18px) saturate(170%);
    -webkit-backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.4),
        0 8px 18px rgba(0,0,0,.08);

    cursor:pointer;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:rgba(15,23,42,.75);
}

.btn:active{
    transform:scale(.92);
}

.btn.disabled{
    opacity:.25;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="back" onclick="back()">←</div>
<div class="top">单词学习</div>

<div class="card">
    <div class="audio-btn" onclick="speak()">🔊</div>

    <div id="word">加载中...</div>
    <div id="phonetic"></div>
    <div id="pos"></div>
    <div id="meaning"></div>
</div>

<div class="example-card">
    <div id="exampleTitle">例句</div>
    <div id="example"></div>
</div>

<div class="bottom-bar">
    <div class="btn" onclick="prevWord()">←</div>
    <div class="btn" onclick="saveWord()">⭐</div>
    <div class="btn" onclick="nextWord()">→</div>
</div>

<script>

let words = [];
let index = Number(localStorage.getItem("word_index") || 0);
let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

/* =========================
   加载词库
========================= */
fetch("words.json")
.then(res => res.json())
.then(data => {

    // =========================
    // 🔥 只在进入页面时随机一次
    // =========================
    let savedOrder = localStorage.getItem("words_order");

    if(savedOrder){
        try{
            words = JSON.parse(savedOrder);
        }catch(e){
            words = data;
            localStorage.removeItem("words_order");
        }
    }else{
        // 🎲 随机排序（只执行一次）
        words = [...data].sort(() => Math.random() - 0.5);
        localStorage.setItem("words_order", JSON.stringify(words));
    }

    if(index >= words.length) index = 0;

    render();

    // 🔥 进入页面自动读第一个单词
    setTimeout(() => speak(), 300);
});

function render(){
    if(words.length === 0) return;

    let w = words[index];

    document.getElementById("word").innerText = w.word;
    document.getElementById("phonetic").innerText = w.phonetic || "";
    document.getElementById("pos").innerText = w.pos || "";
    document.getElementById("meaning").innerText = w.definition || "";

    document.getElementById("example").innerText = w.example || "";

    localStorage.setItem("word_index", index);
}

/* =========================
   🔥 发音（最稳定双方案）
========================= */
function speak(){
    let w = words[index];
    if(!w || !w.word) return;

    let word = w.word.toLowerCase().trim();

    // 1️⃣ 优先在线音频
    let audio = new Audio(
        `https://ssl.gstatic.com/dictionary/static/sounds/oxford/${word}--_us_1.mp3`
    );

    audio.play().catch(() => fallbackTTS(w.word));

    audio.onerror = () => fallbackTTS(w.word);
}

/* 2️⃣ 兜底TTS */
function fallbackTTS(text){
    window.speechSynthesis.cancel();

    let utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    utter.rate = 0.95;

    speechSynthesis.speak(utter);
}

/* =========================
   切换（🔥 自动发音）
========================= */
function nextWord(){
    index = (index + 1) % words.length;
    render();
    setTimeout(() => speak(), 150);
}

function prevWord(){
    if(index > 0){
        index--;
        render();
        setTimeout(() => speak(), 150);
    }
}

/* 收藏 */
function saveWord(){
    let w = words[index];
    if(!w || !w.word) return;

    // 确保 favorites 是数组
    let favorites = JSON.parse(localStorage.getItem("favorites_list") || "[]");

    // 查重（更稳）
    let exists = favorites.some(item => item.word === w.word);

    if(!exists){
        favorites.push(w);
        localStorage.setItem("favorites_list", JSON.stringify(favorites));

        // ✅视觉反馈（不会影响UI结构）
        let btn = document.querySelector(".btn:nth-child(2)");
        if(btn){
            btn.style.transform = "scale(1.2)";
            btn.innerText = "⭐已收藏";

            setTimeout(() => {
                btn.style.transform = "scale(1)";
                btn.innerText = "⭐";
            }, 800);
        }

    }else{

        // 已存在提示
        let btn = document.querySelector(".btn:nth-child(2)");
        if(btn){
            btn.innerText = "⚠️已收藏";

            setTimeout(() => {
                btn.innerText = "⭐";
            }, 800);
        }
    }
}

/* 返回 */
function back(){
    location.href = "index.html";
}
//去掉蓝色选中
* {
    -webkit-tap-highlight-color: transparent;
}

/* 只针对可交互元素去 outline，不影响 div 渲染 */
button, .btn, .audio-btn, .back {
    outline: none;
}

/* focus 时也不显示蓝框（安全版） */
button:focus,
.btn:focus,
.audio-btn:focus,
.back:focus {
    outline: none;
}

</script>

</body>
</html>
