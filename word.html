<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自动词库学习</title>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background: radial-gradient(circle at top,#dff3ff,#f4fbff,#e3efff);
    height:100vh;
    overflow:hidden;
    text-align:center;
}

/* 卡片 */
.card{
    margin-top:100px;
    width:280px;
    padding:25px;
    border-radius:20px;
    margin-left:auto;
    margin-right:auto;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(12px);
}

#word{font-size:40px;font-weight:700;}
#meaning{margin-top:10px;}
#example{margin-top:10px;color:#555;}

/* 按钮 */
.btns{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:60px;
}

.btn{
    width:50px;height:50px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <div id="word">加载中...</div>
    <div id="meaning"></div>
    <div id="example"></div>
</div>

<div class="btns">
    <div class="btn" onclick="prev()">←</div>
    <div class="btn" onclick="next()">→</div>
</div>

<script>

// ==========================
// ⭐ 不需要 words.json
// ==========================

let wordPool = [
    "abandon","ability","abstract","achieve","adapt",
    "benefit","challenge","capacity","decline","define",
    "environment","experience","generate","increase",
    "motivate","organize","participate","significant"
];

let index = 0;
let current = "";

// ==========================
// API查词
// ==========================
async function fetchWord(w){

    try{
        let res = await fetch(
        "https://api.dictionaryapi.dev/api/v2/entries/en/" + w
        );

        let data = await res.json();
        let d = data[0];

        return {
            word: d.word,
            meaning: d.meanings?.[0]?.definitions?.[0]?.definition || "暂无释义",
            example: d.meanings?.[0]?.definitions?.[0]?.example || "暂无例句",
            audio: d.phonetics?.[0]?.audio || ""
        };

    }catch(e){
        return {
            word:w,
            meaning:"查询失败",
            example:""
        };
    }
}

// ==========================
// 渲染
// ==========================
async function render(){

    current = wordPool[index];

    let data = await fetchWord(current);

    document.getElementById("word").innerText = data.word;
    document.getElementById("meaning").innerText = data.meaning;
    document.getElementById("example").innerText = data.example;
}

// ==========================
// 下一个
// ==========================
function next(){
    index = (index + 1) % wordPool.length;
    render();
}

// ==========================
// 上一个
// ==========================
function prev(){
    index = (index - 1 + wordPool.length) % wordPool.length;
    render();
}

// 初始化
render();

</script>

</body>
</html>
