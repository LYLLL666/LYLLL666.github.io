<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错题本</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
    background: radial-gradient(circle at top, #ffe6e6, #fff3f3, #f5f7ff);
    min-height:100vh;
    overflow-x:hidden;
}

/* =========================
   顶部返回按钮
========================= */
.top-bar{
    position:fixed;
    top:18px;
    left:0;
    right:0;
    z-index:10;
}

.top-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
    font-size:18px;
    position:absolute;
    cursor:pointer;
}

.top-btn.left{
    left:15px;
}

.top-btn.right{
    right:15px;
}

.top-btn:active{
    transform:scale(0.95);
}

/* =========================
   标题小卡片（错题集）
========================= */
.title-card{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;

    padding:10px 18px;
    border-radius:14px;

    background: rgba(255,255,255,0.40);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 8px 20px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);

    font-size:15px;
    font-weight:600;
    color:#0f172a;
}

/* 列表 */
.container{
    padding:90px 15px 160px;
}

/* 错题卡片 */
.word-card{
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.40);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    position:relative;
}

.word{
    font-size:20px;
    font-weight:700;
    color:#111;
}

.phonetic{
    font-size:13px;
    color:#444;
    margin-top:2px;
}

.meaning{
    margin-top:8px;
    font-size:14px;
    color:#222;
    line-height:1.4;
}

/* 删除按钮 */
.remove-btn{
    position:absolute;
    right:12px;
    top:12px;
    width:28px;
    height:28px;
    border-radius:50%;
    background: rgba(255,80,80,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#ff3b3b;
    cursor:pointer;
}

/* 复习按钮 */
.review-btn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);

    padding:12px 26px;

    border-radius:14px;

    background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.55),
        rgba(255,255,255,0.25)
    );

    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.6);

    box-shadow:
        0 8px 20px rgba(0,0,0,0.10),
        inset 0 1px 1px rgba(255,255,255,0.6);

    font-size:15px;
    font-weight:600;
    color:#0f172a;

    cursor:pointer;
}

.review-btn:active{
    transform:translateX(-50%) scale(0.96);
}
</style>
</head>

<body>

<!-- 返回按钮 -->
<div class="top-bar">
    <div class="top-btn left" onclick="goBack()">←</div>
    <div class="top-btn right" onclick="clearAll()">🗑</div>
</div>

<div class="title-card">错题集</div>

<div class="container" id="list"></div>

<!-- 🔥 修改这里：直接跳转 review.html -->
<div class="review-btn" onclick="startReview()">
    开始复习
</div>

<script>

let mistakes = JSON.parse(localStorage.getItem("wrong_list") || "[]");

function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    if(mistakes.length === 0){
        list.innerHTML = "<div style='text-align:center;color:#555;margin-top:40px;'>暂无错题</div>";
        return;
    }

    mistakes.forEach((w, index)=>{
        const div = document.createElement("div");
        div.className = "word-card";

        div.innerHTML = `
            <div class="remove-btn" onclick="removeItem(${index})">✕</div>
            <div class="word">${w.word}</div>
            <div class="phonetic">${w.phonetic || ""}</div>
            <div class="meaning">${w.definition || ""}</div>
        `;

        list.appendChild(div);
    });
}

function removeItem(i){
    mistakes.splice(i,1);
    localStorage.setItem("wrong_list", JSON.stringify(mistakes));
    render();
}

function clearAll(){
    if(confirm("确定清空错题？")){
        mistakes = [];
        localStorage.setItem("wrong_list", JSON.stringify(mistakes));
        render();
    }
}

function goBack(){
    history.back();
}

/* ✅ 修改后的复习入口 */
function startReview(){
    if(mistakes.length === 0){
        alert("暂无错题可以复习");
        return;
    }

    location.href = "review.html";
}

render();

</script>

</body>
</html>
