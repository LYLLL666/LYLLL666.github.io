<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>错题本</title>

<style>
body{
    font-family:Arial;
    background:#fef2f2;
    text-align:center;
}
.card{
    width:320px;
    margin:15px auto;
    background:white;
    padding:20px;
    border-radius:18px;
}
.btn{
    margin-top:10px;
    padding:8px 14px;
    border:none;
    border-radius:10px;
    background:#ef4444;
    color:white;
}
</style>
</head>

<body>

<h1>❌ 错题本</h1>

<button onclick="location.href='review.html'">开始复习</button>

<div id="list"></div>

<script>

let wrongList =
JSON.parse(localStorage.getItem("wrong_list") || "[]");

function render(){

let box=document.getElementById("list");
box.innerHTML="";

if(wrongList.length===0){
box.innerHTML="<h3>没有错题</h3>";
return;
}

wrongList.forEach((w,i)=>{

box.innerHTML+=`
<div class="card">
${w.word} - ${w.meaning}
<br>
<button class="btn" onclick="remove(${i})">删除</button>
</div>
`;

});

}

function remove(i){

wrongList.splice(i,1);
localStorage.setItem("wrong_list",JSON.stringify(wrongList));
render();

}

render();

</script>

</body>
</html>
